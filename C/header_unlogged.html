<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
    <title>智能生产力平台</title>
    <style>
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        :root {
            --klein-blue: #0051D9;
            --hermes-orange: #F37021;
            --deep-gray: #1D2129;
            --light-gray: #F2F3F5;
            --classic-gray: #86909C;
            --white: #FFFFFF;
            --border-gray: #E5E7EB;
            --hover-gray: #F7F8FA;
            --font-size-base: 0.875rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
        }

        .container {
            width: 100%;
            max-width: 1630px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4.375rem;
            background: var(--klein-blue);
            z-index: 9999;
            box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2.5rem;
        }
        
        .top-nav-right {
            display: flex;
            align-items: center;
        }

        .logo {
            width: 13.75rem;
            min-height: 3.125rem;
            background: var(--white);
            color: var(--klein-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.375rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.25rem 0;
        }

        .logo:hover {
            opacity: 0.9;
        }

        .logo-slogan {
            font-size: 0.875rem;
            font-weight: 500;
            background: linear-gradient(135deg, var(--klein-blue), var(--hermes-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 0.125rem;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: nowrap;
        }

        .welcome {
            background: rgba(255, 255, 255, 0.95);
            color: var(--deep-gray);
            padding: 0.625rem 1.125rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            line-height: var(--line-height-base);
            box-shadow: 0 0.125rem 0.375rem rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-btn {
            background: var(--white);
            color: var(--klein-blue);
            border: none;
            padding: 0.625rem 1.125rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            line-height: var(--line-height-base);
            transition: all 0.3s ease;
            box-shadow: 0 0.125rem 0.375rem rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .login-btn:hover {
            background: var(--hermes-orange);
            color: var(--white);
            transform: translateY(-0.0625rem);
            box-shadow: 0.1875rem 0.5rem 0.5rem rgba(0,0,0,0.15);
        }

        .location {
            font-size: 0.875rem;
            line-height: var(--line-height-base);
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: default;
        }

        .location .location-icon {
            width: 1rem;
            height: 1rem;
            color: var(--hermes-orange);
        }

        .location .city-name {
            color: var(--hermes-orange);
        }

        .location .switch-city {
            color: var(--classic-gray);
        }

        @media (max-width: 1440px) {
            .container {
                max-width: 100%;
                padding: 0 2rem;
            }
            .fixed-header {
                padding: 0 2rem;
            }
        }

        @media (max-width: 1366px) {
            html {
                font-size: 15px;
            }
            .container {
                padding: 0 1.5rem;
            }
            .fixed-header {
                padding: 0 1.5rem;
            }
        }

        @media (max-width: 1280px) {
            html {
                font-size: 14px;
            }
            .container {
                padding: 0 1.25rem;
            }
            .fixed-header {
                padding: 0 1.25rem;
            }
            .logo {
                width: 12rem;
                font-size: 1.25rem;
            }
        }

        @media (max-width: 1024px) {
            html {
                font-size: 13px;
            }
            .container {
                padding: 0 1rem;
            }
            .fixed-header {
                padding: 0 1rem;
            }
            .logo {
                width: 10rem;
                font-size: 1.125rem;
            }
            .welcome {
                padding: 0.5rem 0.875rem;
            }
            .login-btn {
                padding: 0.5rem 0.875rem;
            }
        }

        @media (max-width: 768px) {
            html {
                font-size: 12px;
            }
            .container {
                padding: 0 0.75rem;
            }
            .fixed-header {
                padding: 0 0.75rem;
                height: 3.75rem;
            }
            .logo {
                width: 8rem;
                font-size: 1rem;
                min-height: 2.5rem;
            }
            .logo-slogan {
                font-size: 0.75rem;
            }
            .user-area {
                gap: 0.5rem;
            }
            .welcome {
                padding: 0.375rem 0.625rem;
                font-size: 0.75rem;
            }
            .login-btn {
                padding: 0.375rem 0.625rem;
                font-size: 0.75rem;
            }
            .location {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 600px) {
            html {
                font-size: 11px;
            }
            .fixed-header {
                height: 3.125rem;
            }
            .logo {
                width: 6rem;
                font-size: 0.875rem;
            }
            .logo-slogan {
                display: none;
            }
            .welcome {
                padding: 0.25rem 0.5rem;
            }
            .login-btn {
                padding: 0.25rem 0.5rem;
            }
            .login-btn span:last-child {
                display: none;
            }
            .location .switch-city {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ========== 固定在顶部的 Logo 导航栏 ========== -->
    <div class="fixed-header">
        <div class="logo" onclick="goToIndex()">
            RaaS.Dao
            <span class="logo-slogan">共创・共享</span>
        </div>
        <div class="top-nav-right">
            <div class="user-area">
                <div class="welcome">
                    <span>👋</span>
                    <span>欢迎使用智能生产力平台</span>
                </div>
                <button class="login-btn" onclick="showLoginModal()">
                    <span>👤</span>
                    <span>登录</span>
                </button>
                <div class="location">
                    <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="city-name">北京</span>
                    <span class="switch-city">[切换城市]</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 检查登录状态并显示相应的头部内容
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态，实际项目中应从localStorage或cookie中获取
            // 确保localStorage.getItem返回的值被正确转换为布尔值
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            // 获取用户区域元素
            const userArea = document.querySelector('.user-area');
            
            if (isLoggedIn) {
                // 已登录状态，显示欢迎信息和退出按钮
                userArea.innerHTML = `
                    <div class="welcome">
                        <span>👋</span>
                        <span>
                            <span class="company-name">东莞市嘉东网络科技有限公司</span> 
                            <span class="user-name">林工</span> 
                            欢迎您！
                            <span class="logout-btn" onclick="logout()" style="margin-left: 10px; color: #0051D9; cursor: pointer;">[退出]</span>
                        </span>
                    </div>
                    <button class="login-btn">
                        <span class="msg-icon">📩</span>
                        <span>消息 12</span>
                    </button>
                    <button class="login-btn">
                        <span>👤</span>
                        <span>个人中心</span>
                    </button>
                    <div class="location">
                        <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span class="city-name">北京</span>
                        <span class="switch-city">[切换城市]</span>
                    </div>
                `;
            } else {
                // 未登录状态，显示登录和注册按钮
                userArea.innerHTML = `
                    <div class="welcome">
                        <span>👋</span>
                        <span>欢迎使用智能生产力平台</span>
                    </div>
                    <button class="login-btn" onclick="showLoginModal()">
                        <span>👤</span>
                        <span>登录</span>
                    </button>
                    <div class="location">
                        <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span class="city-name">北京</span>
                        <span class="switch-city">[切换城市]</span>
                    </div>
                `;
            }
        });

        // 退出登录函数
        function logout() {
            // 清除登录状态
            localStorage.removeItem('isLoggedIn');
            
            // 刷新页面，显示未登录的头部
            window.location.reload();
        }

        // 跳转到首页函数 - 支持iframe内外跳转
        function goToIndex() {
            // 检查是否在iframe中
            if (window.parent !== window) {
                // 在iframe中，让父页面跳转
                window.parent.location.href = 'index.html';
            } else {
                // 不在iframe中，直接跳转
                window.location.href = 'index.html';
            }
        }

        // 显示登录弹窗函数 - 支持iframe内外
        function showLoginModal() {
            // 检查是否在iframe中
            if (window.parent !== window) {
                // 在iframe中，通过postMessage通知父页面显示弹窗
                window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
            } else {
                // 不在iframe中，跳转到登录页面
                window.location.href = 'login_modal.html';
            }
        }


    </script>
</body>
</html>
