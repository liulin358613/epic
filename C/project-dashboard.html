<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>项目经理数据看板</title>
    <style>
        html {
            font-size: 16px !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        :root {
            --font-size-base: 0.875rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
            --border-color: #E5E7EB;
            --primary-color: #0051D9;
            --success-color: #52C41A;
            --warning-color: #FAAD14;
            --danger-color: #FF4D4F;
            --text-color: #1D2129;
            --text-secondary: #666;
            --bg-light: #F2F3F5;
            --bg-white: #FFFFFF;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-lg);
            gap: var(--spacing-lg);
        }

        .gantt-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            min-height: 200px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1rem;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        .section-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 0.375rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background-color: var(--bg-white);
            font-size: 0.875rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--bg-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #0040B8;
            border-color: #0040B8;
            color: #FFFFFF;
        }

        .gantt-content {
            flex: 1;
            padding: var(--spacing-lg);
            overflow: auto;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .stats-cards {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .legend-container {
            display: flex;
            justify-content: flex-end;
            gap: var(--spacing-lg);
            padding: var(--spacing-sm) 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .stat-card {
            width: 140px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 0.5rem;
            padding: var(--spacing-lg);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .stat-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .stat-card.delayed {
            border-left: 3px solid var(--danger-color);
            background: linear-gradient(135deg, #fff5f5 0%, #ffcccc 100%);
        }

        .stat-card.warning {
            border-left: 3px solid var(--warning-color);
            background: linear-gradient(135deg, #fffbe6 0%, #ffe082 100%);
        }

        .stat-card.completed {
            border-left: 3px solid var(--success-color);
            background: linear-gradient(135deg, #f6ffed 0%, #b9f6ca 100%);
        }

        .stat-card.delayed-done {
            border-left: 3px solid #909399;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .gantt-search {
            display: flex;
            gap: var(--spacing-lg);
            padding: 0.75rem;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .search-divider {
            width: 1px;
            height: 32px;
            background-color: var(--border-color);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .date-input {
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: var(--bg-white);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }

        .date-separator {
            color: var(--text-secondary);
            font-size: 0.8125rem;
        }

        .search-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn-secondary {
            background-color: #F5F5F5;
            border-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: #E8E8E8;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .search-group label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .search-input {
            flex: 1;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: var(--bg-white);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }

        .gantt-table-container {
            overflow-x: auto;
            overflow-y: visible;
            height: auto;
        }

        .gantt-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        .gantt-table th,
        .gantt-table td {
            padding: 8px 2px;
            text-align: center;
            border: 1px solid var(--border-color);
            font-size: 0.8125rem;
            white-space: nowrap;
        }

        .gantt-table th {
            background-color: #FAFAFA;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .gantt-table th.date-header.weekend,
        .gantt-table td.date-cell.weekend {
            background-color: #FFF5F5;
            color: #FF4D4F;
        }

        .gantt-table td.date-cell.project {
            background-color: #909399;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.active {
            background-color: #52C41A;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.delayed {
            background-color: #FF4D4F;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.warning {
            background-color: #FAAD14;
            color: #FFFFFF;
        }

        .gantt-table th.date-header.today,
        .gantt-table td.date-cell.today {
            border: 2px dashed #1890ff;
        }

        .gantt-table th.project-col {
            min-width: 200px;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .gantt-table th.date-header {
            position: relative;
        }

        .gantt-table td.project-col {
            font-weight: 500;
            padding-left: 12px;
            color: var(--text-color);
            text-align: left;
            background-color: var(--bg-white);
        }

        .gantt-table td.date-cell {
            background-color: #FAFAFA;
        }

        .gantt-table .nav-col {
            width: 40px;
            min-width: 40px;
            padding: 0;
            background-color: #F5F7FA;
            border-left: 1px solid var(--border-color);
        }

        .gantt-table .nav-left-col {
            border-left: none;
            border-right: 1px solid var(--border-color);
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .nav-btn:hover {
            background-color: rgba(0, 81, 217, 0.1);
            color: #0051D9;
        }

        .project-list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            min-height: 250px;
        }

        .list-header {
            display: grid;
            grid-template-columns: 3fr 1.5fr 1fr 1fr 1fr;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-xl);
            background-color: #FAFAFA;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .list-content {
            flex: 1;
            overflow-y: auto;
        }

        .list-item {
            display: grid;
            grid-template-columns: 3fr 1.5fr 1fr 1fr 1fr;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        .list-item:hover {
            background-color: #F9FAFB;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .project-name {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.875rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .project-name::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-color);
        }

        .project-status {
            display: flex;
            align-items: center;
        }

        .status-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-tag.completed {
            background-color: #E6F7FF;
            color: #1890FF;
        }

        .status-tag.in-progress {
            background-color: #FFF7E6;
            color: #FA8C16;
        }

        .status-tag.pending {
            background-color: #F6FFED;
            color: #52C41A;
        }

        .status-tag.delayed {
            background-color: #FFF1F0;
            color: #FF4D4F;
        }

        .project-info {
            display: flex;
            align-items: center;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            width: 100%;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background-color: #F0F0F0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-fill.completed {
            background-color: #1890FF;
        }

        .progress-fill.in-progress {
            background-color: #FA8C16;
        }

        .progress-fill.pending {
            background-color: #52C41A;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 3rem;
            text-align: right;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 4rem;
            height: 4rem;
            margin-bottom: var(--spacing-lg);
            opacity: 0.4;
        }

        .empty-state span {
            font-size: 0.875rem;
        }

        @media (max-width: 1440px) {
            html { font-size: 15px !important; }
        }

        @media (max-width: 1366px) {
            html { font-size: 14px !important; }
        }

        @media (max-width: 1280px) {
            html { font-size: 13px !important; }
        }

        @media (max-width: 1024px) {
            html { font-size: 12px !important; }
            
            .list-header {
                grid-template-columns: 2fr 1fr 0.8fr 0.8fr 0.8fr;
                gap: var(--spacing-sm);
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .list-item {
                grid-template-columns: 2fr 1fr 0.8fr 0.8fr 0.8fr;
                gap: var(--spacing-sm);
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .dashboard-container {
                padding: var(--spacing-md);
                gap: var(--spacing-md);
            }

            .section-header {
                padding: var(--spacing-md);
            }
        }

        @media (max-width: 768px) {
            html { font-size: 11px !important; }

            .dashboard-container {
                padding: var(--spacing-sm);
                gap: var(--spacing-sm);
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }

            .section-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: calc(50% - 4px);
                justify-content: center;
            }

            .gantt-content {
                padding: var(--spacing-md);
            }

            .list-header {
                grid-template-columns: 1.5fr 0.8fr 0.6fr 0.6fr 0.6fr;
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 0.75rem;
            }

            .list-item {
                grid-template-columns: 1.5fr 0.8fr 0.6fr 0.6fr 0.6fr;
                padding: var(--spacing-xs) var(--spacing-sm);
            }

            .project-name {
                font-size: 0.8125rem;
            }

            .status-tag {
                padding: 0.1875rem 0.5rem;
                font-size: 0.6875rem;
            }

            .progress-text {
                min-width: 2.5rem;
                font-size: 0.6875rem;
            }
        }

        @media (max-width: 600px) {
            html { font-size: 10px !important; }

            .list-header {
                grid-template-columns: 1.2fr 0.7fr 0.5fr 0.5fr 0.5fr;
                gap: 4px;
            }

            .list-item {
                grid-template-columns: 1.2fr 0.7fr 0.5fr 0.5fr 0.5fr;
                gap: 4px;
            }

            .btn {
                padding: 0.3125rem 0.75rem;
                font-size: 0.8125rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #F0F0F0;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d0d3d8;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #e5e7eb #F0F0F0;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="gantt-section">
            <div class="section-header">
                <div class="section-title">项目进度</div>
                <div class="section-actions">
                    <button class="btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        刷新
                    </button>
                </div>
            </div>
            <div class="gantt-content">
                <div class="stats-cards">
                    <div class="stat-card delayed">
                        <div class="stat-value">2</div>
                        <div class="stat-label">已延期</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-value">3</div>
                        <div class="stat-label">即将延期</div>
                    </div>
                    <div class="stat-card completed">
                        <div class="stat-value">8</div>
                        <div class="stat-label">按时完成</div>
                    </div>
                    <div class="stat-card delayed-done">
                        <div class="stat-value">5</div>
                        <div class="stat-label">延期完成</div>
                    </div>
                </div>

                <div class="gantt-search">
                    <div class="search-group">
                        <label>项目：</label>
                        <input type="text" class="search-input" placeholder="请输入项目名称">
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-group">
                        <label>日期：</label>
                        <div class="date-picker">
                            <input type="date" class="date-input" placeholder="请选择日期">
                        </div>
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-actions">
                        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
                        <button class="btn btn-primary" onclick="doSearch()">搜索</button>
                    </div>
                </div>

                <div class="legend-container">
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: #909399;"></span>
                        <span class="legend-text">项目日期</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: #52C41A;"></span>
                        <span class="legend-text">开始日期</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: #FF4D4F;"></span>
                        <span class="legend-text">已延期</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background-color: #FAAD14;"></span>
                        <span class="legend-text">可能延期</span>
                    </div>
                </div>

                <div class="gantt-table-container">
                    <table id="gantt-table" class="gantt-table">
                        <thead>
                            <tr>
                                <th class="project-col" style="font-weight: 700;">项目</th>
                                <th class="nav-col nav-left-col">
                                    <button class="nav-btn nav-left-btn" onclick="scrollDates(-1)">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M15 19l-7-7 7-7"/>
                                        </svg>
                                    </button>
                                </th>
                                <th class="nav-col nav-right-col">
                                    <button class="nav-btn nav-right-btn" onclick="scrollDates(1)">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M9 5l7 7-7 7"/>
                                        </svg>
                                    </button>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="gantt-table-body">
                            <tr>
                                <td class="project-col">智慧园区建设项目</td>
                                <td class="nav-col"></td>
                                <td class="nav-col"></td>
                            </tr>
                            <tr>
                                <td class="project-col">数据分析平台升级</td>
                                <td class="nav-col"></td>
                                <td class="nav-col"></td>
                            </tr>
                            <tr>
                                <td class="project-col">移动端App开发</td>
                                <td class="nav-col"></td>
                                <td class="nav-col"></td>
                            </tr>
                            <tr>
                                <td class="project-col">ERP系统集成</td>
                                <td class="nav-col"></td>
                                <td class="nav-col"></td>
                            </tr>
                            <tr>
                                <td class="project-col">客户服务系统</td>
                                <td class="nav-col"></td>
                                <td class="nav-col"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="project-list-section">
            <div class="section-header">
                <div class="section-title">项目明细列表</div>
                <div class="section-actions">
                    <button class="btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        搜索
                    </button>
                    <button class="btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>

    <script>
        const PROJECT_COL_WIDTH = 200;
        const NAV_COL_WIDTH = 40;
        const DATE_CELL_WIDTH = 50;
        let startDate = new Date(2026, 4, 1);

        const projectData = [
            {
                name: '智慧园区建设项目',
                projectStart: { month: 5, day: 5 },
                projectEnd: { month: 5, day: 30 },
                actualStart: { month: 5, day: 7 },
                delayDays: 2
            },
            {
                name: '数据分析平台升级',
                projectStart: { month: 5, day: 5 },
                projectEnd: { month: 5, day: 10 },
                actualStart: { month: 5, day: 5 },
                isDelayed: true
            },
            {
                name: '移动端App开发',
                projectStart: { month: 5, day: 20 },
                projectEnd: { month: 7, day: 1 },
                actualStart: null,
                delayDays: 0
            },
            {
                name: 'ERP系统集成',
                projectStart: { month: 5, day: 1 },
                projectEnd: { month: 5, day: 20 },
                actualStart: { month: 5, day: 3 },
                isDelayed: true
            },
            {
                name: '客户服务系统',
                projectStart: { month: 5, day: 10 },
                projectEnd: { month: 6, day: 15 },
                actualStart: { month: 5, day: 12 },
                delayDays: 0
            }
        ];

        function getDateStatus(projectIndex, date) {
            const project = projectData[projectIndex];
            if (!project) return '';

            const today = new Date(2026, 4, 21);
            const dateStr = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            
            const isInProjectRange = 
                (date >= new Date(2026, project.projectStart.month - 1, project.projectStart.day)) &&
                (date <= new Date(2026, project.projectEnd.month - 1, project.projectEnd.day));

            if (!isInProjectRange) {
                if (project.isDelayed) {
                    const endDate = new Date(2026, project.projectEnd.month - 1, project.projectEnd.day);
                    if (date > endDate && date <= today) {
                        return 'delayed';
                    }
                }
                
                if (project.delayDays > 0) {
                    const projectEndDate = new Date(2026, project.projectEnd.month - 1, project.projectEnd.day);
                    const warningEndDate = new Date(projectEndDate.getTime() + project.delayDays * 24 * 60 * 60 * 1000);
                    if (date > projectEndDate && date <= warningEndDate) {
                        return 'warning';
                    }
                }
                
                return '';
            }

            if (project.actualStart) {
                const actualStartDate = new Date(2026, project.actualStart.month - 1, project.actualStart.day);
                const projectEndDate = new Date(2026, project.projectEnd.month - 1, project.projectEnd.day);
                const activeEndDate = project.isDelayed ? projectEndDate : today;
                
                if (date >= actualStartDate && date <= activeEndDate && date <= today) {
                    return 'active';
                }
            }

            return 'project';
        }

        function renderGanttTable() {
            const container = document.querySelector('.gantt-table-container');
            const navRightCol = document.querySelector('.nav-right-col');
            const navLeftCol = document.querySelector('.nav-left-col');
            
            if (!container || !navRightCol) return;

            const containerWidth = container.offsetWidth;
            const availableWidth = containerWidth - PROJECT_COL_WIDTH - NAV_COL_WIDTH - NAV_COL_WIDTH;
            const dateCount = Math.max(1, Math.floor(availableWidth / DATE_CELL_WIDTH));

            while (navLeftCol.nextElementSibling !== navRightCol) {
                navLeftCol.parentElement.removeChild(navLeftCol.nextElementSibling);
            }

            const rows = document.querySelectorAll('#gantt-table-body tr');
            rows.forEach(row => {
                const navCols = row.querySelectorAll('.nav-col');
                const rightNavCol = navCols[navCols.length - 1];
                const leftNavCol = navCols[0];
                while (leftNavCol.nextElementSibling !== rightNavCol) {
                    leftNavCol.parentElement.removeChild(leftNavCol.nextElementSibling);
                }
            });

            for (let i = 0; i < dateCount; i++) {
                const date = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${month}-${day}`;
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const today = new Date(2026, 4, 21);
                const isToday = date.getDate() === today.getDate() && 
                               date.getMonth() === today.getMonth() && 
                               date.getFullYear() === today.getFullYear();

                const th = document.createElement('th');
                th.className = 'date-header' + (isWeekend ? ' weekend' : '') + (isToday ? ' today' : '');
                th.textContent = dateStr;
                th.style.width = DATE_CELL_WIDTH + 'px';
                navRightCol.parentElement.insertBefore(th, navRightCol);

                rows.forEach((row, rowIndex) => {
                    const navCols = row.querySelectorAll('.nav-col');
                    const rightNavCol = navCols[navCols.length - 1];
                    const td = document.createElement('td');
                    const status = getDateStatus(rowIndex, date);
                    td.className = 'date-cell' + (isWeekend ? ' weekend' : '') + (status ? ' ' + status : '') + (isToday ? ' today' : '');
                    td.style.width = DATE_CELL_WIDTH + 'px';
                    rightNavCol.parentElement.insertBefore(td, rightNavCol);
                });
            }
        }

        function scrollDates(direction) {
            const daysToAdd = direction * 7;
            startDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + daysToAdd);
            renderGanttTable();
        }

        function resetSearch() {
            document.querySelector('input[type="text"].search-input').value = '';
            document.querySelectorAll('input[type="date"].date-input').forEach(input => {
                input.value = '';
            });
        }

        function doSearch() {
            const projectName = document.querySelector('input[type="text"].search-input').value;
            const startDate = document.querySelectorAll('input[type="date"].date-input')[0].value;
            const endDate = document.querySelectorAll('input[type="date"].date-input')[1].value;
            console.log('搜索条件:', { projectName, startDate, endDate });
        }

        document.addEventListener('DOMContentLoaded', renderGanttTable);
        window.addEventListener('resize', renderGanttTable);
    </script>
