<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>项目经理数据看板</title>
    <style>
        html {
            font-size: 16px !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        :root {
            --font-size-base: 0.875rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
            --border-color: #E5E7EB;
            --primary-color: #0051D9;
            --success-color: #52C41A;
            --warning-color: #FAAD14;
            --danger-color: #FF4D4F;
            --text-color: #1D2129;
            --text-secondary: #666;
            --bg-light: #F2F3F5;
            --bg-white: #FFFFFF;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: var(--spacing-lg);
            gap: var(--spacing-lg);
        }

        .gantt-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            min-height: 200px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1rem;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        .section-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 0.375rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background-color: var(--bg-white);
            font-size: 0.875rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--bg-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: #0040B8;
            border-color: #0040B8;
            color: #FFFFFF;
        }

        .gantt-content {
            flex: 1;
            padding: var(--spacing-lg);
            overflow: hidden;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
            position: relative;
        }

        .stats-cards {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .legend-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            padding: var(--spacing-sm) 0;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .legend-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .stat-card {
            width: 140px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 0.5rem;
            padding: var(--spacing-lg);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .stat-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .stat-card.delayed {
            border-left: 3px solid #e74c3c;
            background: linear-gradient(135deg, #fde8e8 0%, #f8c4c4 100%);
        }

        .stat-card.warning {
            border-left: 3px solid #f59e0b;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }

        .stat-card.not-started {
            border-left: 3px solid #6366f1;
            background: linear-gradient(135deg, #eef2ff 0%, #c7d2fe 100%);
        }

        .stat-card.normal {
            border-left: 3px solid #3b82f6;
            background: linear-gradient(135deg, #eff6ff 0%, #bfdbfe 100%);
        }

        .stat-card.delayed-done {
            border-left: 3px solid #8b5cf6;
            background: linear-gradient(135deg, #f5f3ff 0%, #ddd6fe 100%);
        }

        .stat-card.completed {
            border-left: 3px solid #10b981;
            background: linear-gradient(135deg, #ecfdf5 0%, #a7f3d0 100%);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .gantt-search {
            display: flex;
            gap: var(--spacing-lg);
            padding: 0.75rem;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .search-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .search-divider {
            width: 1px;
            height: 32px;
            background-color: var(--border-color);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .date-input {
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: var(--bg-white);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }

        .date-separator {
            color: var(--text-secondary);
            font-size: 0.8125rem;
        }

        .search-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn-secondary {
            background-color: #F5F5F5;
            border-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: #E8E8E8;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .search-group label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .status-select {
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            background-color: var(--bg-white);
            color: var(--text-secondary);
            cursor: pointer;
            outline: none;
            min-width: 90px;
        }

        .status-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }

        .search-input {
            flex: 1;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            background-color: var(--bg-white);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }

        .gantt-table-container {
            overflow-x: auto;
            overflow-y: auto;
            flex: 0 1 auto;
            max-height: 50%;
        }

        .gantt-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0;
        }

        .gantt-table th,
        .gantt-table td {
            padding: 0.5rem 0.125rem;
            text-align: center;
            border: 1px solid var(--border-color);
            font-size: 0.8125rem;
            white-space: nowrap;
        }

        .gantt-table th {
            background-color: #FAFAFA;
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 
                0 -1px 0 0 var(--border-color),
                0 1px 0 0 var(--border-color);
        }

        .gantt-table th.date-header.weekend,
        .gantt-table td.date-cell.weekend {
            background-color: #FFF5F5;
            color: #FF4D4F;
        }

        .gantt-table td.date-cell.project {
            background-color: #909399;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.active {
            background-color: #52C41A;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.delayed {
            background-color: #FF4D4F;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.delayed-completed {
            background-color: rgba(255, 77, 79, 0.5);
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.warning {
            background-color: #FAAD14;
            color: #FFFFFF;
        }

        .gantt-table td.date-cell.completed-gantt {
            background-color: rgba(24, 144, 255, 0.5);
            color: #FFFFFF;
        }

        .today-column-overlay {
            position: fixed;
            pointer-events: none;
            border: 3px dashed #1890FF;
            border-radius: 3px;
            z-index: 99999;
        }

        #gantt-table-body tr {
            transition: background-color 0.15s ease;
        }

        .gantt-table th.project-col {
            min-width: 12.5rem;
            width: 12.5rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        }

        .gantt-table th.date-header { }

        .gantt-table td.project-col {
            font-weight: 500;
            padding-left: 0.75rem;
            color: var(--text-color);
            text-align: left;
            background-color: #FAFAFA;
            cursor: pointer;
            position: relative;
        }

        .gantt-tooltip {
            position: absolute;
            z-index: 10000;
            background: #FFFFFF;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.8125rem;
            color: var(--text-color);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            pointer-events: none;
            white-space: nowrap;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .gantt-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gantt-tooltip .tt-label {
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .gantt-tooltip .tt-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .gantt-tooltip .tt-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .gantt-tooltip .tt-dot.active { background-color: #52C41A; }
        .gantt-tooltip .tt-dot.delayed { background-color: #FF4D4F; }
        .gantt-tooltip .tt-dot.warning { background-color: #FAAD14; }

        .gantt-table td.date-cell {
            background-color: #FAFAFA;
        }

        .gantt-table .nav-col {
            width: 2.5rem;
            min-width: 2.5rem;
            padding: 0;
            background-color: #F5F7FA;
            border-left: 1px solid var(--border-color);
        }

        .gantt-table .nav-left-col {
            border-left: none;
            border-right: 1px solid var(--border-color);
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .nav-btn:hover {
            color: #0051D9;
        }

        .project-list-section {
            flex: 0 1 auto;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border-color);
            background-color: #fafafa;
            max-height: 50%;
            overflow: hidden;
        }

        .list-header {
            display: grid;
            grid-template-columns: 3fr 2fr 1.5fr 1.5fr;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-xl);
            background-color: #FAFAFA;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .project-list-section .list-content {
            flex: 1;
            overflow-y: auto;
        }

        .list-item {
            display: grid;
            grid-template-columns: 3fr 2fr 1.5fr 1.5fr;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            cursor: pointer;
            background-color: #FAFAFA;
        }

        .list-item:hover {
            background-color: #F9FAFB;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .project-name {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.875rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .project-name::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-color);
        }

        .project-status {
            display: flex;
            align-items: center;
        }

        .status-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .status-tag.delayed-tag {
            background-color: #fde8e8;
            color: #e74c3c;
        }

        .status-tag.warning-tag {
            background-color: #fef3c7;
            color: #d97706;
        }

        .status-tag.not-started-tag {
            background-color: #eef2ff;
            color: #4f46e5;
        }

        .status-tag.normal-tag {
            background-color: #eff6ff;
            color: #2563eb;
        }

        .status-tag.completed-tag {
            background-color: #ecfdf5;
            color: #059669;
        }

        .status-tag.delayed-done-tag {
            background-color: #f5f3ff;
            color: #7c3aed;
        }

        .status-desc {
            font-size: 0.7rem;
            color: #999;
            margin-top: 2px;
        }

        .project-time {
            display: flex;
            align-items: center;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            width: 100%;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background-color: #dad5d5;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-fill.delayed-progress {
            background-color: #e74c3c;
        }

        .progress-fill.warning-progress {
            background-color: #f59e0b;
        }

        .progress-fill.not-started-progress {
            background-color: #b0bec5;
        }

        .progress-fill.normal-progress {
            background-color: #3b82f6;
        }

        .progress-fill.completed-progress {
            background-color: #10b981;
        }

        .progress-fill.delayed-done-progress {
            background-color: #8b5cf6;
        }

        .progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 3rem;
            text-align: right;
        }

        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 8px var(--spacing-lg);
            border-top: 1px solid var(--border-color);
            background: #fff;
            flex-shrink: 0;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .pagination-total {
            margin-right: 12px;
        }

        .pagination-total b {
            color: var(--text-primary);
        }

        .pagination-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .pagination-btn:hover {
            color: #1890ff;
            border-color: #1890ff;
        }

        .pagination-btn:disabled {
            color: #d9d9d9;
            border-color: #d9d9d9;
            cursor: not-allowed;
        }

        .pagination-pages {
            display: flex;
            gap: 4px;
        }

        .pagination-page {
            width: 28px;
            height: 28px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            transition: all 0.2s;
        }

        .pagination-page:hover {
            color: #1890ff;
            border-color: #1890ff;
        }

        .pagination-page.active {
            background: #1890ff;
            border-color: #1890ff;
            color: #fff;
        }

        .pagination-ellipsis {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .pagination-size-label {
            margin-left: 8px;
        }

        .pagination-size-select {
            height: 28px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 0 6px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            background: #fff;
            cursor: pointer;
            outline: none;
        }

        .pagination-size-select:focus {
            border-color: #1890ff;
        }

        .pagination-jump-label {
            margin-left: 8px;
        }

        .pagination-jump-input {
            width: 40px;
            height: 28px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-primary);
            outline: none;
        }

        .pagination-jump-input:focus {
            border-color: #1890ff;
        }

        .btn-sm {
            height: 28px;
            padding: 0 12px;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 4rem;
            height: 4rem;
            margin-bottom: var(--spacing-lg);
            opacity: 0.4;
        }

        .empty-state span {
            font-size: 0.875rem;
        }

        @media (max-width: 1440px) {
            html { font-size: 15px !important; }
        }

        @media (max-width: 1366px) {
            html { font-size: 14px !important; }
        }

        @media (max-width: 1280px) {
            html { font-size: 13px !important; }
        }

        @media (max-width: 1024px) {
            html { font-size: 12px !important; }
            
            .list-header {
                grid-template-columns: 2fr 1.5fr 1fr 1fr;
                gap: var(--spacing-sm);
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .list-item {
                grid-template-columns: 2fr 1.5fr 1fr 1fr;
                gap: var(--spacing-sm);
                padding: var(--spacing-sm) var(--spacing-md);
            }

            .dashboard-container {
                padding: var(--spacing-md);
                gap: var(--spacing-md);
            }

            .section-header {
                padding: var(--spacing-md);
            }
        }

        @media (max-width: 768px) {
            html { font-size: 11px !important; }

            .dashboard-container {
                padding: var(--spacing-sm);
                gap: var(--spacing-sm);
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-md);
            }

            .section-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: calc(50% - 4px);
                justify-content: center;
            }

            .gantt-content {
                padding: var(--spacing-md);
            }

            .list-header {
                grid-template-columns: 1.5fr 1.2fr 0.8fr 0.8fr;
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 0.75rem;
            }

            .list-item {
                grid-template-columns: 1.5fr 1.2fr 0.8fr 0.8fr;
                padding: var(--spacing-xs) var(--spacing-sm);
            }

            .project-name {
                font-size: 0.8125rem;
            }

            .status-tag {
                padding: 0.1875rem 0.5rem;
                font-size: 0.6875rem;
            }

            .progress-text {
                min-width: 2.5rem;
                font-size: 0.6875rem;
            }
        }

        @media (max-width: 600px) {
            html { font-size: 10px !important; }

            .list-header {
                grid-template-columns: 1.2fr 1fr 0.7fr 0.7fr;
                gap: 4px;
            }

            .list-item {

            scrollbar-width: thin;
            scrollbar-color: #e5e7eb #F0F0F0;
        }

</head>

    <script>
        let dateOffset = 0;
        (function() {
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var base = new Date(2026, 4, 20);
            dateOffset = Math.round((today.getTime() - base.getTime()) / 86400000);
        })();
        let startDate = new Date(2026, 4, 1 + dateOffset);

        function offsetDay(m, d) {
            var dt = new Date(2026, m - 1, d + dateOffset);
            return { month: dt.getMonth() + 1, day: dt.getDate() };
        }

        const projectData = [
            {
                name: '智慧园区建设项目',
                projectStart: { month: 5, day: 5 },
                projectEnd: { month: 5, day: 30 },
                actualStart: { month: 5, day: 7 },
                delayDays: 2
            },
            {
                name: '数据分析平台升级',
                projectStart: { month: 5, day: 5 },
                projectEnd: { month: 5, day: 10 },
                actualStart: { month: 5, day: 5 },
                isDelayed: true
            },
            {
                name: '移动端App开发',
                projectStart: { month: 5, day: 3 },
                projectEnd: { month: 5, day: 30 },
                actualStart: null,
                delayDays: 0
            },
            {
                name: 'ERP系统集成',
                projectStart: { month: 5, day: 2 },
                projectEnd: { month: 5, day: 16 },
                actualStart: { month: 5, day: 7 },
                isDelayed: true
            },
            {
                name: '客户服务系统',
                projectStart: { month: 5, day: 10 },
                projectEnd: { month: 6, day: 4 },
                actualStart: { month: 5, day: 10 },
                delayDays: 0
            },
            {
                name: '智能仓储系统',
                projectStart: { month: 5, day: 4 },
                projectEnd: { month: 5, day: 25 },
                actualStart: { month: 5, day: 5 },
                completed: 'early',
                completedDate: { month: 5, day: 18 }
            },
            {
                name: '数据安全合规项目',
                projectStart: { month: 5, day: 1 },
                projectEnd: { month: 5, day: 20 },
                actualStart: { month: 5, day: 3 },
                completed: 'onTime',
                completedDate: { month: 5, day: 20 }
            },
            {
                name: 'API开放平台建设',
                projectStart: { month: 5, day: 2 },
                projectEnd: { month: 5, day: 10 },
                actualStart: { month: 5, day: 4 },
                completed: 'delayed',
                completedDate: { month: 5, day: 15 },
                isDelayed: true
            }
        ];

        var searchFilter = null;
        var pageSize = 10;
        var currentPage = 1;

        function updateStatsCards() {
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var todayTime = today.getTime();

            var delayed = 0;
            var warning = 0;
            var completed = 0;
            var delayedDone = 0;
            var normal = 0;
            var notStarted = 0;

            projectData.forEach(function(project) {
                var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
                var projectEnd = new Date(2026, pe.month - 1, pe.day);

                if (project.completed) {
                    if (project.completed === 'delayed') {
                        delayedDone++;
                    } else {
                        completed++;
                    }
                } else if (!project.actualStart) {
                    notStarted++;
                } else if (todayTime > projectEnd.getTime()) {
                    delayed++;
                } else if (project.delayDays > 0 || project.isDelayed) {
                    warning++;
                } else {
                    normal++;
                }
            });

            var statValues = document.querySelectorAll('.stat-value');
            statValues.forEach(function(el) {
                var stat = el.getAttribute('data-stat');
                if (stat === 'delayed') el.textContent = delayed;
                if (stat === 'warning') el.textContent = warning;
                if (stat === 'completed') el.textContent = completed;
                if (stat === 'delayed-done') el.textContent = delayedDone;
                if (stat === 'normal') el.textContent = normal;
                if (stat === 'not-started') el.textContent = notStarted;
            });
        }

        function getFilteredProjects() {
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var todayTime = today.getTime();
            var result = [];
            projectData.forEach(function(project) {
                if (searchFilter) {
                    if (searchFilter.name) {
                        if (project.name.toLowerCase().indexOf(searchFilter.name.toLowerCase()) === -1) return;
                    }
                    if (searchFilter.date) {
                        var ps = offsetDay(project.projectStart.month, project.projectStart.day);
                        var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
                        var pStart = new Date(2026, ps.month - 1, ps.day);
                        var pEnd = new Date(2026, pe.month - 1, pe.day);
                        var parts = searchFilter.date.split('-');
                        var sDate = new Date(2026, parseInt(parts[1]) - 1, parseInt(parts[2]));
                        if (sDate < pStart || sDate > pEnd) return;
                    }
                    if (searchFilter.status) {
                        var tip = getProjectTooltip(project);
                        if (searchFilter.status === 'completed') {
                            if (tip.statusText.indexOf('已完成') !== 0) return;
                        } else if (searchFilter.status === 'not-started') {
                            if (tip.statusText.indexOf('未开始') !== 0) return;
                        } else if (searchFilter.status === 'in-progress') {
                            if (tip.statusText.indexOf('进行中') !== 0) return;
                        }
                    }
                }
                result.push(project);
            });
            return result;
        }

        function renderProjectList() {
            var container = document.getElementById('project-list-content');
            if (!container) return;

            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var todayTime = today.getTime();

            // 过滤
            var filteredData = getFilteredProjects();

            // 分页
            var total = filteredData.length;
            var totalPages = Math.ceil(total / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            var startIdx = (currentPage - 1) * pageSize;
            var endIdx = Math.min(startIdx + pageSize, total);
            var pageData = filteredData.slice(startIdx, endIdx);

            container.innerHTML = '';

            if (pageData.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><span>暂无数据</span></div>';
            }

            pageData.forEach(function(project, pageIdx) {
                var ps = offsetDay(project.projectStart.month, project.projectStart.day);
                var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
                var projectStart = new Date(2026, ps.month - 1, ps.day);
                var projectEnd = new Date(2026, pe.month - 1, pe.day);

                // 使用 tooltip 函数获取状态信息
                var tip = getProjectTooltip(project);
                var statusLabel = '';
                var statusDesc = '';
                var tagClass = '';
                var progressClass = '';

                if (tip.statusText.indexOf('已完成') === 0) {
                    statusLabel = '已完成';
                    statusDesc = tip.statusText.replace(/^已完成，?/, '');
                    if (tip.statusClass === 'delayed') {
                        tagClass = 'delayed-done-tag';
                        progressClass = 'delayed-done-progress';
                    } else {
                        tagClass = 'completed-tag';
                        progressClass = 'completed-progress';
                    }
                } else if (tip.statusText.indexOf('未开始') === 0) {
                    statusLabel = '未开始';
                    tagClass = 'not-started-tag';
                    progressClass = 'not-started-progress';
                    statusDesc = '';
                } else if (tip.statusText.indexOf('进行中') === 0) {
                    statusLabel = '进行中';
                    statusDesc = tip.statusText.replace(/^进行中，?/, '');
                    if (tip.statusClass === 'delayed') {
                        tagClass = 'delayed-tag';
                        progressClass = 'delayed-progress';
                    } else if (tip.statusClass === 'warning') {
                        tagClass = 'warning-tag';
                        progressClass = 'warning-progress';
                    } else {
                        tagClass = 'normal-tag';
                        progressClass = 'normal-progress';
                    }
                } else {
                    statusLabel = tip.statusText;
                    tagClass = 'normal-tag';
                    progressClass = 'normal-progress';
                }

                // 进度百分比
                // 公式：实际天数 ≤ 预计天数 → 实际/预计；实际天数 > 预计天数 → 预计/实际
                var progressPercent = 0;
                if (project.completed) {
                    progressPercent = 100;
                } else if (project.actualStart) {
                    var as = offsetDay(project.actualStart.month, project.actualStart.day);
                    var actualStart = new Date(2026, as.month - 1, as.day);
                    var totalDays = (projectEnd.getTime() - projectStart.getTime()) / (24 * 60 * 60 * 1000);
                    var elapsedDays = (todayTime - actualStart.getTime()) / (24 * 60 * 60 * 1000);
                    if (totalDays > 0 && elapsedDays > 0) {
                        if (elapsedDays <= totalDays) {
                            progressPercent = Math.round((elapsedDays / totalDays) * 100);
                        } else {
                            progressPercent = Math.round((totalDays / elapsedDays) * 100);
                        }
                        progressPercent = Math.max(0, Math.min(100, progressPercent));
                    }
                }

                var timeStr = formatDate(ps.month, ps.day) + ' ~ ' + formatDate(pe.month, pe.day);

                var item = document.createElement('div');
                item.className = 'list-item';
                var globalIdx = projectData.indexOf(project);
                item.setAttribute('data-project-index', globalIdx);
                item.innerHTML =
                    '<div class="project-name">' + project.name + '</div>' +
                    '<div class="project-status">' +
                        '<div>' +
                            '<span class="status-tag ' + tagClass + '">' + statusLabel + '</span>' +
                            (statusDesc ? '<div class="status-desc">' + statusDesc + '</div>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="progress-bar-container">' +
                        '<div class="progress-bar">' +
                            '<div class="progress-fill ' + progressClass + '" style="width:' + progressPercent + '%"></div>' +
                        '</div>' +
                        '<span class="progress-text">' + progressPercent + '%</span>' +
                    '</div>' +
                    '<div class="project-time">' + timeStr + '</div>';

                container.appendChild(item);
            });

            renderPagination(total);
        }

        function renderPagination(total) {
            var totalPages = Math.ceil(total / pageSize) || 1;
            document.getElementById('pagination-total').textContent = total;

            // 左箭头
            var leftBtn = document.querySelector('.pagination-bar .pagination-btn:first-of-type');
            if (leftBtn) leftBtn.disabled = currentPage <= 1;

            // 页码
            var pagesContainer = document.getElementById('pagination-pages');
            var html = '';
            var maxShow = 5;
            var start = Math.max(1, currentPage - Math.floor(maxShow / 2));
            var end = Math.min(totalPages, start + maxShow - 1);
            if (end - start < maxShow - 1) start = Math.max(1, end - maxShow + 1);

            if (start > 1) {
                html += '<button class="pagination-page" onclick="goToPage(1)">1</button>';
                if (start > 2) html += '<span class="pagination-ellipsis">...</span>';
            }
            for (var i = start; i <= end; i++) {
                html += '<button class="pagination-page' + (i === currentPage ? ' active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
            }
            if (end < totalPages) {
                if (end < totalPages - 1) html += '<span class="pagination-ellipsis">...</span>';
                html += '<button class="pagination-page" onclick="goToPage(' + totalPages + ')">' + totalPages + '</button>';
            }
            pagesContainer.innerHTML = html;

            // 右箭头
            var rightBtn = document.querySelector('.pagination-bar .pagination-btn:last-of-type');
            // Actually the right arrow is the second btn. Let me use more specific selectors.
            var btns = document.querySelectorAll('.pagination-bar .pagination-btn');
            btns.forEach(function(btn) {
                if (btn.title === '上一页') btn.disabled = currentPage <= 1;
                if (btn.title === '下一页') btn.disabled = currentPage >= totalPages;
            });

            // 跳转input
            document.getElementById('pagination-jump').value = '';
        }

        function goToPage(page) {
            var filteredData = getFilteredProjects();
            var total = filteredData.length;
            var totalPages = Math.ceil(total / pageSize) || 1;
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            currentPage = page;
            renderProjectList();
        }

        function changePageSize(val) {
            pageSize = parseInt(val);
            currentPage = 1;
            renderProjectList();
        }

        function jumpToPage() {
            var input = document.getElementById('pagination-jump');
            var page = parseInt(input.value);
            if (isNaN(page) || page < 1) { input.value = ''; return; }
            goToPage(page);
        }

        function applySearchFilter() {
            var rows = document.querySelectorAll('#gantt-table-body tr');
            if (!searchFilter) {
                rows.forEach(function(row) { row.style.display = ''; });
                if (window._ganttOverlayResize) window._ganttOverlayResize();
                return;
            }

            var searchName = (searchFilter.name || '').toLowerCase();
            var searchDate = searchFilter.date || '';
            var searchStatus = searchFilter.status || '';

            rows.forEach(function(row, index) {
                if (!projectData[index]) { row.style.display = ''; return; }
                var project = projectData[index];

                var nameMatch = !searchName || project.name.toLowerCase().indexOf(searchName) !== -1;
                var dateMatch = true;
                if (searchDate) {
                    var ps = offsetDay(project.projectStart.month, project.projectStart.day);
                    var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
                    var pStart = new Date(2026, ps.month - 1, ps.day);
                    var pEnd = new Date(2026, pe.month - 1, pe.day);
                    var parts = searchDate.split('-');
                    var sDate = new Date(2026, parseInt(parts[1]) - 1, parseInt(parts[2]));
                    dateMatch = sDate >= pStart && sDate <= pEnd;
                }
                var statusMatch = true;
                if (searchStatus) {
                    var tip = getProjectTooltip(project);
                    if (searchStatus === 'completed') {
                        statusMatch = tip.statusText.indexOf('已完成') === 0;
                    } else if (searchStatus === 'not-started') {
                        statusMatch = tip.statusText.indexOf('未开始') === 0;
                    } else if (searchStatus === 'in-progress') {
                        statusMatch = tip.statusText.indexOf('进行中') === 0;
                    }
                }

                row.style.display = (nameMatch && dateMatch && statusMatch) ? '' : 'none';
            });

            if (window._ganttOverlayResize) window._ganttOverlayResize();
        }

        function getDateStatus(projectIndex, date) {
            var project = projectData[projectIndex];
            if (!project) return '';

            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var ps = offsetDay(project.projectStart.month, project.projectStart.day);
            var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
            var projectStart = new Date(2026, ps.month - 1, ps.day);
            var projectEnd = new Date(2026, pe.month - 1, pe.day);
            var isInGray = date >= projectStart && date <= projectEnd;

            // 已完成项目
            if (project.completed) {
                var cd = offsetDay(project.completedDate.month, project.completedDate.day);
                var completedDate = new Date(2026, cd.month - 1, cd.day);
                var as = offsetDay(project.actualStart.month, project.actualStart.day);
                var actualStart = new Date(2026, as.month - 1, as.day);

                // 暗红色：结束日期+1 ～ 完成日期
                var redStart = new Date(projectEnd.getTime() + 24 * 60 * 60 * 1000);
                if (date >= redStart && date <= completedDate) {
                    return 'delayed-completed';
                }

                // 暗蓝色：开始日期 ～ min(完成日期, 结束日期)
                var blueEnd = completedDate < projectEnd ? completedDate : projectEnd;
                if (date >= actualStart && date <= blueEnd) {
                    return 'completed-gantt';
                }

                if (isInGray) return 'project';
                return '';
            }

            // 非完成项目
            // 红色：结束日期+1 ～ 今日
            var redStart = new Date(projectEnd.getTime() + 24 * 60 * 60 * 1000);
            if (date >= redStart && date <= today) {
                return 'delayed';
            }

            if (project.actualStart) {
                var as2 = offsetDay(project.actualStart.month, project.actualStart.day);
                var actualStart = new Date(2026, as2.month - 1, as2.day);

                // 绿色：开始日期 ～ min(今日, 结束日期)
                var greenEnd = today < projectEnd ? today : projectEnd;
                if (date >= actualStart && date <= greenEnd) {
                    return 'active';
                }

                // 黄色：结束日期+1 开始，展示天数 = 实际开始 - 项目开始
                var delayStartDays = Math.round((actualStart.getTime() - projectStart.getTime()) / (24 * 60 * 60 * 1000));
                if (delayStartDays > 0) {
                    var yellowStart = new Date(projectEnd.getTime() + 24 * 60 * 60 * 1000);
                    var yellowEnd = new Date(yellowStart.getTime() + (delayStartDays - 1) * 24 * 60 * 60 * 1000);
                    if (date >= yellowStart && date <= yellowEnd) {
                        return 'warning';
                    }
                }
            }

            // 灰色：项目开始 ～ 结束日期
            if (isInGray) return 'project';
            return '';
        }

        function renderGanttTable() {
            const container = document.querySelector('.gantt-table-container');
            const navRightCol = document.querySelector('.nav-right-col');
            const navLeftCol = document.querySelector('.nav-left-col');
            
            if (!container || !navRightCol) return;

            const ROOT_FS = parseFloat(getComputedStyle(document.documentElement).fontSize);
            const SCALE = ROOT_FS / 16;
            const PROJECT_COL_WIDTH = Math.round(200 * SCALE);
            const NAV_COL_WIDTH = Math.round(40 * SCALE);
            const DATE_CELL_WIDTH = 50 * SCALE;
            const DATE_CELL_WIDTH_REM = (50 / 16);

            const containerWidth = container.offsetWidth;
            const availableWidth = containerWidth - PROJECT_COL_WIDTH - NAV_COL_WIDTH - NAV_COL_WIDTH;
            const dateCount = Math.max(1, Math.floor(availableWidth / DATE_CELL_WIDTH));

            while (navLeftCol.nextElementSibling !== navRightCol) {
                navLeftCol.parentElement.removeChild(navLeftCol.nextElementSibling);
            }

            const rows = document.querySelectorAll('#gantt-table-body tr');
            rows.forEach(row => {
                const navCols = row.querySelectorAll('.nav-col');
                const rightNavCol = navCols[navCols.length - 1];
                const leftNavCol = navCols[0];
                while (leftNavCol.nextElementSibling !== rightNavCol) {
                    leftNavCol.parentElement.removeChild(leftNavCol.nextElementSibling);
                }
            });

            let todayTh = null;

            for (let i = 0; i < dateCount; i++) {
                const date = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + i);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${month}-${day}`;
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const today = new Date();
                const isToday = date.getDate() === today.getDate() && 
                               date.getMonth() === today.getMonth() && 
                               date.getFullYear() === today.getFullYear();

                const th = document.createElement('th');
                th.className = 'date-header' + (isWeekend ? ' weekend' : '');
                th.textContent = dateStr;
                th.style.width = DATE_CELL_WIDTH_REM + 'rem';
                navRightCol.parentElement.insertBefore(th, navRightCol);

                if (isToday) todayTh = th;

                rows.forEach((row, rowIndex) => {
                    const navCols = row.querySelectorAll('.nav-col');
                    const rightNavCol = navCols[navCols.length - 1];
                    const td = document.createElement('td');
                    const status = getDateStatus(rowIndex, date);
                    td.className = 'date-cell' + (isWeekend ? ' weekend' : '') + (status ? ' ' + status : '');
                    td.style.width = DATE_CELL_WIDTH_REM + 'rem';
                    rightNavCol.parentElement.insertBefore(td, rightNavCol);
                });
            }

            // 移除旧的今日列 overlay
            let oldOverlay = document.querySelector('.today-column-overlay');
            if (oldOverlay) oldOverlay.remove();

            // 绘制今日列整列 overlay — position:fixed，直接用视口坐标
            if (todayTh) {
                function updateOverlay() {
                    const thRect = todayTh.getBoundingClientRect();
                    const tbody = document.getElementById('gantt-table-body');
                    const tbodyRect = tbody.getBoundingClientRect();
                    const containerRect = document.querySelector('.gantt-table-container').getBoundingClientRect();
                    const pad = Math.round(6 * SCALE);
                    // 从表头单元格顶部开始，底部不超出容器可见区域
                    const overlayTop = thRect.top;
                    const overlayBottom = Math.min(tbodyRect.bottom, containerRect.bottom);
                    const overlayHeight = overlayBottom - overlayTop + pad * 2;

                    let overlay = document.querySelector('.today-column-overlay');
                    if (!overlay) {
                        overlay = document.createElement('div');
                        overlay.className = 'today-column-overlay';
                        document.body.appendChild(overlay);
                    }
                    overlay.style.left = (thRect.left - pad) + 'px';
                    overlay.style.width = (thRect.width + pad * 2) + 'px';
                    overlay.style.top = (overlayTop - pad) + 'px';
                    overlay.style.height = overlayHeight + 'px';
                }

                requestAnimationFrame(updateOverlay);
                // 滚动或缩放时更新位置
                window.removeEventListener('scroll', window._ganttOverlayScroll);
                window.removeEventListener('resize', window._ganttOverlayResize);
                window._ganttOverlayScroll = updateOverlay;
                window._ganttOverlayResize = updateOverlay;
                window.addEventListener('scroll', window._ganttOverlayScroll, true);
                window.addEventListener('resize', window._ganttOverlayResize);
            }

            bindProjectHover();
        }

        function scrollDates(direction) {
            const daysToAdd = direction * 7;
            startDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + daysToAdd);
            renderGanttTable();
        }

        function resetSearch() {
            document.querySelector('.search-input').value = '';
            var dateInputs = document.querySelectorAll('.date-input');
            dateInputs.forEach(function(input) { input.value = ''; });
            document.getElementById('search-status').value = '';
            searchFilter = null;
            currentPage = 1;
            applySearchFilter();
            renderProjectList();
        }

        function doSearch() {
            var name = document.querySelector('.search-input').value.trim();
            var date = document.querySelector('.date-input').value;
            var status = document.getElementById('search-status').value;

            if (!name && !date && !status) {
                searchFilter = null;
            } else {
                searchFilter = { name: name, date: date, status: status };
            }
            currentPage = 1;
            applySearchFilter();
            renderProjectList();
        }

        // ===== 甘特图 hover 提示 =====
        function formatDate(m, d) {
            return `2026-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        }

        function getProjectTooltip(project) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayTime = today.getTime();
            var ps = offsetDay(project.projectStart.month, project.projectStart.day);
            var pe = offsetDay(project.projectEnd.month, project.projectEnd.day);
            var startDate = new Date(2026, ps.month - 1, ps.day);
            var endDate = new Date(2026, pe.month - 1, pe.day);
            var actualStartData = project.actualStart ? offsetDay(project.actualStart.month, project.actualStart.day) : null;
            var actualStart = actualStartData ? new Date(2026, actualStartData.month - 1, actualStartData.day) : null;

            const projectRange = `${formatDate(ps.month, ps.day)} ～ ${formatDate(pe.month, pe.day)}`;
            const actualStartStr = actualStartData ? formatDate(actualStartData.month, actualStartData.day) : '未开始';

            let statusText = '';
            let statusClass = '';

            if (project.completed) {
                // 已完成项目：用实际完成日期计算
                var cd = offsetDay(project.completedDate.month, project.completedDate.day);
                var completedDate = new Date(2026, cd.month - 1, cd.day);
                const delayFinishDays = Math.ceil((completedDate.getTime() - endDate.getTime()) / (24 * 60 * 60 * 1000));

                if (delayFinishDays > 0) {
                    statusText = '已完成，延期 ' + delayFinishDays + ' 天';
                    statusClass = 'delayed';
                } else if (delayFinishDays === 0) {
                    statusText = '已完成，按时交付';
                    statusClass = 'active';
                } else {
                    const earlyFinishDays = Math.ceil((endDate.getTime() - completedDate.getTime()) / (24 * 60 * 60 * 1000));
                    statusText = '已完成，提前 ' + earlyFinishDays + ' 天';
                    statusClass = 'active';
                }
                return { projectName: project.name, projectRange, actualStartStr, statusText, statusClass, completed: project.completed, completedDate: cd };
            } else if (todayTime < startDate.getTime()) {
                statusText = '未开始';
                statusClass = '';
            } else {
                // 进行中
                // 已延期天数 = 今日日期 - 项目结束日期
                var overdueDays = Math.max(0, Math.ceil((todayTime - endDate.getTime()) / (24 * 60 * 60 * 1000)));
                // 可能延期天数 = 实际开始日期 - 项目开始日期 - 已延期天数
                var possibleDelay = actualStart
                    ? Math.max(0, Math.round((actualStart.getTime() - startDate.getTime()) / (24 * 60 * 60 * 1000)) - overdueDays)
                    : 0;

                if (possibleDelay > 0 && overdueDays > 0) {
                    statusText = '进行中，已延期 ' + overdueDays + ' 天，还可能延期 ' + possibleDelay + ' 天';
                    statusClass = 'delayed';
                } else if (possibleDelay > 0 && overdueDays <= 0) {
                    statusText = '进行中，可能延期 ' + possibleDelay + ' 天';
                    statusClass = 'warning';
                } else if (overdueDays > 0) {
                    statusText = '进行中，已延期 ' + overdueDays + ' 天';
                    statusClass = 'delayed';
                } else if (actualStart) {
                    statusText = '进行中';
                    statusClass = 'active';
                } else {
                    statusText = '未开始';
                    statusClass = '';
                }
            }

            return { projectName: project.name, projectRange, actualStartStr, statusText, statusClass, completed: project.completed, completedDate: project.completedDate ? offsetDay(project.completedDate.month, project.completedDate.day) : null };
        }

        let tooltipTimer = null;

        function showTooltip(e, project) {
            const tooltip = document.getElementById('gantt-tooltip');
            if (!tooltip) return;

            const info = getProjectTooltip(project);
            const dotColor = info.statusClass === 'delayed' ? '#FF4D4F'
                : info.statusClass === 'warning' ? '#FAAD14'
                : info.statusClass === 'active' ? '#52C41A'
                : '#909399';

            var completedDateStr = '';
            if (info.completed && info.completedDate) {
                completedDateStr = '<div><span class="tt-label">完成日期：</span>' + formatDate(info.completedDate.month, info.completedDate.day) + '</div>';
            }

            tooltip.innerHTML = [
                '<div style="font-weight:600;margin-bottom:4px;color:#1D2129;">' + info.projectName + '</div>',
                '<div><span class="tt-label">项目日期：</span>' + info.projectRange + '</div>',
                '<div><span class="tt-label">开始日期：</span>' + info.actualStartStr + '</div>',
                completedDateStr,
                '<div class="tt-status"><span class="tt-label">项目状态：</span><span class="tt-dot" style="background-color:' + dotColor + '"></span>' + info.statusText + '</div>'
            ].join('');

            const ganttContent = document.querySelector('.gantt-content');
            const contentRect = ganttContent.getBoundingClientRect();
            tooltip.style.left = (e.clientX - contentRect.left + 16) + 'px';
            tooltip.style.top = (e.clientY - contentRect.top + 12) + 'px';
            tooltip.classList.add('show');
        }

        function moveTooltip(e) {
            const tooltip = document.getElementById('gantt-tooltip');
            if (!tooltip || !tooltip.classList.contains('show')) return;
            const contentRect = document.querySelector('.gantt-content').getBoundingClientRect();
            tooltip.style.left = (e.clientX - contentRect.left + 16) + 'px';
            tooltip.style.top = (e.clientY - contentRect.top + 12) + 'px';
        }

        function hideTooltip() {
            const tooltip = document.getElementById('gantt-tooltip');
            if (!tooltip) return;
            if (tooltipTimer) clearTimeout(tooltipTimer);
            tooltipTimer = setTimeout(function() {
                tooltip.classList.remove('show');
            }, 150);
        }

        function bindProjectHover() {
            var rows = document.querySelectorAll('#gantt-table-body tr');
            rows.forEach(function(row, index) {
                if (!projectData[index]) return;

                // 先解绑旧事件（以防重复绑定）
                row.removeEventListener('mouseenter', row._hoverEnter);
                row.removeEventListener('mouseleave', row._hoverLeave);
                row.removeEventListener('mousemove', row._hoverMove);

                // 只绑定日期单元格 td.date-cell 的 hover 事件
                var dateCells = row.querySelectorAll('td.date-cell');
                dateCells.forEach(function(td) {
                    td.removeEventListener('mouseenter', td._hoverEnter);
                    td.removeEventListener('mouseleave', td._hoverLeave);
                    td.removeEventListener('mousemove', td._hoverMove);

                    td._hoverEnter = function(e) {
                        if (tooltipTimer) clearTimeout(tooltipTimer);
                        showTooltip(e, projectData[index]);
                    };
                    td._hoverLeave = function() { hideTooltip(); };
                    td._hoverMove = function(e) { moveTooltip(e); };

                    td.addEventListener('mouseenter', td._hoverEnter);
                    td.addEventListener('mouseleave', td._hoverLeave);
                    td.addEventListener('mousemove', td._hoverMove);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderGanttTable();
            updateStatsCards();
            renderProjectList();
        });
        window.addEventListener('resize', renderGanttTable);
    </script>
</body>
