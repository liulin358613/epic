<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>工业智能生产力平台</title>
    <style>
        /* 响应式基础字体设置 */
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @media (max-width: 1440px) {
            html { font-size: 15px; }
        }

        @media (max-width: 1366px) {
            html { font-size: 14px; }
        }

        @media (max-width: 1280px) {
            html { font-size: 13px; }
        }

        @media (max-width: 1024px) {
            html { font-size: 12px; }
        }

        @media (max-width: 768px) {
            html { font-size: 11px; }
        }

        @media (max-width: 600px) {
            html { font-size: 10px; }
        }

        :root {
            --klein-blue: #0051d9;
            --hermes-orange: #F37021;
            --deep-gray: #1D2129;
            --light-gray: #86909C;
            --light-bg: #F2F3F5;
            --white: #FFFFFF;
            --border: #E5E7EB;

            --font-size-base: 0.75rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
            --spacing-3xl: 1.5rem;
            --spacing-4xl: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .top-nav {
            background: var(--klein-blue);
            height: 2.25rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99998;
        }

        .nav-container {
            width: 90rem;
            max-width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-xl);
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            font-size: var(--font-size-base);
            color: var(--white);
            line-height: 2.25rem;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            display: inline-block;
            line-height: 2.25rem;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--hermes-orange);
        }

        .logout-link {
            color: var(--hermes-orange);
            text-decoration: none;
            display: inline-block;
            line-height: 2.25rem;
            transition: all 0.3s;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--white);
        }

        .location-icon {
            width: 0.875rem;
            height: 0.875rem;
            color: var(--hermes-orange);
        }

        .location-text {
            color: var(--hermes-orange);
        }

        .switch-city {
            color: var(--light-gray);
        }

        .message-badge {
            color: var(--hermes-orange);
            font-weight: bold;
        }

        .logged-nav {
            z-index: 99997;
        }

        @media (max-width: 1024px) {
            .nav-container {
                width: 100%;
                padding: 0 var(--spacing-lg);
            }

            .nav-left, .nav-right {
                gap: 1rem;
                font-size: 0.6875rem;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                height: 2rem;
            }

            .nav-left, .nav-right {
                gap: 0.75rem;
                font-size: 0.625rem;
            }

            .nav-container {
                padding: 0 var(--spacing-md);
            }
        }

        @media (max-width: 600px) {
            .nav-left span, .nav-right a {
                display: none;
            }

            .nav-left span:first-child {
                display: inline-block;
            }

            .nav-right a:first-child {
                display: inline-block;
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            const unloggedNav = document.getElementById('unloggedNav');
            const loggedNav = document.getElementById('loggedNav');

            if (unloggedNav && loggedNav) {
                if (isLoggedIn) {
                    unloggedNav.style.display = 'none';
                    loggedNav.style.display = 'block';
                } else {
                    unloggedNav.style.display = 'block';
                    loggedNav.style.display = 'none';
                }
            }

            const loginButtons = document.querySelectorAll('a[href="#"]');
            loginButtons.forEach(button => {
                if (button.textContent.trim() === '登录') {
                    button.addEventListener('click', function(e) {
                        e.preventDefault();
                        window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
                    });
                }
            });

            const logoutButtons = document.querySelectorAll('a[onclick="showLogoutConfirm()"]');
            logoutButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.parent.postMessage({ type: 'SHOW_LOGOUT_MODAL' }, '*');
                });
            });
        });

        function goToPersonalCenter() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (isLoggedIn) {
                window.top.location.href = 'personal_center.html';
            } else {
                window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
            }
        }

        function showLogoutConfirm() {
            window.parent.postMessage({ type: 'SHOW_LOGOUT_MODAL' }, '*');
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOGIN_SUCCESS') {
                window.location.reload();
            }
        });
    </script>
</head>
<body>
    <div id="unloggedNav" class="top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <span>您好！欢迎您</span>
                <a href="#" class="nav-link">登录</a>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link">消息中心</a>
                <a href="#" class="nav-link">我的订单</a>
                <a href="#" onclick="goToPersonalCenter()" class="nav-link">个人中心</a>
                <a href="#" class="nav-link">创建组织</a>
                <a href="#" class="nav-link"></a>
                <div class="location-info">
                    <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="location-text">北京</span>
                    <span class="switch-city">[切换城市]</span>
                </div>
            </div>
        </div>
    </div>

    <div id="loggedNav" class="top-nav logged-nav" style="display: none;">
        <div class="nav-container">
            <div class="nav-left">
                <span>林工，您好</span>
                <a href="#" class="logout-link" onclick="showLogoutConfirm()">退出</a>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link">消息中心<span class="message-badge">(99+)</span></a>
                <a href="#" class="nav-link">我的订单</a>
                <a href="#" onclick="goToPersonalCenter()" class="nav-link">个人中心</a>
                <a href="#" class="nav-link">创建组织</a>
                <a href="#" class="nav-link"></a>
                <div class="location-info">
                    <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span class="location-text">北京</span>
                    <span class="switch-city">[切换城市]</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
