<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>组织后台管理系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            font-size: 14px;
            line-height: 1.5;
        }
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }
        .left-section {
            flex: 1;
        }
        .middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px;
            color: white;
        }
        .right-section {
            flex: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .logo-area {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .logo-title {
            font-size: 100px !important;
            font-weight: 700 !important;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            -moz-background-clip: text !important;
            -moz-text-fill-color: transparent !important;
            background-clip: text !important;
            color: transparent !important;
            line-height: 1.2 !important;
            margin-bottom: 16px !important;
        }
        .logo-subtitle {
            font-size: 36px !important;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            -moz-background-clip: text !important;
            -moz-text-fill-color: transparent !important;
            background-clip: text !important;
            color: transparent !important;
            line-height: 1.4 !important;
            margin-bottom: 20px !important;
        }
        .logo-title-bottom {
            font-size: 28px !important;
            font-weight: 500 !important;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            -moz-background-clip: text !important;
            -moz-text-fill-color: transparent !important;
            background-clip: text !important;
            color: transparent !important;
            line-height: 1.4 !important;
        }
        .logo-tagline {
            font-size: 16px;
            color: #f97316;
            line-height: 1.4;
        }
        .feature-list {
            list-style: none;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-icon .fa {
            color: #8b5cf6;
            font-size: 20px;
        }
        .feature-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
        }

        .login-card {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-subtitle {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .login-tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        .login-tab:hover {
            color: #0051D9;
        }
        .login-tab.active {
            color: #0051D9;
            font-weight: 600;
        }
        .login-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: #0051D9;
            border-radius: 2px;
        }
        .sms-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            padding: 6px 16px;
            background: rgba(0, 81, 217, 0.1);
            color: #0051D9;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .sms-btn:hover:not(:disabled) {
            background: rgba(0, 81, 217, 0.2);
        }
        .sms-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .password-input {
            padding-right: 44px !important;
        }
        .input-wrapper .password-toggle {
            position: absolute;
            left: auto !important;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10;
        }
        .input-wrapper .password-toggle:hover {
            color: #0051D9;
        }

        .form-group {
            margin-bottom: 12px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .fa {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
            line-height: 1.4;
        }
        .form-input:focus {
            outline: none;
            border-color: #0051D9;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }
        .form-input::placeholder {
            color: #94a3b8;
        }

        .remember-forgot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .checkbox-wrapper input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0051D9;
        }
        .checkbox-label {
            font-size: 13px;
            color: #64748b;
        }
        .forgot-link {
            font-size: 13px;
            color: #0051D9;
            text-decoration: none;
            transition: color 0.3s;
        }
        .forgot-link:hover {
            color: #0047c9;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0051D9 0%, #0066FF 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 81, 217, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .register-link a {
            color: #0051D9;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider-text {
            font-size: 12px;
            color: #94a3b8;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            border-color: #0051D9;
            background: #f0f9ff;
        }
        .social-btn span {
            font-size: 13px;
            color: #475569;
        }
        .social-btn .fa {
            font-size: 16px;
        }
        .social-btn.wechat .fa {
            color: #07c160;
        }
        .social-btn.alipay .fa {
            color: #1677ff;
        }

        @media (max-width: 1024px) {
            .left-section {
                display: none;
            }
            .middle-section {
                padding: 40px;
            }
            .platform-title {
                font-size: 36px;
            }
            .platform-subtitle {
                font-size: 18px;
            }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }
            .middle-section {
                align-items: center;
                padding: 40px 20px;
                text-align: center;
            }
            .feature-list {
                display: none;
            }
            .platform-subtitle {
                margin-bottom: 20px;
            }
            .right-section {
                padding: 20px;
            }
            .login-card {
                padding: 30px 20px;
            }
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 1.5px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1.5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        ::-webkit-scrollbar-thumb:active {
            background: rgba(255, 255, 255, 0.3);
        }
        body {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="left-section"></div>
        
        <div class="middle-section">
            <div class="logo-area">
                <svg width="600" height="150" viewBox="0 0 600 150">
                    <defs>
                        <linearGradient id="logoGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <text x="300" y="110" font-family="Arial, sans-serif" font-size="120" font-weight="700" fill="url(#logoGradient1)" text-anchor="middle">RaaS.Dao</text>
                </svg>
                <svg width="260" height="70" viewBox="0 0 260 70">
                    <defs>
                        <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <text x="130" y="50" font-family="Arial, sans-serif" font-size="44" font-weight="600" fill="url(#logoGradient2)" text-anchor="middle">共创 · 共享</text>
                </svg>
                <div style="margin-top: 30px;">
                    <svg width="500" height="55" viewBox="0 0 500 55">
                        <text x="250" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#94a3b8" text-anchor="middle">RaaS.Dao 组织后台管理系统</text>
                    </svg>
                </div>
            </div>
        </div>

        <div class="right-section">
            <div class="login-card">
                <h2 class="card-title">欢迎登录</h2>
                <p class="card-subtitle">请输入账号信息登录组织后台管理系统</p>
                
                <div class="login-tabs">
                    <div class="login-tab active" id="pwdTab">账号密码登录</div>
                    <div class="login-tab" id="smsTab">验证码登录</div>
                </div>
                
                <form id="loginForm">
                    <!-- 账号密码登录表单 -->
                    <div id="pwdForm">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fa fa-user"></i>
                                <input type="text" class="form-input" placeholder="账号/手机号" id="username">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fa fa-lock"></i>
                                <input type="password" class="form-input password-input" placeholder="密码" id="password">
                                <i class="fa fa-eye password-toggle" id="passwordToggle"></i>
                            </div>
                        </div>
                        
                        <div class="remember-forgot">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkbox-label">记住我</span>
                            </label>
                            <a href="#" class="forgot-link">忘记密码？</a>
                        </div>
                    </div>
                    
                    <!-- 验证码登录表单 -->
                    <div id="smsForm" style="display: none;">
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fa fa-phone"></i>
                                <input type="text" class="form-input" placeholder="手机号" id="phone">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fa fa-key"></i>
                                <input type="text" class="form-input" placeholder="验证码" id="smsCode">
                                <button type="button" class="sms-btn" id="smsBtn">获取验证码</button>
                            </div>
                        </div>
                        
                        <div class="remember-forgot" style="margin-bottom: 28px;">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberSms">
                                <span class="checkbox-label">记住我</span>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">登 录</button>
                </form>
                
                <p class="register-link">
                    还没有组织？ <a href="#">立即创建</a>
                </p>
                
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">其他登录方式</span>
                    <span class="divider-line"></span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn wechat">
                        <i class="fa fa-weixin"></i>
                        <span>微信登录</span>
                    </button>
                    <button class="social-btn alipay">
                        <i class="fa fa-credit-card"></i>
                        <span>支付宝登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 登录方式切换
        const pwdTab = document.getElementById('pwdTab');
        const smsTab = document.getElementById('smsTab');
        const pwdForm = document.getElementById('pwdForm');
        const smsForm = document.getElementById('smsForm');
        
        pwdTab.addEventListener('click', function() {
            pwdTab.classList.add('active');
            smsTab.classList.remove('active');
            pwdForm.style.display = 'block';
            smsForm.style.display = 'none';
        });
        
        smsTab.addEventListener('click', function() {
            smsTab.classList.add('active');
            pwdTab.classList.remove('active');
            smsForm.style.display = 'block';
            pwdForm.style.display = 'none';
        });
        
        // 验证码倒计时
        const smsBtn = document.getElementById('smsBtn');
        let countdown = 0;
        
        smsBtn.addEventListener('click', function() {
            const phone = document.getElementById('phone').value;
            if (!phone) {
                alert('请输入手机号');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }
            
            countdown = 60;
            smsBtn.disabled = true;
            smsBtn.textContent = `${countdown}秒后重新获取`;
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    smsBtn.disabled = false;
                    smsBtn.textContent = '获取验证码';
                } else {
                    smsBtn.textContent = `${countdown}秒后重新获取`;
                }
            }, 1000);
        });
        
        // 密码可见性切换
        const passwordToggle = document.getElementById('passwordToggle');
        const password = document.getElementById('password');
        
        passwordToggle.addEventListener('click', function() {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            passwordToggle.classList.toggle('fa-eye');
            passwordToggle.classList.toggle('fa-eye-slash');
        });
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
