<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>组织后台管理系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            font-size: 14px;
            line-height: 1.5;
        }
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }
        .left-section {
            flex: 1;
        }
        .middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px;
            color: white;
        }
        .right-section {
            flex: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .logo-area {
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0051D9 0%, #0066FF 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 81, 217, 0.4);
            margin-bottom: 10px;
        }
        .logo-icon img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        .platform-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .platform-subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 60px;
            line-height: 1.3;
        }
        .feature-list {
            list-style: none;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(0, 81, 217, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-icon .fa {
            color: #0066FF;
            font-size: 20px;
        }
        .feature-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
        }

        .login-card {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-subtitle {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 12px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .fa {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
            line-height: 1.4;
        }
        .form-input:focus {
            outline: none;
            border-color: #0051D9;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 81, 217, 0.1);
        }
        .form-input::placeholder {
            color: #94a3b8;
        }

        .remember-forgot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .checkbox-wrapper input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0051D9;
        }
        .checkbox-label {
            font-size: 13px;
            color: #64748b;
        }
        .forgot-link {
            font-size: 13px;
            color: #0051D9;
            text-decoration: none;
            transition: color 0.3s;
        }
        .forgot-link:hover {
            color: #0047c9;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0051D9 0%, #0066FF 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 81, 217, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .register-link a {
            color: #0051D9;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider-text {
            font-size: 12px;
            color: #94a3b8;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }
        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            border-color: #0051D9;
            background: #f0f9ff;
        }
        .social-btn span {
            font-size: 13px;
            color: #475569;
        }
        .social-btn .fa {
            font-size: 16px;
        }
        .social-btn.wechat .fa {
            color: #07c160;
        }
        .social-btn.alipay .fa {
            color: #1677ff;
        }

        @media (max-width: 1024px) {
            .left-section {
                display: none;
            }
            .middle-section {
                padding: 40px;
            }
            .platform-title {
                font-size: 36px;
            }
            .platform-subtitle {
                font-size: 18px;
            }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }
            .middle-section {
                align-items: center;
                padding: 40px 20px;
                text-align: center;
            }
            .feature-list {
                display: none;
            }
            .platform-subtitle {
                margin-bottom: 20px;
            }
            .right-section {
                padding: 20px;
            }
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="left-section"></div>
        
        <div class="middle-section">
            <div class="logo-area">
                <div class="logo-icon">
                    <img src="A/images/logo.png" alt="Logo">
                </div>
                <h1 class="platform-title">组织后台管理</h1>
                <p class="platform-subtitle">RaaS.Dao 组织后台管理系统</p>
            </div>
            <ul class="feature-list">
                <li class="feature-item">
                    <div class="feature-icon"><i class="fa fa-shield"></i></div>
                    <span class="feature-text">企业级安全保障</span>
                </li>
                <li class="feature-item">
                    <div class="feature-icon"><i class="fa fa-users"></i></div>
                    <span class="feature-text">智能组织管理</span>
                </li>
                <li class="feature-item">
                    <div class="feature-icon"><i class="fa fa-line-chart"></i></div>
                    <span class="feature-text">实时数据分析</span>
                </li>
                <li class="feature-item">
                    <div class="feature-icon"><i class="fa fa-cog"></i></div>
                    <span class="feature-text">灵活配置管理</span>
                </li>
            </ul>
        </div>

        <div class="right-section">
            <div class="login-card">
                <h2 class="card-title">欢迎登录</h2>
                <p class="card-subtitle">请输入账号信息登录组织后台管理系统</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fa fa-user"></i>
                            <input type="text" class="form-input" placeholder="账号/手机号" id="username">
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fa fa-lock"></i>
                            <input type="password" class="form-input" placeholder="密码" id="password">
                        </div>
                    </div>
                    
                    <div class="remember-forgot">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkbox-label">记住我</span>
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn">登 录</button>
                </form>
                
                <p class="register-link">
                    还没有账号？ <a href="#">立即注册</a>
                </p>
                
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">其他登录方式</span>
                    <span class="divider-line"></span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn wechat">
                        <i class="fa fa-weixin"></i>
                        <span>微信登录</span>
                    </button>
                    <button class="social-btn alipay">
                        <i class="fa fa-credit-card"></i>
                        <span>支付宝登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
