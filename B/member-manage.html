<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>组织成员管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            height: 100%;
            margin: 0;
            padding: 0;
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        /* Tab样式 */
        .tab-container {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 角色说明图标样式 */
        .role-description-icon {
            position: relative;
            cursor: help;
        }
        .role-description-icon:hover .role-description-tooltip {
            opacity: 1 !important;
            visibility: visible !important;
        }
        .role-description-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 999999;
            pointer-events: none;
        }
        .tab:hover {
            color: #3b82f6;
            background: #f1f5f9;
        }
        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
            background: white;
            font-weight: 500;
        }
        /* 双栏布局 */
        .content-layout {
            display: flex;
            gap: 16px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        /* 左侧面板 */
        .left-panel {
            width: 260px;
            flex-shrink: 0;
        }
        .left-panel .card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .section-header {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title i {
            color: #64748b;
        }
        .section-content {
            padding: 8px;
            flex: 1;
            overflow-y: auto;
        }
        /* 组织列表 */
        .org-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .org-item {
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 6px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .org-item:hover {
            background: #f1f5f9;
        }
        .org-item.active {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
        }
        .org-item.child {
            padding-left: 30px;
            position: relative;
        }
        .org-item.child::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 16px;
            width: 10px;
            height: 2px;
            background-color: #e2e8f0;
        }
        .org-item .org-status {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 4px;
            font-weight: 500;
        }
        .org-item .org-status.status-pending {
            background-color: #fff3e0;
            color: #e65100;
        }
        .org-item .org-status.status-rejected {
            background-color: #ffebee;
            color: #c62828;
        }
        .org-item .org-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .org-item .org-members {
            flex-shrink: 0;
            margin-left: 4px;
            color: #64748b;
        }
        /* 右侧面板 */
        .right-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .right-panel .card {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        /* 搜索栏 */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
        }
        .search-input {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            width: 200px;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .search-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            width: 160px;
            outline: none;
            background: white;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .search-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        /* 按钮样式 */
        .btn-add {
            padding: 6px 14px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .btn-add:hover {
            background: #16a34a;
        }
        /* 表格样式 */
        .table-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .table-body {
            flex: 1;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 10px 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
            color: #475569;
            white-space: nowrap;
        }
        tr:hover td {
            background: #f8fafc;
        }
        .table-body tbody {
            width: 100%;
        }
        .table-body thead {
            width: 100%;
        }
        /* 头像样式 */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #64748b;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        /* 开关样式 */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 24px;
            cursor: pointer;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .switch-track {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #94a3b8;
            border-radius: 24px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }
        .switch-track::before {
            content: '禁用';
            position: absolute;
            right: 8px;
            font-size: 10px;
            font-weight: 500;
            color: white;
            transition: 0.3s;
            z-index: 1;
        }
        .switch-thumb {
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
            z-index: 2;
        }
        input:checked + .switch-track {
            background-color: #10b981;
        }
        input:checked + .switch-track::before {
            content: '启用';
            left: 8px;
            right: auto;
        }
        input:checked + .switch-track .switch-thumb {
            transform: translateX(36px);
        }
        /* 操作按钮 */
        .action-btn {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            margin-right: 4px;
            transition: all 0.2s;
        }
        .action-btn.edit {
            background: #f1f5f9;
            color: #3b82f6;
        }
        .action-btn.edit:hover {
            background: #dbeafe;
        }
        .action-btn.delete {
            background: #fef2f2;
            color: #ef4444;
        }
        .action-btn.delete:hover {
            background: #fee2e2;
        }
        /* 分页样式 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 12px;
        }
        .pagination-text {
            font-size: 13px;
            color: #64748b;
        }
        .pagination-center {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pagination-btn {
            width: 30px;
            height: 30px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #64748b;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(.active):not(:disabled) {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .pagination-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-select {
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 12px;
            color: #64748b;
            background: white;
            outline: none;
            cursor: pointer;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease-out;
        }
        .modal-header {
            padding: 12px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header .close-btn {
            background: transparent;
            border: none;
            font-size: 18px;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .modal-header .close-btn:hover {
            background: #e2e8f0;
            color: #475569;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 12px 20px;
            background: #fafbfc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #64748b;
        }
        .btn-cancel:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #475569;
        }
        .btn-confirm {
            background: #3b82f6;
            color: white;
        }
        .btn-confirm:hover {
            background: #2563eb;
        }
        /* 表单样式 */
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group label {
            font-size: 13px;
            color: #475569;
            font-weight: 500;
        }
        .form-group label .required {
            color: #ef4444;
            font-weight: bold;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            color: #1e293b;
            background: #fafbfc;
            transition: all 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: white;
        }
        /* Toast样式 */
        .toast-container {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            animation: toastIn 0.3s ease-out;
            min-width: 300px;
            max-width: 400px;
        }
        .toast.success {
            background: #dcfce7;
            border: 1px solid #22c55e;
            color: #166534;
        }
        .toast.error {
            background: #fee2e2;
            border: 1px solid #dc2626;
            color: #991b1b;
        }
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes toastIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 美化滚动条 */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 1.5px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 1.5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }
        ::-webkit-scrollbar-thumb:active {
            background: rgba(148, 163, 184, 0.7);
        }
        body {
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.3) transparent;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="card">
            <!-- Tab切换 -->
            <div class="tab-container">
                <div class="tab active" data-tab="member">
                    <i class="fa fa-users"></i> 组织成员
                </div>
                <div class="tab" data-tab="department">
                    <i class="fa fa-building"></i> 组织部门
                </div>
                <div class="tab" data-tab="role">
                    <i class="fa fa-shield"></i> 组织角色
                </div>
            </div>
            
            <!-- 双栏布局 -->
            <div class="content-layout">
                <!-- 左侧组织列表 -->
                <div class="left-panel">
                    <div class="card">
                        <div class="section-header">
                            <div class="section-title">
                                <i class="fa fa-sitemap"></i> 组织
                            </div>
                        </div>
                        <div class="section-content">
                            <ul class="org-list" id="org-list">
                            </ul>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧成员列表 -->
                <div class="right-panel">
                    <div class="card">
                        <div class="section-header">
                            <div class="section-title">
                                <i class="fa fa-users"></i> 成员列表(20)
                            </div>
                        </div>
                        <!-- 搜索栏 -->
                        <div class="search-bar">
                            <input type="text" class="search-input" placeholder="搜索姓名/手机号" id="search-input">
                            <select class="search-select" id="filter-dept">
                                <option value="">全部部门</option>
                                <option value="管理部">管理部</option>
                                <option value="培训部">培训部</option>
                                <option value="行政部">行政部</option>
                                <option value="技术部">技术部</option>
                                <option value="销售部">销售部</option>
                            </select>
                            <select class="search-select" id="filter-role">
                                <option value="">全部角色</option>
                                <option value="总经理">总经理</option>
                                <option value="培训总监">培训总监</option>
                                <option value="高级培训师">高级培训师</option>
                                <option value="行政主管">行政主管</option>
                                <option value="技术主管">技术主管</option>
                            </select>
                            <button class="btn-add" onclick="searchMembers()">
                                <i class="fa fa-search"></i> 搜索
                            </button>
                            <button class="btn-add" onclick="resetSearch()" style="background: #f1f5f9; color: #64748b;">
                                <i class="fa fa-refresh"></i> 重置
                            </button>
                            <button class="btn-add" onclick="openAddModal()">
                                <i class="fa fa-plus"></i> 添加成员
                            </button>
                        </div>
                        
                        <!-- 表格容器 -->
                        <div class="table-container">
                            <div class="table-body">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>头像</th>
                                            <th>姓名</th>
                                            <th>手机号</th>
                                            <th>部门</th>
                                            <th>角色</th>
                                            <th>账号</th>
                                            <th>其他登录方式</th>
                                            <th>账号状态</th>
                                            <th>备注</th>
                                            <th>创建时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="member-table-body">
                                    </tbody>
                                </table>
                            </div>
                            
                            <!-- 分页 -->
                            <div class="pagination">
                                <div class="pagination-text">共 10 条</div>
                                <div class="pagination-center">
                                    <button class="pagination-btn" disabled>
                                        <i class="fa fa-angle-left"></i>
                                    </button>
                                    <button class="pagination-btn active">1</button>
                                    <button class="pagination-btn">2</button>
                                    <button class="pagination-btn">3</button>
                                    <button class="pagination-btn">4</button>
                                    <button class="pagination-btn">5</button>
                                    <button class="pagination-btn">
                                        <i class="fa fa-angle-right"></i>
                                    </button>
                                </div>
                                <div class="pagination-text">
                                    <select class="pagination-select">
                                        <option>10条/页</option>
                                        <option>20条/页</option>
                                        <option>50条/页</option>
                                        <option>100条/页</option>
                                    </select>
                                    <span>跳至</span>
                                    <input type="text" class="search-input" style="width: 40px; padding: 4px 6px;" value="1">
                                    <span>页</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑成员弹窗 -->
    <div id="add-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 600px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;">
            <div class="modal-header" style="border-bottom: 1px solid #e2e8f0; padding: 8px 20px; background: #f8fafc;">
                <h3 id="modal-title" style="font-size: 16px; font-weight: 600; color: #1e293b; margin: 0; display: flex; align-items: center;">
                    <span style="width: 8px; height: 16px; background: #3b82f6; border-radius: 4px; margin-right: 8px;"></span>
                    添加成员
                </h3>
                <button class="close-btn" onclick="closeAddModal()" style="background: none; border: none; font-size: 18px; color: #94a3b8; cursor: pointer; transition: color 0.2s;">
                    ×
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">

        // 部门展开状态
        const deptExpandState = {};

        // 渲染部门列表
        function renderDepts(data = deptData, orgId = 'main') {
            // 构建部门层次结构
            const deptMap = {};
            const rootDepts = [];
            
            // 首先创建部门映射
            data.forEach(dept => {
                deptMap[dept.id] = dept;
                dept.children = [];
                // 只在第一次初始化时设置默认展开状态
                if (deptExpandState[dept.id] === undefined) {
                    deptExpandState[dept.id] = true;
                }
            });
            
            // 构建层次结构
            data.forEach(dept => {
                if (dept.parentId === null) {
                    rootDepts.push(dept);
                } else if (deptMap[dept.parentId]) {
                    deptMap[dept.parentId].children.push(dept);
                }
            });
            
            // 递归生成部门HTML
            function generateDeptHTML(depts, level = 0) {
                let html = '';
                depts.forEach(dept => {
                    // 过滤掉不属于当前组织的部门
                    if (orgId !== 'main' && dept.org !== orgId) {
                        return;
                    }
                    
                    const indent = level * 48; // 每级缩进48px
                    const hasChildren = dept.children && dept.children.length > 0;
                    const isExpanded = deptExpandState[dept.id];
                    
                    html += `
                        <tr ${level > 0 ? 'style="background-color: #f8fafc;"' : ''}>
                            <td>${dept.id}</td>
                            <td style="padding-left: ${indent + 12}px; position: relative;">
                                ${dept.name}
                                ${hasChildren ? `
                                    <span class="expand-icon" 
                                       style="cursor: pointer; font-size: 12px; margin-left: 8px;"
                                       onclick="toggleDeptExpand('${dept.id}')">
                                        ${isExpanded ? '▼' : '►'}
                                    </span>
                                ` : ''}
                            </td>
                            <td>${dept.memberCount}</td>
                            <td>${dept.remark || '-'}</td>
                            <td>${dept.createTime}</td>
                            <td>
                                <button class="action-btn edit" onclick="openDeptEditModal('${dept.id}')">
                                    <i class="fa fa-pencil"></i> 编辑
                                </button>
                                <button class="action-btn delete" onclick="openDeptConfirmModal('${dept.id}')">
                                    <i class="fa fa-trash"></i> 删除
                                </button>
                            </td>
                        </tr>
                    `;
                    
                    // 递归处理子部门
                    if (hasChildren && isExpanded) {
                        html += generateDeptHTML(dept.children, level + 1);
                    }
                });
                return html;
            }
            
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = generateDeptHTML(rootDepts);
        }

        // 保存部门
        function saveDept() {
            const name = document.getElementById('dept-form-name').value.trim();
            const org = document.getElementById('dept-form-org').value;
            const parentId = document.getElementById('dept-form-parent').value || null;
            const remark = document.getElementById('dept-form-remark').value.trim();

            if (!name || !org) {
                showToast('请填写必填字段', 'error');
                return;
            }

            if (currentDeptEditId) {
                // 编辑现有部门
                const dept = deptData.find(d => d.id === currentDeptEditId);
                if (dept) {
                    dept.name = name;
                    dept.org = org;
                    dept.parentId = parentId;
                    dept.remark = remark;
                }
                showToast('部门信息已更新', 'success');
            } else {
                // 添加新部门
                const newDept = {
                    id: `D${String(deptData.length + 1).padStart(3, '0')}`,
                    name: name,
                    org: org,
                    parentId: parentId,
                    remark: remark,
                    memberCount: 0,
                    createTime: new Date().toISOString().replace('T', ' ').substring(0, 19)
                };
                deptData.push(newDept);
                showToast('部门已添加', 'success');
            }

            closeDeptModal();
            
            // 重新渲染部门列表
            // 检查当前是否在部门标签页
            if (currentTab === 'department') {
                // 获取当前选中的组织
                const activeOrg = document.querySelector('.org-item.active');
                if (activeOrg) {
                    const orgId = activeOrg.getAttribute('data-org-id');
                    // 转换为部门数据使用的org key
                    const deptOrgId = getOrgKey(orgId);
                    renderDepts(deptData, deptOrgId);
                } else {
                    renderDepts();
                }
            }
        }

        // 搜索成员
        function searchMembers() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const dept = document.getElementById('filter-dept').value;
            const role = document.getElementById('filter-role').value;

            // 获取当前组织的成员数据进行搜索
            const activeOrg = document.querySelector('.org-item.active');
            const orgId = activeOrg ? activeOrg.getAttribute('data-org-id') : 'main';
            const memberOrgKey = getOrgKey(orgId);
            const currentData = memberData[memberOrgKey] || memberData['other'] || [];
            
            const filtered = currentData.filter(member => {
                const matchKeyword = member.name.toLowerCase().includes(keyword) || member.phone.includes(keyword);
                const matchDept = !dept || member.department === dept;
                const matchRole = !role || member.role === role;
                return matchKeyword && matchDept && matchRole;
            });
            
            // 直接渲染过滤后的数据
            const tbody = document.getElementById('member-table-body');
            tbody.innerHTML = filtered.map(member => `
                <tr>
                    <td>${member.id}</td>
                    <td>
                        <div class="avatar">
                            ${member.avatar ? `<img src="${member.avatar}" alt="${member.name}">` : '<i class="fa fa-user"></i>'}
                        </div>
                    </td>
                    <td>${member.name}</td>
                    <td>${member.phone}</td>
                    <td>${member.department}</td>
                    <td>${member.role}</td>
                    <td>${member.account}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 8px;"><span>微信：</span>${member.wechat === '已绑定' ? `<img src="${member.avatar || '../A/images/tx-1.png'}" alt="微信" style="width:20px;height:20px;"><span>${member.name}</span>` : '<span>未绑定</span>'}</div>
                        <div style="display: flex; align-items: center; gap: 5px;"><span>支付宝：</span>${member.alipay === '已绑定' ? `<img src="${member.avatar || '../A/images/tx-1.png'}" alt="支付宝" style="width:20px;height:20px;"><span>${member.name}</span>` : '<span>未绑定</span>'}</div>
                    </td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${member.status === 'active' ? 'checked' : ''} onchange="toggleStatus('${member.id}', this)">
                            <span class="switch-track">
                                <span class="switch-thumb"></span>
                            </span>
                        </label>
                    </td>
                    <td>${member.remark || '-'}</td>
                    <td>${member.createTime}</td>
                    <td>
                        <button class="action-btn edit" onclick="openEditModal('${member.id}')">
                            <i class="fa fa-pencil"></i> 编辑
                        </button>
                        <button class="action-btn delete" onclick="openConfirmModal('${member.id}')">
                            <i class="fa fa-trash"></i> 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 初始化自定义下拉选择组件
        let customSelectsInitialized = false;
        function initCustomSelects() {
            if (customSelectsInitialized) return;
            
            // 点击选择框切换下拉菜单
            document.addEventListener('click', function(e) {
                const selectValue = e.target.closest('.select-value');
                if (selectValue) {
                    const customSelect = selectValue.closest('.custom-select');
                    const options = customSelect.querySelector('.select-options');
                    
                    // 关闭其他所有下拉菜单
                    document.querySelectorAll('.custom-select .select-options').forEach(opt => {
                        if (opt !== options) {
                            opt.style.display = 'none';
                        }
                    });
                    
                    // 切换当前下拉菜单
                    if (options.style.display === 'block') {
                        options.style.display = 'none';
                    } else {
                        options.style.display = 'block';
                    }
                } else if (!e.target.closest('.custom-select')) {
                    // 点击外部关闭所有下拉菜单
                    document.querySelectorAll('.custom-select .select-options').forEach(opt => {
                        opt.style.display = 'none';
                    });
                }
            });
            
            // 选择选项
            document.addEventListener('click', function(e) {
                const option = e.target.closest('.option');
                if (option) {
                    const customSelect = option.closest('.custom-select');
                    const valueText = customSelect.querySelector('.value-text');
                    const orgValue = customSelect.querySelector('.org-value');
                    const options = customSelect.querySelector('.select-options');
                    const arrow = customSelect.querySelector('.select-arrow');
                    console.log('customSelect:', customSelect);
                    console.log('orgValue:', orgValue);
                    console.log('orgValue.id:', orgValue.id);
                    
                    // 获取显示文本和值
                    const displayText = option.getAttribute('data-display') || option.textContent;
                    const value = option.getAttribute('data-value');
                    
                    // 更新显示和隐藏字段
                    valueText.textContent = displayText;
                    orgValue.value = value;
                    
                    // 更改字体颜色为正常颜色
                    if (value) {
                        valueText.style.color = '#1e293b';
                    } else {
                        valueText.style.color = '#94a3b8';
                    }
                    
                    // 触发change事件
                    const event = new Event('change', { bubbles: true });
                    orgValue.dispatchEvent(event);
                    
                    // 关闭下拉菜单
                    options.style.display = 'none';
                    
                    // 当选择组织时，更新上级部门下拉选项
                    if (orgValue.id === 'dept-form-org') {
                        console.log('Calling populateParentDeptDropdown with value:', value);
                        // 直接调用填充上级部门下拉选项
                        const parentSelect = document.getElementById('dept-form-parent');
                        if (parentSelect) {
                            parentSelect.innerHTML = '<option value="">无（作为一级部门）</option>';
                            
                            if (value) {
                                // 添加一些硬编码的部门选项
                                if (value === 'main') {
                                    parentSelect.innerHTML += `
                                        <option value="D002">管理部</option>
                                        <option value="D003">业务部</option>
                                        <option value="D006">市场部</option>
                                        <option value="D007">财务部</option>
                                        <option value="D008">行政部</option>
                                    `;
                                } else if (value === 'sub1') {
                                    parentSelect.innerHTML += `
                                        <option value="D010">培训部</option>
                                        <option value="D011">技术部</option>
                                        <option value="D014">课程研发部</option>
                                    `;
                                } else if (value === 'sub2') {
                                    parentSelect.innerHTML += `
                                        <option value="D016">实训部</option>
                                        <option value="D017">设备部</option>
                                    `;
                                }
                            }
                        }
                    }
                }
            });
            
            // 选项悬停效果
            document.addEventListener('mouseover', function(e) {
                const option = e.target.closest('.option');
                if (option) {
                    option.style.backgroundColor = '#f1f5f9';
                }
            });
            
            document.addEventListener('mouseout', function(e) {
                const option = e.target.closest('.option');
                if (option) {
                    option.style.backgroundColor = '';
                }
            });
            
            customSelectsInitialized = true;
        }

        // 保存成员
        function saveMember() {
            const name = document.getElementById('form-name').value.trim();
            const phone = document.getElementById('form-phone').value.trim();
            const account = document.getElementById('form-account').value.trim();
            const password = document.getElementById('form-password').value;
            const remark = document.getElementById('form-remark').value.trim();

            if (!name || !phone) {
                showToast('请填写必填字段', 'error');
                return;
            }

            if (currentEditId) {
                // 编辑现有成员
                const member = findMemberById(currentEditId);
                if (member) {
                    member.name = name;
                    member.phone = phone;
                    member.account = account;
                    member.remark = remark;
                }
                showToast('成员信息已更新', 'success');
            } else {
                // 添加新成员到当前组织
                const activeOrg = document.querySelector('.org-item.active');
                const orgId = activeOrg ? activeOrg.getAttribute('data-org-id') : 'main';
                const memberOrgKey = getOrgKey(orgId);
                const orgName = activeOrg ? activeOrg.getAttribute('data-org-name') : '东莞市智联科技有限公司';
                
                const newMember = {
                    id: `M${String(getAllMembers().length + 1).padStart(4, '0')}`,
                    name: name,
                    avatar: '',
                    phone: phone,
                    org: orgName,
                    department: '管理部',
                    role: '员工',
                    account: account,
                    wechat: '未绑定',
                    alipay: '未绑定',
                    status: 'active',
                    remark: remark,
                    createTime: new Date().toISOString().replace('T', ' ').substring(0, 19)
                };
                memberData[memberOrgKey].push(newMember);
                showToast('成员已添加', 'success');
            }

            closeAddModal();
            renderMembers();
        }

                const orgId = activeOrg ? activeOrg.getAttribute('data-org-id') : 'main';

                const roles = roleData[orgId];

        // 切换权限选中状态
        function togglePermission(checkbox) {
            const isChecked = checkbox.checked;
            
            // 1. 处理子权限：如果当前元素被选中，子级全部选中；如果取消选中，子级全部取消
            const permissionItem = checkbox.closest('.permission-item');
            const childrenContainer = permissionItem.querySelector('.permission-children');
            if (childrenContainer) {
                const childCheckboxes = childrenContainer.querySelectorAll('input[type="checkbox"]');
                childCheckboxes.forEach(childCheckbox => {
                    childCheckbox.checked = isChecked;
                    // 递归处理子级的子级
                    const childItem = childCheckbox.closest('.permission-item');
                    const grandChildrenContainer = childItem.querySelector('.permission-children');
                    if (grandChildrenContainer) {
                        const grandChildCheckboxes = grandChildrenContainer.querySelectorAll('input[type="checkbox"]');
                        grandChildCheckboxes.forEach(grandChildCheckbox => {
                            grandChildCheckbox.checked = isChecked;
                        });
                    }
                });
            }
            
            // 2. 处理父权限：如果当前元素被选中，所有父级都选中
            if (isChecked) {
                let parentItem = permissionItem.parentElement.closest('.permission-item');
                while (parentItem) {
                    const parentCheckbox = parentItem.querySelector('input[type="checkbox"]');
                    if (parentCheckbox) {
                        parentCheckbox.checked = true;
                    }
                    parentItem = parentItem.parentElement.closest('.permission-item');
                }
            } else {
                // 3. 取消选中时，只处理父权限的状态更新
                updateParentPermission(permissionItem);
            }
        }

        // 更新父权限状态
        function updateParentPermission(permissionItem) {
            const parentItem = permissionItem.parentElement.closest('.permission-item');
            if (parentItem) {
                const parentCheckbox = parentItem.querySelector('input[type="checkbox"]');
                if (parentCheckbox) {
                    const childCheckboxes = parentItem.querySelectorAll('.permission-children input[type="checkbox"]');
                    const anyChecked = Array.from(childCheckboxes).some(cb => cb.checked);
                    parentCheckbox.checked = anyChecked;
                    
                    // 递归更新父权限
                    updateParentPermission(parentItem);
                }
            }
        }

        // 全选/取消全选
        function toggleAllPermissions(checkbox) {
            const isChecked = checkbox.checked;
            const allCheckboxes = document.querySelectorAll('#function-permission input[type="checkbox"]');
            allCheckboxes.forEach(cb => {
                cb.checked = isChecked;
            });
        }

        // 保存角色
        function saveRole() {
            const name = document.getElementById('role-form-name').value.trim();
            const description = document.getElementById('role-form-description').value.trim();
            const orgId = document.getElementById('role-form-org').value;

            if (!name) {
                showToast('请填写角色名称', 'error');
                return;
            }

            if (!orgId) {
                showToast('请选择所属组织', 'error');
                return;
            }

            if (currentRoleEditId) {
                // 编辑现有角色
                const roles = roleData[orgId];
                if (roles) {
                    const role = roles.find(r => r.id === currentRoleEditId);
                    if (role) {
                        role.name = name;
                        role.description = description;
                        showToast('角色信息已更新', 'success');
                    }
                }
            } else {
                // 添加新角色
                const roles = roleData[orgId];
                if (roles) {
                    // 生成新角色ID
                    const maxId = Math.max(...roles.map(r => parseInt(r.id)), 0);
                    const newId = (maxId + 1).toString();
                    
                    const newRole = {
                        id: newId,
                        name: name,
                        description: description
                    };
                    roles.push(newRole);
                    showToast('角色已添加', 'success');
                }
            }

            closeAddRoleModal();
            
            // 重新渲染角色列表
            if (currentTab === 'role') {
                renderRoleManagement(orgId);
            }
        }
        
        // 确认删除弹窗
        let currentDeleteId = null;
        
        function openConfirmModal(id) {
            currentDeleteId = id;
            // 更新确认删除弹窗的消息
            const modalBody = document.querySelector('#confirm-modal .modal-body p');
            if (modalBody) {
                modalBody.textContent = '您确定要删除该成员吗？此操作不可撤销。';
            }
            document.getElementById('confirm-modal').style.display = 'flex';
        }
        
        function closeConfirmModal() {
            document.getElementById('confirm-modal').style.display = 'none';
            currentDeleteId = null;
        }
        
        function confirmDelete() {
            if (currentDeleteId) {
                if (deleteMemberById(currentDeleteId)) {
                    renderMembers();
                    showToast('成员已删除', 'success');
                }
                closeConfirmModal();
            }
        }

        // 部门编辑和删除相关函数
        let currentDeptEditId = null;
        let currentDeptDeleteId = null;
        
        function openDeptConfirmModal(id) {
            currentDeptDeleteId = id;
            // 更新确认删除弹窗的消息
            const modalBody = document.querySelector('#confirm-modal .modal-body p');
            if (modalBody) {
                modalBody.textContent = '您确定要删除该部门吗？此操作不可撤销。';
            }
            document.getElementById('confirm-modal').style.display = 'flex';
        }
        
        function confirmDeptDelete() {
            if (currentDeptDeleteId) {
                const index = deptData.findIndex(d => d.id === currentDeptDeleteId);
                if (index > -1) {
                    deptData.splice(index, 1);
                    renderDepts();
                    showToast('部门已删除', 'success');
                }
                closeConfirmModal();
                currentDeptDeleteId = null;
            }
        }
    </script>
    
    <!-- 添加角色弹窗 -->
    <div id="add-role-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 500px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;">
            <div class="modal-header" style="border-bottom: 1px solid #e2e8f0; padding: 8px 20px; background: #f8fafc;">
                <h3 id="role-modal-title" style="font-size: 16px; font-weight: 600; color: #1e293b; margin: 0; display: flex; align-items: center;">
                    <span style="width: 8px; height: 16px; background: #3b82f6; border-radius: 4px; margin-right: 8px;"></span>
                    添加角色
                </h3>
                <button class="close-btn" onclick="closeAddRoleModal()" style="background: none; border: none; font-size: 18px; color: #94a3b8; cursor: pointer; transition: color 0.2s;">
                    ×
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <!-- 角色名称 -->
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">
                        <span style="color: #ef4444; margin-right: 4px;">*</span>角色名称
                    </label>
                    <input type="text" id="role-form-name" placeholder="请输入角色名称" style="width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s;">
                </div>
                
                <!-- 所属组织 -->
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">
                        <span style="color: #ef4444; margin-right: 4px;">*</span>所属组织
                    </label>
                    <div class="custom-select" style="position: relative; width: 100%;">
                        <div class="select-value" style="padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; background-image: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 16 16%22%3E%3Cpath fill=%22%2394a3b8%22 d=%22M8 11L3 6l1.41-1.41L8 8.17l3.59-3.58L13 6l-5 5z%22/%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;">
                            <span class="value-text" style="color: #94a3b8;">请选择组织</span>
                            <span class="select-arrow" style="width: 16px; height: 16px; transition: transform 0.2s;"></span>
                        </div>
                        <div class="select-options" style="position: absolute; top: 100%; left: 0; right: 0; margin-top: 2px; border: 1px solid #cbd5e1; border-radius: 4px; background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); z-index: 10; max-height: 200px; overflow-y: auto; display: none;">
                            <div class="option" data-value="" style="padding: 8px 12px; cursor: pointer; transition: background-color 0.2s;">请选择组织</div>
                            <div class="option" data-value="main" data-display="东莞长安训练基地" style="padding: 8px 12px; cursor: pointer; transition: background-color 0.2s;">东莞长安训练基地</div>
                            <div class="option" data-value="sub1" data-display="智能制造培训中心" style="padding: 8px 12px 8px 32px; cursor: pointer; transition: background-color 0.2s;">├ 智能制造培训中心</div>
                            <div class="option" data-value="sub2" data-display="机器人实训基地" style="padding: 8px 12px 8px 32px; cursor: pointer; transition: background-color 0.2s;">├ 机器人实训基地</div>
                        </div>
                        <input type="hidden" id="role-form-org" class="org-value" value="">
                    </div>
                </div>
                
                <!-- 角色描述 -->
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 14px; font-weight: 500; color: #475569; margin-bottom: 6px;">角色描述</label>
                    <textarea id="role-form-description" placeholder="请输入角色描述" rows="4" style="width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; box-sizing: border-box; resize: vertical; transition: border-color 0.2s;"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="border-top: 1px solid #e2e8f0; padding: 16px 20px; display: flex; justify-content: flex-end; gap: 12px; background: #f8fafc;">
                <button class="btn btn-cancel" onclick="closeAddRoleModal()" style="padding: 8px 16px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; color: #475569; cursor: pointer; font-size: 14px; transition: all 0.2s;">取消</button>
                <button class="btn btn-confirm" onclick="saveRole()" style="padding: 8px 16px; border: none; border-radius: 4px; background: #3b82f6; color: white; cursor: pointer; font-size: 14px; transition: all 0.2s;">保存</button>
            </div>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 400px; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;">
            <div class="modal-header" style="border-bottom: 1px solid #e2e8f0; padding: 8px 20px; background: #f8fafc;">
                <h3 style="font-size: 16px; font-weight: 600; color: #1e293b; margin: 0; display: flex; align-items: center;">
                    <span style="width: 8px; height: 16px; background: #ef4444; border-radius: 4px; margin-right: 8px;"></span>
                    确认删除
                </h3>
                <button class="close-btn" onclick="closeConfirmModal()" style="background: none; border: none; font-size: 18px; color: #94a3b8; cursor: pointer; transition: color 0.2s;">
                    ×
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <p style="font-size: 14px; color: #475569; margin: 0;">您确定要删除该成员吗？此操作不可撤销。</p>
            </div>
            <div class="modal-footer" style="border-top: 1px solid #e2e8f0; padding: 12px 20px; display: flex; justify-content: flex-end; gap: 12px; background: #f8fafc;">
                <button onclick="closeConfirmModal()" style="padding: 6px 16px; border: 1px solid #cbd5e1; border-radius: 4px; background: white; color: #475569; cursor: pointer; font-size: 14px; transition: all 0.2s;">取消</button>
                <button onclick="currentTab === 'member' ? confirmDelete() : (currentTab === 'role' ? confirmRoleDelete() : confirmDeptDelete())" style="padding: 6px 16px; border: 1px solid #ef4444; border-radius: 4px; background: #ef4444; color: white; cursor: pointer; font-size: 14px; transition: all 0.2s;">删除</button>
            </div>
        </div>
    </div>
</body>
