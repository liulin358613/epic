<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RaaS.Dao平台运营中心 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            font-size: 14px;
            line-height: 1.5;
        }
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }
        .left-section {
            flex: 1;
        }
        .middle-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px;
            color: white;
        }
        .right-section {
            flex: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .logo-area {
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            margin-bottom: 10px;
        }
        .logo-icon .fa {
            font-size: 36px;
            color: white;
        }
        .platform-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .platform-subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 60px;
            line-height: 1.3;
        }
        .feature-list {
            list-style: none;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feature-icon .fa {
            color: #8b5cf6;
            font-size: 20px;
        }
        .feature-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
        }

        .login-card {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card-subtitle {
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 12px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .fa {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
            line-height: 1.4;
        }
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .form-input::placeholder {
            color: #94a3b8;
        }

        .remember-forgot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .checkbox-wrapper input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #6366f1;
        }
        .checkbox-label {
            font-size: 14px;
            color: #64748b;
        }
        .forgot-link {
            font-size: 14px;
            color: #6366f1;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            line-height: 1.4;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #94a3b8;
        }
        .footer-text a {
            color: #6366f1;
            text-decoration: none;
        }

        .background-decoration {
            position: fixed;
            pointer-events: none;
        }
        .bg-circle-1 {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
            top: -150px;
            right: -100px;
        }
        .bg-circle-2 {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(139, 92, 246, 0.05) 100%);
            bottom: -100px;
            left: -80px;
        }
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 浏览器兼容性和响应式设计 */
        * {
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
        }

        /* 响应式设计适配 */
        @media screen and (max-width: 1024px) {
            .middle-section {
                display: none;
            }
            .right-section {
                flex: 1;
                padding: 20px;
            }
            .login-card {
                max-width: 420px;
                padding: 32px;
            }
        }

        @media screen and (max-width: 768px) {
            .login-card {
                max-width: 100%;
                padding: 24px;
                border-radius: 12px;
            }
            .card-title {
                font-size: 18px;
            }
            .platform-title {
                font-size: 28px !important;
            }
            .platform-subtitle {
                font-size: 16px !important;
            }
            .logo-icon {
                width: 60px;
                height: 60px;
            }
            .logo-icon .fa {
                font-size: 28px;
            }
        }

        /* 高分辨率屏幕适配 */
        @media screen and (min-width: 1920px) {
            html, body {
                font-size: 15px;
            }
            .login-card {
                max-width: 520px;
                padding: 48px;
            }
        }

        /* 防止触摸设备的双击缩放 */
        body {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="background-decoration bg-circle-1"></div>
    <div class="background-decoration bg-circle-2"></div>

    <div class="login-wrapper">
        <div class="left-section"></div>

        <div class="middle-section">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa fa-cubes"></i>
                </div>
                <h1 class="platform-title">RaaS.Dao</h1>
                <p class="platform-subtitle">平台运营中心</p>
            </div>
        </div>

        <div class="right-section">
            <div class="login-card">
                <h2 class="card-title">欢迎回来</h2>
                <p class="card-subtitle">请输入账号密码登录系统</p>

                <form>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fa fa-user"></i>
                            <input type="text" class="form-input" placeholder="账号">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fa fa-lock"></i>
                            <input type="password" class="form-input" placeholder="密码">
                        </div>
                    </div>

                    <div class="remember-forgot">
                        <label class="checkbox-wrapper">
                            <input type="checkbox">
                            <span class="checkbox-label">记住密码</span>
                        </label>
                        <!-- <a href="#" class="forgot-link">忘记密码？</a> -->
                    </div>

                    <button type="button" class="btn-login" onclick="handleLogin()">
                        登 录
                    </button>
                </form>

                <!-- <div class="footer-text">
                    <a href="#">返回首页</a>
                </div> -->
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            window.location.href = 'index.html';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
