<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Skill技能库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background: #f5f7fa;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e5e7eb;
            height: calc(100vh - 100px);
        }
        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-outline {
            background: white;
            color: #64748b;
            border: 1px solid #e5e7eb;
        }
        .btn-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            border: 1px solid #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
            border-color: #dc2626;
        }
        .form-control {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }
        .page-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .page-subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .main-content {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .tabs-wrapper {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }
        .tab-item {
            padding: 12px 20px;
            border-radius: 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #64748b;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
        }
        .tab-item:hover {
            color: #6366f1;
        }
        .tab-item.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
            background: transparent;
        }
        .search-bar {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }
        .skill-grid {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            grid-auto-rows: min-content;
            overflow-y: auto;
            min-height: 0;
        }
        .skill-card {
            background: white;
            border-radius: 6px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }
        .skill-card:hover {
            border-color: #cbd5e1;
            background: #fafafa;
        }
        .skill-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            color: #64748b;
            background: #e2e2e2;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 500;
        }
        .skill-badge.status.draft {
            background: #f1f5f9;
            color: #64748b;
        }
        .skill-badge.status.pending {
            background: #fef3c7;
            color: #d97706;
        }
        .skill-badge.status.approved {
            background: #dbeafe;
            color: #2563eb;
        }
        .skill-badge.status.published {
            background: #dcfce7;
            color: #16a34a;
        }
        .skill-badge.status.offline {
            background: #fce7f3;
            color: #db2777;
        }
        .skill-badge.status.invalid {
            background: #f3f4f6;
            color: #9ca3af;
        }
        .skill-category {
            font-size: 12px;
            font-weight: 500;
            color: #6366f1;
            margin-left: 6px;
            padding: 2px 8px;
            background: #eef2ff;
            border-radius: 4px;
            border: 1px solid #ddd6fe;
        }
        .skill-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }
        .skill-icon {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }
        .skill-icon.orange {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }
        .skill-icon.blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .skill-icon.purple {
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
        }
        .skill-icon.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .skill-icon.red {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .skill-icon.cyan {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }
        .skill-icon.pink {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
        }
        .skill-icon.yellow {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
        }
        .skill-info {
            flex: 1;
            min-width: 0;
        }
        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .skill-id {
            font-size: 11px;
            font-weight: normal;
            color: #94a3b8;
            margin-left: 4px;
        }
        .skill-desc {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            overflow: hidden;
        }
        .tag {
            padding: 2px 6px;
            background: #f1f5f9;
            border-radius: 3px;
            font-size: 11px;
            color: #64748b;
        }
        .skill-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f1f5f9;
        }
        .usage-count {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .usage-count i {
            color: #94a3b8;
        }
        .btn-add {
            padding: 3px 12px;
            background: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 3px;
            font-size: 12px;
            font-weight: normal;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-add:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pagination-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pagination-btn:hover:not(.active) {
            background: #f8fafc;
        }
        .pagination-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #3b82f6;
            color: white;
        }
        .pagination-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 16px 24px;
            border-top: 1px solid #f1f5f9;
            background: white;
        }
        .image-upload-wrapper {
            position: relative;
            display: inline-block;
        }
        .image-upload-box {
            width: 100px;
            height: 100px;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        .image-upload-box:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .image-upload-box.has-image {
            border-style: solid;
            border-color: #e2e8f0;
            padding: 8px;
        }
        .image-upload-box i {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .image-upload-box span {
            font-size: 12px;
            color: #94a3b8;
        }
        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }
        .image-delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .image-upload-wrapper:hover .image-delete-btn {
            opacity: 1;
        }
        .image-upload-input {
            display: none;
        }
        .EasyMDEContainer {
            width: 100%;
        }
        .EasyMDEContainer .CodeMirror {
            min-height: 300px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 14px;
        }
        .EasyMDEContainer .editor-toolbar {
            border: 1px solid #e2e8f0;
            border-radius: 4px 4px 0 0;
            background: #f8fafc;
        }
        .EasyMDEContainer .editor-toolbar button {
            color: #64748b;
        }
        .EasyMDEContainer .editor-toolbar button:hover,
        .EasyMDEContainer .editor-toolbar button.active {
            background: #e2e8f0;
        }
        .EasyMDEContainer .editor-preview {
            min-height: 300px;
            padding: 16px;
            background: #fff;
        }
        .basic-info-row {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .avatar-section {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 12px;
        }
        .avatar-section .form-label {
            margin-bottom: 0;
            white-space: nowrap;
        }
        .avatar-col {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .btn-upload {
            padding: 6px 16px;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0;
        }
        .btn-upload:hover {
            background: #e2e8f0;
            color: #475569;
        }
        .type-name-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-item-inline {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-item-inline .form-label {
            margin-bottom: 0;
            padding-top: 6px;
            flex: 0 0 80px;
            text-align: right;
        }
        .form-item-inline .form-control {
            flex: 1;
            max-width: none;
        }
        .input-wrapper {
            flex: 1;
            max-width: none;
        }
        .input-wrapper .form-control {
            width: 100%;
        }
        .pagination-info {
            color: #64748b;
            font-size: 14px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            position: fixed;
            top: 0;
            right: -1000px;
            width: 1000px;
            height: 100vh;
            background: white;
            box-shadow: -20px 0 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: right 0.3s ease;
            z-index: 1001;
        }
        .modal-overlay.show .modal {
            right: 0;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
        }
        .modal-close:hover {
            color: #64748b;
        }
        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            gap: 10px;
            background: #fafafa;
        }
        .form-section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-item {
            flex: 1;
            min-width: 0;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-label .required {
            color: #ef4444;
            margin-left: 4px;
        }
        .modal .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            transition: all 0.2s ease;
        }
        .modal .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .textarea-control {
            resize: vertical;
            min-height: 100px;
        }
        .error-text {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            display: none;
            width: 100%;
        }
        .error-text.show {
            display: block;
        }
        @media screen and (max-width: 768px) {
            .main-content {
                padding: 8px;
            }
            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .form-control {
                width: 100%;
            }
            .skill-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div>
            <h1 class="page-title">Skill技能库</h1>
            <p class="page-subtitle">管理和配置AI技能</p>
        </div>
    </header>

    <main class="main-content">
        <div class="card">
            <!-- 顶部标签页 -->
            <div class="tabs-wrapper">
                <div class="tab-item active" data-tab="all" onclick="switchTab('all')">全部</div>
                <div class="tab-item" data-tab="draft" onclick="switchTab('draft')">草稿</div>
                <div class="tab-item" data-tab="pending" onclick="switchTab('pending')">待审核</div>
                <div class="tab-item" data-tab="approved" onclick="switchTab('approved')">审核通过</div>
                <div class="tab-item" data-tab="invalid" onclick="switchTab('invalid')">已作废</div>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" class="form-control" placeholder="搜索技能名称..." id="search-input" style="min-width: 200px;">
                <select class="form-control" id="category-filter">
                    <option value="">全部分类</option>
                    <option value="writing">文案写作</option>
                    <option value="analysis">数据分析</option>
                    <option value="design">设计创意</option>
                    <option value="research">研究调研</option>
                    <option value="translation">翻译</option>
                    <option value="other">其他</option>
                </select>
                <button class="btn btn-outline" onclick="searchSkills()"><i class="fa fa-search"></i> 搜索</button>
                <button class="btn btn-outline" onclick="resetSearch()"><i class="fa fa-refresh"></i> 重置</button>
                <button class="btn btn-primary" onclick="addSkill()"><i class="fa fa-plus"></i> 添加技能</button>
            </div>

            <!-- 技能网格 -->
            <div class="skill-grid" id="skill-grid">
                <!-- 动态生成 -->
            </div>

            <!-- 分页 -->
            <div class="pagination-footer">
                <div style="display: flex; align-items: center; gap: 4px; justify-content: flex-end;">
                    <span class="text-gray-500 text-sm" id="pagination-info">显示 1-12 条，共 12 条</span>
                    <span class="text-gray-500 text-sm" id="total-count">共 12 条</span>
                    <div class="pagination" id="pagination">
                        <button class="pagination-btn" onclick="prevPage()">
                            <i class="fa fa-angle-left"></i>
                        </button>
                        <button class="pagination-btn active" onclick="goToPage(1)">1</button>
                        <button class="pagination-btn" onclick="goToPage(2)">2</button>
                        <button class="pagination-btn" onclick="goToPage(3)">3</button>
                        <button class="pagination-btn" onclick="goToPage(4)">4</button>
                        <button class="pagination-btn" onclick="goToPage(5)">5</button>
                        <button class="pagination-btn" onclick="nextPage()">
                            <i class="fa fa-angle-right"></i>
                        </button>
                    </div>
                    <select class="form-control" style="width: auto; margin-left: 8px;" id="page-size">
                        <option>10条/页</option>
                        <option>20条/页</option>
                        <option>50条/页</option>
                    </select>
                    <span style="color: #64748b; font-size: 14px; margin-left: 8px;">跳至</span>
                    <input type="text" class="form-control" style="width: 50px; margin-left: 8px;" id="page-input" value="1">
                    <span style="color: #64748b; font-size: 14px; margin-left: 8px;">页</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加/编辑技能弹窗 -->
    <div class="modal-overlay" id="skill-modal" onclick="handleOverlayClick(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">添加技能</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <input type="hidden" id="edit-id" value="">
                
                <div class="form-section">
                    <div class="basic-info-row">
                        <div class="avatar-section">
                            <label class="form-label">图标<span class="required">*</span></label>
                            <div class="avatar-col">
                                <div class="image-upload-box" id="image-upload-box" onclick="document.getElementById('image-upload-input').click()">
                                    <i class="fa fa-plus"></i>
                                    <span>上传图标</span>
                                </div>
                                <div class="error-text" id="icon-error">请上传技能图标</div>
                                <button class="btn-upload" id="image-btn" onclick="document.getElementById('image-upload-input').click()" style="display: none;">重新上传</button>
                                <input type="file" class="image-upload-input" id="image-upload-input" accept="image/*" onchange="handleImageUpload(event)">
                            </div>
                        </div>
                        
                        <div class="type-name-section">
                            <div class="form-item-inline">
                                <label class="form-label">分类<span class="required">*</span></label>
                                <div class="input-wrapper">
                                    <select class="form-control" id="skill-category">

            { id: 'SKL011', name: '邮件撰写', description: '快速撰写专业商务邮件，支持多种邮件模板', category: 'writing', tags: '邮件|商务|写作', icon: 'fa-envelope-o', iconColor: 'green', status: 'approved', content: '# 邮件撰写\n\n专业商务邮件助手。', model: 'wenxin', usageCount: 2345, updateTime: '2026-05-18' },
            { id: 'SKL012', name: 'SEO优化建议', description: '分析网站内容，提供SEO优化建议，提升搜索引擎排名', category: 'other', tags: 'SEO|优化|网站', icon: 'fa-search-plus', iconColor: 'orange', status: 'approved', content: '# SEO优化建议\n\n网站SEO优化工具。', model: 'gpt4', usageCount: 567, updateTime: '2026-05-17' }
        ];

        let filteredSkills = [...skills];
        let currentPage = 1;
        let pageSize = 10;
        let currentTab = 'all';
        // 使用window.easyMDE确保全局访问
        window.easyMDE = null;
        let currentImageData = null;

        // 获取分类中文名
        function getCategoryName(category) {
            const names = {
                'writing': '文案写作',
                'analysis': '数据分析',
                'design': '设计创意',
                'research': '研究调研',
                'translation': '翻译',
                'other': '其他'
            };
            return names[category] || category;
        }
        
        // 获取状态中文名
        function getStatusLabel(status) {
            const labels = {
                'draft': '草稿',
                'pending': '待审核',
                'approved': '审核通过',
                'invalid': '已作废'
            };
            return labels[status] || status;
        }

        // 渲染技能卡片
        function renderSkills() {
            const grid = document.getElementById('skill-grid');
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageSkills = filteredSkills.slice(startIndex, endIndex);

            grid.innerHTML = pageSkills.map(skill => {
                const isFontAwesome = skill.icon && skill.icon.startsWith('fa-');
                const iconHtml = isFontAwesome 
                    ? `<i class="fa ${skill.icon}" style="font-size:18px;"></i>`
                    : skill.icon 
                        ? `<img src="${skill.icon}" class="image-preview" style="width:44px;height:44px;border-radius:6px;object-fit:cover;">` 
                        : `<i class="fa fa-star" style="font-size:18px;"></i>`;
                const iconClass = isFontAwesome || !skill.icon ? skill.iconColor : '';
                
                return `
                <div class="skill-card" onclick="viewSkill('${skill.id}')">
                    <div class="skill-badge status ${skill.status}">${getStatusLabel(skill.status)}</div>
                    <div class="skill-header">
                        <div class="skill-icon ${iconClass}" style="${skill.icon && !isFontAwesome ? 'background:transparent;' : ''}">
                            ${iconHtml}
                        </div>
                        <div class="skill-info">
                            <div class="skill-name">${skill.name}<span class="skill-id">(${skill.id})</span><span class="skill-category">${getCategoryName(skill.category)}</span></div>
                            <div class="skill-tags">
                                ${skill.tags.split('|').slice(0, 4).map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="skill-desc">${skill.description}</div>
                    <div class="skill-footer">
                        <div class="usage-count"><i class="fa fa-bar-chart"></i>${skill.usageCount}次使用</div>
                        <div class="btn-add" onclick="viewSkill('${skill.id}'); event.stopPropagation()">查看</div>
                    </div>
                </div>
            `}).join('');

            updatePagination();
        }

        // 更新分页信息
        function updatePagination() {
            const totalItems = filteredSkills.length;
            const totalPages = Math.ceil(totalItems / pageSize);
            const startItem = (currentPage - 1) * pageSize + 1;
            const endItem = Math.min(currentPage * pageSize, totalItems);

            document.getElementById('pagination-info').textContent = `显示 ${startItem}-${endItem} 条，共 ${totalItems} 条`;
            document.getElementById('total-count').textContent = `共 ${totalItems} 条`;

            // 更新页码按钮状态
            const pagination = document.getElementById('pagination');
            const buttons = pagination.querySelectorAll('.pagination-btn');
            buttons.forEach((btn, index) => {
                if (index === 0 || index === buttons.length - 1) return; // 跳过前后按钮
                const pageNum = parseInt(btn.textContent);
                btn.classList.toggle('active', pageNum === currentPage);
                btn.style.display = pageNum <= totalPages ? 'flex' : 'none';
            });
        }

        // 切换标签页
        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            
            // 更新标签样式
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // 应用搜索和分类筛选
            applyFilters();
        }

        // 应用筛选条件
        function applyFilters() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const categoryFilter = document.getElementById('category-filter').value;

            let tempSkills = currentTab === 'all' ? [...skills] : skills.filter(s => s.status === currentTab);

            if (searchText) {
                tempSkills = tempSkills.filter(s => 
                    s.name.toLowerCase().includes(searchText) || 
                    (s.description && s.description.toLowerCase().includes(searchText))
                );
            }

            if (categoryFilter) {
                tempSkills = tempSkills.filter(s => s.category === categoryFilter);
            }

            filteredSkills = tempSkills;
            currentPage = 1;
            renderSkills();
        }

        // 搜索技能
        function searchSkills() {
            applyFilters();
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('search-input').value = '';
            document.getElementById('status-filter').value = '';
            applyFilters();
        }

        // 上一页
        function prevPage() {
            const totalPages = Math.ceil(filteredSkills.length / pageSize);
            if (currentPage > 1) {
                currentPage--;
                renderSkills();
            }
        }

        // 下一页
        function nextPage() {
            const totalPages = Math.ceil(filteredSkills.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderSkills();
            }
        }

        // 跳转到指定页
        function goToPage(page) {
            const totalPages = Math.ceil(filteredSkills.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                document.getElementById('page-input').value = page;
                renderSkills();
            }
        }

        // 跳转按钮
        function jumpToPage() {
            const page = parseInt(document.getElementById('page-input').value);
            if (!isNaN(page)) {
                goToPage(page);
            }
        }

        // 页面大小改变
        document.getElementById('page-size').addEventListener('change', function() {
            pageSize = parseInt(this.value);
            currentPage = 1;
            renderSkills();
        });

        // 添加技能
        function addSkill() {
            document.getElementById('modal-title').textContent = '添加技能';
            document.getElementById('edit-id').value = '';
            document.getElementById('skill-name').value = '';
            document.getElementById('skill-category').value = '';
            document.getElementById('skill-description').value = '';
            document.getElementById('skill-tags').value = '';
            
            // 重置图片上传
            currentImageData = null;
            resetImageUpload();
            
            // 重置markdown编辑器
            if (window.easyMDE) {
                window.easyMDE.value('');
            }
            
            // 隐藏错误提示
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));
            
            document.getElementById('skill-modal').classList.add('show');
            
            // 弹窗显示后初始化markdown编辑器
            setTimeout(() => {
                initEasyMDE();
                if (window.easyMDE) {
                    window.easyMDE.value('');
                }
            }, 200);
        }

        // 查看技能详情
        function viewSkill(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                const detailBody = document.getElementById('detail-body');
                const isFontAwesome = skill.icon && skill.icon.startsWith('fa-');
                const iconHtml = isFontAwesome 
                    ? `<i class="fa ${skill.icon}" style="font-size:24px;"></i>`
                    : skill.icon 
                        ? `<img src="${skill.icon}" class="image-preview" style="width:120px;height:120px;border-radius:8px;object-fit:cover;">` 
                        : `<i class="fa fa-star" style="font-size:24px;"></i>`;
                
                detailBody.innerHTML = `
                    <div style="background: white; padding: 0 16px 16px 16px; border-bottom: 1px solid #e5e7eb; margin-bottom: 20px;">
                        <div style="display: flex; gap: 16px;">
                            <div class="skill-icon ${skill.iconColor}" style="margin-top: 30px; width: 80px; height: 80px; border-radius: 8px; height: 80px; border-radius: 8px; flex-shrink: 0; ${skill.icon && !isFontAwesome ? 'background:transparent;' : ''}">
                                ${iconHtml}
                            </div>
                            <div style="flex: 1; min-width: 0;">
                                <div style="display: flex; justify-content: flex-end;align-items: center;">
                                    <span style="font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 500; background: ${skill.status === 'draft' ? '#f1f5f9' : skill.status === 'pending' ? '#fef3c7' : skill.status === 'approved' ? '#dbeafe' : skill.status === 'published' ? '#dcfce7' : skill.status === 'offline' ? '#fce7f3' : '#f3f4f6'}; color: ${skill.status === 'draft' ? '#64748b' : skill.status === 'pending' ? '#d97706' : skill.status === 'approved' ? '#2563eb' : skill.status === 'published' ? '#16a34a' : skill.status === 'offline' ? '#db2777' : '#9ca3af'};">${getStatusLabel(skill.status)}</span>
                                    <span style="font-size: 12px; color: #3b82f6; cursor: pointer; font-weight: 500; margin-left: 12px;" onclick="showOperationLog('${skill.id}')">操作记录</span>
                                </div>
                                <div style="margin-bottom: 6px;">
                                    <span style="font-size: 20px; font-weight: 600; color: #1e293b;">${skill.name}</span>
                                    <span style="font-size: 14px; font-weight: 400; color: #94a3b8; margin-left: 8px;">(${skill.id})</span>
                                    <span class="skill-category" style="margin-left: 8px;">${getCategoryName(skill.category)}</span>
                                </div>
                                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; overflow: hidden;">
                                    ${skill.tags.split('|').map(tag => `<span class="tag" style="padding: 3px 8px; background: #f1f5f9; border-radius: 4px; font-size: 12px; color: #64748b;">${tag}</span>`).join('')}
                                </div>
                                <div style="font-size: 13px; color: #64748b; line-height: 1.6; margin-bottom: 12px;">${skill.description}</div>
                                <div style="display: flex; align-items: center; gap: 20px;">
                                    <div class="usage-count" style="font-size: 13px; color: #64748b;"><i class="fa fa-bar-chart"></i>${skill.usageCount}次使用</div>
                                    <div style="font-size: 12px; color: #94a3b8;">创建时间：${skill.createTime || skill.updateTime} 10:10　|　最后更新：${skill.updateTime} 10:52</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-section" style="margin-left: 20px;">
                        <h4 class="section-title">执行规则</h4>
                        <div style="padding: 16px; background: #f8fafc; border-radius: 6px; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; color: #374151;">${skill.content || '-'}</div>
                    </div>
                `;
                
                // 根据状态生成操作按钮
                const footer = document.getElementById('detail-footer');
                let buttonsHtml = '';
                switch(skill.status) {
                    case 'draft':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="editSkill('${skill.id}')"><i class="fa fa-edit"></i> 编辑</button>
                            <button class="btn btn-primary" onclick="submitForReview('${skill.id}')"><i class="fa fa-upload"></i> 提交审核</button>
                            <button class="btn btn-danger" onclick="markInvalid('${skill.id}')"><i class="fa fa-ban"></i> 作废</button>
                        `;
                        break;
                    case 'pending':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="withdrawReview('${skill.id}')"><i class="fa fa-arrow-left"></i> 撤回审核</button>
                            <button class="btn btn-primary" onclick="approveSkill('${skill.id}')"><i class="fa fa-check-circle"></i> 审核</button>
                        `;
                        break;
                    case 'approved':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="rejectSkill('${skill.id}')"><i class="fa fa-undo"></i> 退回重调</button>
                        `;
                        break;
                    case 'invalid':
                        buttonsHtml = `
                            <button class="btn btn-danger" onclick="deleteSkill('${skill.id}')"><i class="fa fa-trash"></i> 删除</button>
                        `;
                        break;
                    default:
                        buttonsHtml = '';
                }
                footer.innerHTML = buttonsHtml;
                
                document.getElementById('skill-detail-modal').classList.add('show');
            }
        }

        function closeDetailModal() {
            document.getElementById('skill-detail-modal').classList.remove('show');

            if (event.target === document.getElementById('skill-detail-modal')) {
                closeDetailModal();
            }
        }

        function editSkill(id) {
            closeDetailModal();
            viewSkillForEdit(id);
        }

        function submitForReview(id) {
            alert(`技能 ${id} 提交审核`);
        }
        
        // 作废技能
        function markInvalid(id) {
            alert(`技能 ${id} 已作废`);
        }
        
        // 显示操作记录
        function showOperationLog(id) {
            alert(`显示技能 ${id} 的操作记录`);
        }
        
        // 撤回审核
        function withdrawReview(id) {
            alert(`技能 ${id} 撤回审核`);
        }
        
        // 审核通过
        function approveSkill(id) {
            alert(`技能 ${id} 审核通过`);
        }
        
        // 退回重调
        function rejectSkill(id) {
            alert(`技能 ${id} 退回重调`);
        }
        
        // 删除技能
        function deleteSkill(id) {
            alert(`技能 ${id} 删除`);
        }
        
        // 查看技能用于编辑
        function viewSkillForEdit(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                document.getElementById('modal-title').textContent = '编辑技能';
                document.getElementById('edit-id').value = skill.id;
                document.getElementById('skill-name').value = skill.name;
                document.getElementById('skill-category').value = skill.category;
                document.getElementById('skill-description').value = skill.description;
                document.getElementById('skill-tags').value = skill.tags;
                
                currentImageData = skill.icon || null;
                updateImageUploadPreview(skill.icon);
                
                document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));
                
                document.getElementById('skill-modal').classList.add('show');
                
                setTimeout(() => {
                    initEasyMDE();
                    if (window.easyMDE) {
                        window.easyMDE.value(skill.content || '');
                    }
                }, 200);
            }
        }
        
        // 初始化EasyMDE编辑器
        function initEasyMDE() {
            const textarea = document.getElementById('skill-content');
            if (!textarea) {
                console.log('textarea not found');
                return;
            }
            
            // 如果已经初始化过，先销毁
            if (window.easyMDE) {
                try {
                    window.easyMDE.toTextArea();
                } catch(e) {
                    console.log('Error destroying EasyMDE:', e);
                }
                window.easyMDE = null;
            }
            
            try {
                window.easyMDE = new EasyMDE({
                    element: textarea,
                    spellChecker: false,
                    status: false,
                    placeholder: '请输入执行规则',
                    autosave: {
                        enabled: false
                    },
                    minHeight: '300px',
                    toolbar: [
                        'bold', 'italic', 'heading', '|',
                        'quote', 'unordered-list', 'ordered-list', '|',
                        'link', 'image', '|',
                        'preview', 'side-by-side', 'fullscreen', '|',
                        'guide'
                    ]
                });
                console.log('EasyMDE initialized successfully');
            } catch(e) {
                console.error('Error initializing EasyMDE:', e);
            }
        }
        
        // 处理图片上传
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageData = e.target.result;
                updateImageUploadPreview(e.target.result);
            };
            reader.readAsDataURL(file);
        }
        
        // 更新图片上传预览
        function updateImageUploadPreview(imageData) {
            const uploadBox = document.getElementById('image-upload-box');
            const uploadBtn = document.getElementById('image-btn');
            
            if (imageData) {
                uploadBox.innerHTML = `<img src="${imageData}" class="image-preview">`;
                uploadBox.classList.add('has-image');
                uploadBtn.style.display = 'block';
            } else {
                resetImageUpload();
            }
        }
        
        // 重置图片上传
        function resetImageUpload() {
            const uploadBox = document.getElementById('image-upload-box');
            const uploadBtn = document.getElementById('image-btn');
            const input = document.getElementById('image-upload-input');
            
            uploadBox.innerHTML = '<i class="fa fa-plus"></i><span>上传图标</span>';
            uploadBox.classList.remove('has-image');
            uploadBtn.style.display = 'none';
            input.value = '';
        }
        
        // 删除图片
        function deleteImage() {
            currentImageData = null;
            resetImageUpload();
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('skill-modal').classList.remove('show');
        }

        // 点击遮罩层关闭弹窗
        function handleOverlayClick(event) {
            if (event.target === document.getElementById('skill-modal')) {
                closeModal();
            }
        }

        // 保存技能
        function saveSkill() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('skill-name').value.trim();
            const category = document.getElementById('skill-category').value;
            const tags = document.getElementById('skill-tags').value.trim();
            const description = document.getElementById('skill-description').value;
            const content = window.easyMDE ? window.easyMDE.value() : '';

            // 验证
            let isValid = true;
            
            // 验证技能图标
            if (!currentImageData) {
                document.getElementById('icon-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('icon-error').classList.remove('show');
            }
            
            // 验证技能分类
            if (!category) {
                document.getElementById('category-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('category-error').classList.remove('show');
            }
            
            // 验证技能名称：2-6个字
            if (!name || name.length < 2 || name.length > 6) {
                document.getElementById('name-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('name-error').classList.remove('show');
            }
            
            // 验证技能标签：限制30个字
            if (tags.length > 30) {
                document.getElementById('tags-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('tags-error').classList.remove('show');
            }
            
            // 验证执行规则：必填
            if (!content || content.trim() === '') {
                document.getElementById('content-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('content-error').classList.remove('show');
            }

            if (!isValid) return;

            const skillData = {
                id: id || 'SKL' + String(skills.length + 1).padStart(3, '0'),
                name: name,
                description: description,
                category: category,
                tags: tags,
                icon: currentImageData,
                iconColor: 'blue',
                status: 'draft',
                content: content,
                model: '',
                usageCount: id ? skills.find(s => s.id === id)?.usageCount || 0 : 0,
                updateTime: new Date().toISOString().split('T')[0]
            };

            if (id) {
                const index = skills.findIndex(s => s.id === id);
                if (index !== -1) {
                    skills[index] = skillData;
                }
            } else {
                skills.push(skillData);
            }

            applyFilters();
            closeModal();
        }

        // 添加到Agent
        function addToAgent(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                alert(`已将技能「${skill.name}」添加到Agent`);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderSkills();
        });
    </script>
</body>
</html>
