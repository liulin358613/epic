<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Skill技能库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background: #f5f7fa;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e5e7eb;
            height: calc(100vh - 100px);
        }
        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-outline {
            background: white;
            color: #64748b;
            border: 1px solid #e5e7eb;
        }
        .btn-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            border: 1px solid #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
            border-color: #dc2626;
        }
        .form-control {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }
        .page-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .page-subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .main-content {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .tabs-wrapper {
            display: flex;
            gap: 0;
            padding: 0 16px;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }
        .tab-item {
            padding: 12px 20px;
            border-radius: 0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #64748b;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
        }
        .tab-item:hover {
            color: #6366f1;
        }
        .tab-item.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
            background: transparent;
        }
        .search-bar {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }
        .skill-grid {
            flex: 1;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            grid-auto-rows: min-content;
            overflow-y: auto;
            min-height: 0;
        }
        .skill-card {
            background: white;
            border-radius: 6px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }
        .skill-card:hover {
            border-color: #cbd5e1;
            background: #fafafa;
        }
        .skill-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            color: #64748b;
            background: #e2e2e2;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: 500;
        }
        .skill-badge.status.draft {
            background: #f1f5f9;
            color: #64748b;
        }
        .skill-badge.status.pending {
            background: #fef3c7;
            color: #d97706;
        }
        .skill-badge.status.approved {
            background: #dbeafe;
            color: #2563eb;
        }
        .skill-badge.status.published {
            background: #dcfce7;
            color: #16a34a;
        }
        .skill-badge.status.offline {
            background: #fce7f3;
            color: #db2777;
        }
        .skill-badge.status.invalid {
            background: #f3f4f6;
            color: #9ca3af;
        }
        .skill-category {
            font-size: 12px;
            font-weight: 500;
            color: #6366f1;
            margin-left: 6px;
            padding: 2px 8px;
            background: #eef2ff;
            border-radius: 4px;
            border: 1px solid #ddd6fe;
        }
        .skill-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }
        .skill-icon {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }
        .skill-icon.orange {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        }
        .skill-icon.blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .skill-icon.purple {
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
        }
        .skill-icon.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .skill-icon.red {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .skill-icon.cyan {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }
        .skill-icon.pink {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
        }
        .skill-icon.yellow {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
        }
        .skill-info {
            flex: 1;
            min-width: 0;
        }
        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .skill-id {
            font-size: 11px;
            font-weight: normal;
            color: #94a3b8;
            margin-left: 4px;
        }
        .skill-desc {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            overflow: hidden;
        }
        .tag {
            padding: 2px 6px;
            background: #f1f5f9;
            border-radius: 3px;
            font-size: 11px;
            color: #64748b;
        }
        .skill-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f1f5f9;
        }
        .usage-count {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .usage-count i {
            color: #94a3b8;
        }
        .btn-add {
            padding: 3px 12px;
            background: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 3px;
            font-size: 12px;
            font-weight: normal;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-add:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pagination-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pagination-btn:hover:not(.active) {
            background: #f8fafc;
        }
        .pagination-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #3b82f6;
            color: white;
        }
        .pagination-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 16px 24px;
            border-top: 1px solid #f1f5f9;
            background: white;
        }
        .image-upload-wrapper {
            position: relative;
            display: inline-block;
        }
        .image-upload-box {
            width: 100px;
            height: 100px;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        .image-upload-box:hover {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .image-upload-box.has-image {
            border-style: solid;
            border-color: #e2e8f0;
            padding: 8px;
        }
        .image-upload-box i {
            font-size: 24px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .image-upload-box span {
            font-size: 12px;
            color: #94a3b8;
        }
        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
        }
        .image-delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .image-upload-wrapper:hover .image-delete-btn {
            opacity: 1;
        }
        .image-upload-input {
            display: none;
        }
        .EasyMDEContainer {
            width: 100%;
        }
        .EasyMDEContainer .CodeMirror {
            min-height: 300px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 14px;
        }
        .EasyMDEContainer .editor-toolbar {
            border: 1px solid #e2e8f0;
            border-radius: 4px 4px 0 0;
            background: #f8fafc;
        }
        .EasyMDEContainer .editor-toolbar button {
            color: #64748b;
        }
        .EasyMDEContainer .editor-toolbar button:hover,
        .EasyMDEContainer .editor-toolbar button.active {
            background: #e2e8f0;
        }
        .EasyMDEContainer .editor-preview {
            min-height: 300px;
            padding: 16px;
            background: #fff;
        }
        .basic-info-row {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .avatar-section {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 12px;
        }
        .avatar-section .form-label {
            margin-bottom: 0;
            white-space: nowrap;
        }
        .avatar-col {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .btn-upload {
            padding: 6px 16px;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0;
        }
        .btn-upload:hover {
            background: #e2e8f0;
            color: #475569;
        }
        .type-name-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-item-inline {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-item-inline .form-label {
            margin-bottom: 0;
            padding-top: 6px;
            flex: 0 0 80px;
            text-align: right;
        }
        .form-item-inline .form-control {
            flex: 1;
            max-width: none;
        }
        .input-wrapper {
            flex: 1;
            max-width: none;
        }
        .input-wrapper .form-control {
            width: 100%;
        }
        .pagination-info {
            color: #64748b;
            font-size: 14px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            position: fixed;
            top: 0;
            right: -1000px;
            width: 1000px;
            height: 100vh;
            background: white;
            box-shadow: -20px 0 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: right 0.3s ease;
            z-index: 1001;
        }
        .modal-overlay.show .modal {
            right: 0;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .modal-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px;
        }
        .modal-close:hover {
            color: #64748b;
        }
        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            gap: 10px;
            background: #fafafa;
        }
        .form-section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin:8px 0;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-item {
            flex: 1;
            min-width: 0;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-label .required {
            color: #ef4444;
            margin-left: 4px;
        }
        .modal .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            transition: all 0.2s ease;
        }
        .modal .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .textarea-control {
            resize: vertical;
            min-height: 100px;
        }
        .error-text {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            display: none;
            width: 100%;
        }
        .error-text.show {
            display: block;
        }
        @media screen and (max-width: 768px) {
            .main-content {
                padding: 8px;
            }
            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .form-control {
                width: 100%;
            }
            .skill-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div>
            <h1 class="page-title">Skill技能库</h1>
            <p class="page-subtitle">管理和配置AI技能</p>
        </div>
    </header>

    <main class="main-content">
        <div class="card">
            <!-- 顶部标签页 -->
            <div class="tabs-wrapper">
                <div class="tab-item active" data-tab="all" onclick="switchTab('all')">全部</div>
                <div class="tab-item" data-tab="draft" onclick="switchTab('draft')">草稿</div>
                <div class="tab-item" data-tab="pending" onclick="switchTab('pending')">待审核</div>
                <div class="tab-item" data-tab="approved" onclick="switchTab('approved')">审核通过</div>
                <div class="tab-item" data-tab="invalid" onclick="switchTab('invalid')">已作废</div>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" class="form-control" placeholder="搜索技能名称..." id="search-input" style="min-width: 200px;">
                <select class="form-control" id="category-filter">
                    <option value="">全部分类</option>
                    <option value="writing">文案写作</option>
                    <option value="analysis">数据分析</option>
                    <option value="design">设计创意</option>
                    <option value="research">研究调研</option>
                    <option value="translation">翻译</option>
                    <option value="other">其他</option>
                </select>
                <button class="btn btn-outline" onclick="searchSkills()"><i class="fa fa-search"></i> 搜索</button>
                <button class="btn btn-outline" onclick="resetSearch()"><i class="fa fa-refresh"></i> 重置</button>
                <button class="btn btn-primary" onclick="addSkill()"><i class="fa fa-plus"></i> 添加技能</button>
            </div>

            <!-- 技能网格 -->
            <div class="skill-grid" id="skill-grid">
                <!-- 动态生成 -->
            </div>

            <!-- 分页 -->
            <div class="pagination-footer">
                <div style="display: flex; align-items: center; gap: 4px; justify-content: flex-end;">
                    <span class="text-gray-500 text-sm" id="pagination-info" style="display: none;">显示 1-12 条，共 12 条</span>
                    <span class="text-gray-500 text-sm" id="total-count">共 12 条</span>
                    <div class="pagination" id="pagination">
                        <button class="pagination-btn" onclick="prevPage()">
                            <i class="fa fa-angle-left"></i>
                        </button>
                        <button class="pagination-btn active" onclick="goToPage(1)">1</button>
                        <button class="pagination-btn" onclick="goToPage(2)">2</button>
                        <button class="pagination-btn" onclick="goToPage(3)">3</button>
                        <button class="pagination-btn" onclick="goToPage(4)">4</button>
                        <button class="pagination-btn" onclick="goToPage(5)">5</button>
                        <button class="pagination-btn" onclick="nextPage()">
                            <i class="fa fa-angle-right"></i>
                        </button>
                    </div>
                    <select class="form-control" style="width: auto; margin-left: 8px;" id="page-size">
                        <option>10条/页</option>
                        <option>20条/页</option>
                        <option>50条/页</option>
                    </select>
                    <span style="color: #64748b; font-size: 14px; margin-left: 8px;">跳至</span>
                    <input type="text" class="form-control" style="width: 50px; margin-left: 8px;" id="page-input" value="1">
                    <span style="color: #64748b; font-size: 14px; margin-left: 8px;">页</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加/编辑技能弹窗 -->
    <div class="modal-overlay" id="skill-modal" onclick="handleOverlayClick(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">添加技能</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <input type="hidden" id="edit-id" value="">
                
                <div class="form-section">
                    <div class="basic-info-row">
                        <div class="avatar-section">
                            <label class="form-label">图标<span class="required">*</span></label>
                            <div class="avatar-col">
                                <div class="image-upload-box" id="image-upload-box" onclick="document.getElementById('image-upload-input').click()">
                                    <i class="fa fa-plus"></i>
                                    <span>上传图标</span>
                                </div>
                                <div class="error-text" id="icon-error">请上传技能图标</div>
                                <button class="btn-upload" id="image-btn" onclick="document.getElementById('image-upload-input').click()" style="display: none;">重新上传</button>
                                <input type="file" class="image-upload-input" id="image-upload-input" accept="image/*" onchange="handleImageUpload(event)">
                            </div>
                        </div>
                        
                        <div class="type-name-section">
                            <div class="form-item-inline">
                                <label class="form-label">分类<span class="required">*</span></label>
                                <div class="input-wrapper">

        let skills = [
            { id: 'SKL001', name: 'AI助手写作', description: '利用AI帮助您快速撰写高质量文章，支持多种写作场景，包括：文案撰写、报告生成、邮件写作等', category: 'writing', tags: '写作|AI|文案', icon: 'fa-pencil', iconColor: 'orange', status: 'approved', content: '# AI助手写作\n\n## 能力定位\n专注全场景智能写作辅助，能够根据用户需求、使用场景、受众群体，自动拆解写作结构、梳理内容逻辑、匹配对应文风，全自动完成各类文案撰写、内容填充、语句润色、亮点提炼，适配商务、职场、校园、营销等全场景写作需求。\n\n## 核心执行能力\n1. **需求智能解析**：自动识别用户写作用途、目标受众、核心诉求、整体风格，区分正式商务、简约工作、学术论文、营销推广等不同文风，精准匹配输出内容。\n2. **框架自动搭建**：可根据主题自动生成标准文章结构，包含引言、正文分点、案例支撑、数据论证、总结展望等完整模块，结构合规、层级清晰。\n3. **文案全自动撰写**：针对文章主题自动填充对应正文内容，做到内容贴合主题、逻辑连贯、语句通顺、重点突出，杜绝空洞冗余内容。\n4. **内容优化润色**：自动优化文案语句，精简啰嗦内容、修正逻辑漏洞、拔高内容质感，统一全文文风与语句节奏，让文案专业、简洁、正式、有说服力。\n5. **核心亮点提炼**：智能抓取核心要点、关键数据、重要结论，转化为精炼表达，提升内容可读性与传播力。\n6. **场景化适配输出**：支持新闻稿、产品介绍、活动文案、社媒内容、学术摘要等全类型文案定制输出。\n\n## 执行规范\n1. 输出内容结构层级分明，标题分级清晰，符合大众阅读逻辑；\n2. 文案简洁干练、专业正式，无口语化、碎片化语句；\n3. 可根据用户要求调整详略、文风、字数，支持精简版、详细版、高端商务版切换；\n4. 支持二次迭代修改，可针对已有内容进行优化、改写、补全、纠错、升级。', model: 'gpt4', usageCount: 1256, updateTime: '2026-05-28' },
            { id: 'SKL002', name: 'PPT文案写作', description: '自动生成PPT演示文稿内容，支持多种主题风格，快速生成专业演示文稿大纲和内容', category: 'writing', tags: 'PPT|演示|文案', icon: 'fa-file-text-o', iconColor: 'blue', status: 'approved', content: '# PPT文案写作\n\n## 能力定位\n专注全场景PPT自动化文案创作，能够根据用户需求、使用场景、受众群体，自动拆解PPT结构、梳理内容逻辑、匹配对应文风，全自动完成整套PPT文案撰写、内容填充、语句润色、亮点提炼，适配商务、职场、校园、宣讲等全场景PPT制作需求。\n\n## 核心执行能力\n1. **需求智能解析**：自动识别用户PPT用途、汇报对象、核心诉求、整体风格，区分正式商务、简约工作、学术答辩、路演宣讲等不同文风，精准匹配输出内容。\n2. **框架自动搭建**：可根据主题自动生成标准PPT目录结构，包含封面标题、目录、前言、核心内容、数据总结、问题分析、解决方案、工作总结、未来规划、结尾致谢等完整模块，结构合规、层级清晰。\n3. **文案全自动撰写**：针对每一页PPT页面自动填充对应正文内容，做到内容贴合主题、逻辑连贯、语句通顺、重点突出，杜绝空洞冗余内容，适配职场汇报、商务提案、产品介绍等专业场景。\n4. **内容优化润色**：自动优化文案语句，精简啰嗦内容、修正逻辑漏洞、拔高内容质感，统一全文文风与语句节奏，让PPT文案专业、简洁、正式、有说服力。\n5. **核心亮点提炼**：智能抓取工作重点、项目成果、核心优势、数据亮点，转化为适合PPT展示的精炼短句、重点结论，适配页面可视化展示需求。\n6. **场景化适配输出**：支持工作总结PPT、工作汇报PPT、产品宣讲PPT、项目答辩PPT、商务方案PPT、培训课件PPT、述职报告PPT等全类型文案定制输出。\n\n## 执行规范\n1. 输出内容结构层级分明，标题分级清晰，符合大众PPT排版阅读逻辑；\n2. 文案简洁干练、专业正式，无口语化、碎片化语句，适配职场商务场景；\n3. 可根据用户要求调整详略、文风、字数，支持精简版、详细版、高端商务版切换；\n4. 支持二次迭代修改，可针对已有PPT内容进行优化、改写、补全、纠错、升级。', model: 'gpt4', usageCount: 892, updateTime: '2026-05-27' },
            { id: 'SKL003', name: '工作总结写作', description: '根据工作内容自动生成工作总结报告，支持周总结、月总结、年终总结等多种格式', category: 'writing', tags: '总结|报告|工作', icon: 'fa-bar-chart', iconColor: 'purple', status: 'approved', content: '# 工作总结写作\n\n## 能力定位\n专注职场工作总结自动化创作，能够根据用户工作内容、时间周期、汇报对象，自动梳理工作成果、提炼核心亮点、分析问题不足、规划未来方向，生成结构完整、逻辑清晰、内容详实的工作总结报告，适配周总结、月总结、季度总结、年终总结等全周期工作汇报需求。\n\n## 核心执行能力\n1. **周期智能识别**：自动识别总结周期类型（周/月/季度/年度），匹配对应汇报深度与详略程度，确保内容符合周期特点。\n2. **成果自动梳理**：根据用户输入的工作事项，自动归类整理、提炼核心成果、量化工作业绩，突出工作价值与贡献。\n3. **亮点精准提炼**：智能抓取工作中的关键数据、重大突破、创新举措、获奖荣誉，转化为可量化的成果展示。\n4. **问题深度分析**：自动梳理工作中遇到的困难与挑战，分析问题根源，提出针对性改进建议与解决方案。\n5. **计划科学规划**：结合过往工作基础，智能制定下一周期工作目标、重点任务、实施路径与预期成果，确保计划可行性与可衡量性。\n6. **格式规范输出**：支持标准工作总结、述职报告、绩效自评等多种格式，符合职场汇报规范。\n\n## 执行规范\n1. 输出内容结构清晰，包含工作概述、主要成果、问题分析、改进措施、未来计划等核心模块；\n2. 数据真实可查，成果表述客观准确，避免夸大或模糊表述；\n3. 语言专业规范，符合职场汇报语境，无口语化表达；\n4. 支持按用户要求调整详略程度，可生成精简版（1页）或详细版（多页）报告。', model: 'wenxin', usageCount: 2134, updateTime: '2026-05-26' },
            { id: 'SKL004', name: '小红书文案', description: '创作符合小红书风格的种草文案，吸引用户关注和互动', category: 'writing', tags: '小红书|种草|文案', icon: 'fa-image', iconColor: 'pink', status: 'pending', content: '# 小红书文案\n\n## 能力定位\n专注小红书平台内容创作，深谙小红书用户喜好与平台算法规则，能够根据产品特点、目标受众、推广目的，自动生成符合小红书风格的种草文案，包含吸睛标题、沉浸式体验描述、实用干货分享、引导互动话术，助力品牌曝光与产品转化。\n\n## 核心执行能力\n1. **风格精准匹配**：自动识别并模仿小红书爆款文案风格，包括口语化表达、表情符号运用、话题标签搭配、分段排版等特点。\n2. **标题吸睛创作**：生成多种风格标题（数字型、疑问型、痛点型、利益型），提升笔记点击率与曝光量。\n3. **场景化体验描述**：构建沉浸式使用场景，用生动语言描述产品使用体验、效果感受、前后对比，引发用户共鸣。\n4. **干货价值输出**：提炼产品核心卖点、使用技巧、选购指南、避坑攻略，提供实用价值，增强用户信任。\n5. **互动引导设计**：巧妙设计互动提问、投票引导、话题讨论，提升笔记互动率与用户粘性。\n6. **关键词优化**：精准匹配用户搜索习惯，合理布局关键词，提升笔记搜索曝光机会。\n\n## 执行规范\n1. 语言风格亲切自然，使用口语化表达，避免生硬广告感；\n2. 合理使用表情符号（不超过3个/段），增强文案活力；\n3. 分段清晰简短，每段不超过2-3行，适配移动端阅读；\n4. 结尾添加相关话题标签（5-8个），提升笔记曝光；\n5. 符合小红书社区规范，不包含违规内容与敏感信息。', model: 'gpt4', usageCount: 1567, updateTime: '2026-05-25' },
            { id: 'SKL005', name: '市场分析报告', description: '深度分析市场数据，生成专业的市场分析报告，助力商业决策', category: 'analysis', tags: '分析|报告|市场', icon: 'fa-line-chart', iconColor: 'green', status: 'approved', content: '# 市场分析报告\n\n## 能力定位\n专注市场研究与数据分析，能够根据行业特点、市场环境、竞争格局，自动整合多维度市场信息，进行深度分析研判，生成专业、客观、详实的市场分析报告，为企业战略规划、投资决策、产品定位提供数据支撑与洞察参考。\n\n## 核心执行能力\n1. **数据整合分析**：自动收集并整合行业数据、市场规模、增长率、趋势变化等信息，进行量化分析与可视化呈现。\n2. **竞争格局研判**：分析主要竞争对手市场份额、产品特点、竞争策略、优劣势，绘制竞争态势图。\n3. **消费者洞察**：研究目标用户群体特征、消费习惯、需求痛点、购买决策因素，提炼用户画像。\n4. **趋势预测分析**：基于历史数据与行业动态，预测市场未来发展趋势、潜在机会与风险挑战。\n5. **SWOT分析**：系统分析企业内部优势、劣势与外部机会、威胁，形成战略建议。\n6. **报告结构化输出**：生成包含市场概述、竞争分析、用户分析、趋势预测、战略建议等模块的完整报告。\n\n## 执行规范\n1. 数据来源可靠，标注数据出处与统计周期；\n2. 分析逻辑严谨，结论基于数据支撑，避免主观臆断；\n3. 报告结构清晰，包含摘要、正文、附录等部分；\n4. 图表运用恰当，数据可视化呈现直观易懂；\n5. 语言专业客观，符合商业分析报告规范。', model: 'tongyi', usageCount: 456, updateTime: '2026-05-24' },
            { id: 'SKL006', name: '竞品分析', description: '全面分析竞争对手产品，生成竞品分析报告，发现市场机会', category: 'analysis', tags: '竞品|分析|报告', icon: 'fa-search', iconColor: 'cyan', status: 'draft', content: '# 竞品分析\n\n## 能力定位\n专注竞品深度研究与分析，能够系统梳理竞争对手产品特性、功能亮点、市场表现、用户评价，通过多维度对比分析，帮助企业了解竞争格局、发现差异化机会、优化产品策略，提升市场竞争力。\n\n## 核心执行能力\n1. **竞品识别筛选**：根据目标市场与产品定位，自动识别核心竞争对手与潜在竞品。\n2. **产品特性剖析**：深入分析竞品功能设计、技术架构、用户体验、视觉设计等核心特性。\n3. **市场表现分析**：研究竞品市场份额、用户规模、增长趋势、定价策略、渠道布局。\n4. **用户评价洞察**：收集并分析竞品用户反馈、好评痛点、使用场景、满意度数据。\n5. **差异化机会挖掘**：通过对比分析，发现市场空白点、用户未被满足需求、竞品薄弱环节。\n6. **战略建议输出**：基于分析结果，提出产品优化方向、竞争策略、市场切入点建议。\n\n## 执行规范\n1. 分析维度全面，覆盖产品、市场、用户、运营等关键维度；\n2. 数据客观真实，避免主观评判，用事实与数据说话；\n3. 对比分析清晰，运用表格、矩阵等形式直观呈现差异；\n4. 建议切实可行，结合企业实际情况提出可落地的策略方案；\n5. 报告格式规范，包含竞品概况、对比分析、机会发现、战略建议等模块。', model: 'gemini', usageCount: 328, updateTime: '2026-05-23' },
            { id: 'SKL007', name: 'Deep Research', description: '深度研究特定主题，整合多源信息，生成详细的研究报告', category: 'research', tags: '研究|深度|报告', icon: 'fa-book', iconColor: 'purple', status: 'approved', content: '# Deep Research\n\n## 能力定位\n专注深度主题研究，能够针对特定领域或课题进行系统性信息收集、整理、分析与整合，跨越多个知识领域，整合学术文献、行业报告、新闻资讯、专家观点等多源信息，生成全面、深入、有价值的研究报告，为学术研究、商业决策、战略规划提供知识支撑。\n\n## 核心执行能力\n1. **主题深度挖掘**：针对用户提出的研究主题，进行多层次、多角度信息收集与分析。\n2. **多源信息整合**：自动整合学术论文、行业报告、权威媒体、专家访谈等多渠道信息来源。\n3. **知识体系构建**：梳理主题相关的核心概念、理论框架、发展脉络、关键人物与事件。\n4. **观点综合研判**：整合不同来源观点，分析争议焦点，形成客观中立的综合判断。\n5. **趋势洞察预测**：基于历史发展与当前动态，预测未来发展趋势与潜在影响。\n6. **研究报告输出**：生成结构严谨、内容详实、引用规范的深度研究报告。\n\n## 执行规范\n1. 信息来源可靠，优先引用权威渠道与学术来源；\n2. 内容客观中立，全面呈现不同观点与争议；\n3. 逻辑严密清晰，层层递进，论证充分；\n4. 引用规范，标注信息来源与出处；\n5. 报告结构完整，包含研究背景、核心发现、分析论证、结论展望等部分。', model: 'gpt4', usageCount: 298, updateTime: '2026-05-22' },

            { id: 'SKL009', name: '创意设计灵感', description: '激发设计灵感，生成创意设计方案和概念描述', category: 'design', tags: '设计|创意|灵感', icon: 'fa-lightbulb-o', iconColor: 'yellow', status: 'pending', content: '# 创意设计灵感\n\n## 能力定位\n专注设计创意激发与方案生成，能够根据设计主题、风格定位、目标受众，自动生成多元化创意设计方案，包含概念描述、视觉参考、配色建议、布局思路，为设计师提供灵感启发与创作方向，覆盖平面设计、UI设计、品牌设计、空间设计等多领域。\n\n## 核心执行能力\n1. **主题创意发散**：针对设计主题进行多角度创意发散，提供多种设计方向与概念方案。\n2. **风格定位匹配**：根据品牌调性与目标受众，推荐合适的设计风格（简约、复古、科技、自然等）。\n3. **视觉元素推荐**：提供配色方案、字体搭配、图形元素、材质质感等视觉设计建议。\n4. **布局思路规划**：针对不同设计需求，提供合理的布局结构与信息层级规划。\n5. **案例参考推荐**：推荐同类优秀设计案例，分析其设计亮点与可借鉴之处。\n6. **设计方案输出**：生成包含概念阐述、视觉描述、实施建议的完整设计方案。\n\n## 执行规范\n1. 创意新颖独特，避免俗套，提供差异化设计思路；\n2. 方案切实可行，考虑实际落地性与技术实现成本；\n3. 视觉描述生动具体，便于设计师理解与转化；\n4. 风格统一协调，配色与元素搭配符合视觉美学；\n5. 支持针对具体需求进行方案细化与深化。', model: 'gemini', usageCount: 678, updateTime: '2026-05-20' },

        // 渲染技能卡片
        function renderSkills() {
            const grid = document.getElementById('skill-grid');

            const pageSkills = filteredSkills.slice(startIndex, endIndex);

            grid.innerHTML = pageSkills.map(skill => {

                const iconHtml = isFontAwesome

                    : skill.icon 
                        ? `<img src="${skill.icon}" class="image-preview" style="width:44px;height:44px;border-radius:6px;object-fit:cover;">` 
                        : `<i class="fa fa-star" style="font-size:18px;"></i>`;
                const iconClass = isFontAwesome || !skill.icon ? skill.iconColor : '';
                
                return `
                <div class="skill-card" onclick="viewSkill('${skill.id}')">
                    <div class="skill-badge status ${skill.status}">${getStatusLabel(skill.status)}</div>
                    <div class="skill-header">
                        <div class="skill-icon ${iconClass}" style="${skill.icon && !isFontAwesome ? 'background:transparent;' : ''}">

                        <div class="skill-info">

                </div>
            `}).join('');

        // 更新分页信息
        function updatePagination() {
            const totalItems = filteredSkills.length;
            const totalPages = Math.ceil(totalItems / pageSize);
            const startItem = (currentPage - 1) * pageSize + 1;
            const endItem = Math.min(currentPage * pageSize, totalItems);

            document.getElementById('pagination-info').textContent = `显示 ${startItem}-${endItem} 条，共 ${totalItems} 条`;
            document.getElementById('total-count').textContent = `共 ${totalItems} 条`;

                const pageNum = parseInt(btn.textContent);
                btn.classList.toggle('active', pageNum === currentPage);
                btn.style.display = pageNum <= totalPages ? 'flex' : 'none';
            });
        }

        // 切换标签页

            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

        // 应用筛选条件
        function applyFilters() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const categoryFilter = document.getElementById('category-filter').value;

            let tempSkills = currentTab === 'all' ? [...skills] : skills.filter(s => s.status === currentTab);

            if (searchText) {
                tempSkills = tempSkills.filter(s => 
                    s.name.toLowerCase().includes(searchText) || 
                    (s.description && s.description.toLowerCase().includes(searchText))
                );
            }

            if (categoryFilter) {
                tempSkills = tempSkills.filter(s => s.category === categoryFilter);
            }

            filteredSkills = tempSkills;
            currentPage = 1;
            renderSkills();
        }

        // 搜索技能
        function searchSkills() {
            applyFilters();
        }

            document.getElementById('search-input').value = '';
            document.getElementById('status-filter').value = '';

            if (currentPage > 1) {

            if (window.easyMDE) {
                window.easyMDE.value('');
            }
            
            // 隐藏错误提示
            document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));
            
            document.getElementById('skill-modal').classList.add('show');
            
            // 弹窗显示后初始化markdown编辑器
            setTimeout(() => {
                initEasyMDE();
                if (window.easyMDE) {
                    window.easyMDE.value('');
                }
            }, 200);
        }

        // 查看技能详情
        function viewSkill(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                const detailBody = document.getElementById('detail-body');
                const isFontAwesome = skill.icon && skill.icon.startsWith('fa-');
                const iconHtml = isFontAwesome 
                    ? `<i class="fa ${skill.icon}" style="font-size:24px;"></i>`
                    : skill.icon 
                        ? `<img src="${skill.icon}" class="image-preview" style="width:120px;height:120px;border-radius:8px;object-fit:cover;">` 
                        : `<i class="fa fa-star" style="font-size:24px;"></i>`;
                
                detailBody.innerHTML = `
                    <div style="display: flex; flex-direction: column; height: 100%;">
                        <div style="background: white; padding: 0 16px 16px 16px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;">
                            <div style="display: flex; gap: 16px;">
                                <div class="skill-icon ${skill.iconColor}" style="margin-top: 30px; width: 80px; height: 80px; border-radius: 8px; height: 80px; border-radius: 8px; flex-shrink: 0; ${skill.icon && !isFontAwesome ? 'background:transparent;' : ''}">
                                    ${iconHtml}
                                </div>
                                <div style="flex: 1; min-width: 0;">
                                    <div style="display: flex; justify-content: flex-end;align-items: center;">
                                        <span style="font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 500; background: ${skill.status === 'draft' ? '#f1f5f9' : skill.status === 'pending' ? '#fef3c7' : skill.status === 'approved' ? '#dbeafe' : skill.status === 'published' ? '#dcfce7' : skill.status === 'offline' ? '#fce7f3' : '#f3f4f6'}; color: ${skill.status === 'draft' ? '#64748b' : skill.status === 'pending' ? '#d97706' : skill.status === 'approved' ? '#2563eb' : skill.status === 'published' ? '#16a34a' : skill.status === 'offline' ? '#db2777' : '#9ca3af'};">${getStatusLabel(skill.status)}</span>
                                        <span style="font-size: 12px; color: #3b82f6; cursor: pointer; font-weight: 500; margin-left: 12px;" onclick="showOperationLog('${skill.id}')">操作记录</span>
                                    </div>
                                    <div style="margin-bottom: 6px;">
                                        <span style="font-size: 20px; font-weight: 600; color: #1e293b;">${skill.name}</span>
                                        <span style="font-size: 14px; font-weight: 400; color: #94a3b8; margin-left: 8px;">(${skill.id})</span>
                                        <span class="skill-category" style="margin-left: 8px;">${getCategoryName(skill.category)}</span>
                                    </div>
                                    <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; overflow: hidden;">
                                        ${skill.tags.split('|').map(tag => `<span class="tag" style="padding: 3px 8px; background: #f1f5f9; border-radius: 4px; font-size: 12px; color: #64748b;">${tag}</span>`).join('')}
                                    </div>
                                    <div style="font-size: 13px; color: #64748b; line-height: 1.6; margin-bottom: 12px;">${skill.description}</div>
                                    <div style="display: flex; align-items: center; gap: 20px;">
                                        <div class="usage-count" style="font-size: 13px; color: #64748b;"><i class="fa fa-bar-chart"></i>${skill.usageCount}次使用</div>
                                        <div style="font-size: 12px; color: #94a3b8;">创建时间：${skill.createTime || skill.updateTime} 10:10　|　最后更新：${skill.updateTime} 10:52</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-section" style="margin-left: 20px; flex: 1; display: flex; flex-direction: column; min-height: 0;margin-bottom: 0px;">
                            <h4 class="section-title" style="flex-shrink: 0;">执行规则</h4>
                            <div style="padding: 16px; background: #f8fafc; border-radius: 6px; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; color: #374151; flex: 1; overflow-y: auto; min-height: 0;">${skill.content || '-'}</div>
                        </div>
                    </div>
                `;
                
                // 根据状态生成操作按钮
                const footer = document.getElementById('detail-footer');
                let buttonsHtml = '';
                switch(skill.status) {
                    case 'draft':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="editSkill('${skill.id}')"><i class="fa fa-edit"></i> 编辑</button>
                            <button class="btn btn-primary" onclick="submitForReview('${skill.id}')"><i class="fa fa-upload"></i> 提交审核</button>
                            <button class="btn btn-danger" onclick="markInvalid('${skill.id}')"><i class="fa fa-ban"></i> 作废</button>
                        `;
                        break;
                    case 'pending':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="withdrawReview('${skill.id}')"><i class="fa fa-arrow-left"></i> 撤回审核</button>
                            <button class="btn btn-primary" onclick="approveSkill('${skill.id}')"><i class="fa fa-check-circle"></i> 审核</button>
                        `;
                        break;
                    case 'approved':
                        buttonsHtml = `
                            <button class="btn btn-outline" onclick="rejectSkill('${skill.id}')"><i class="fa fa-undo"></i> 退回重调</button>
                        `;
                        break;
                    case 'invalid':
                        buttonsHtml = `
                            <button class="btn btn-danger" onclick="deleteSkill('${skill.id}')"><i class="fa fa-trash"></i> 删除</button>
                        `;
                        break;
                    default:
                        buttonsHtml = '';
                }
                footer.innerHTML = buttonsHtml;
                
                document.getElementById('skill-detail-modal').classList.add('show');
            }
        }
        
        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('skill-detail-modal').classList.remove('show');
        }
        
        // 点击详情弹窗遮罩层关闭
        function handleDetailOverlayClick(event) {
            if (event.target === document.getElementById('skill-detail-modal')) {
                closeDetailModal();
            }
        }
        
        // 编辑技能
        function editSkill(id) {
            closeDetailModal();
            viewSkillForEdit(id);
        }
        
        // 提交审核
        function submitForReview(id) {
            alert(`技能 ${id} 提交审核`);
        }
        
        // 作废技能
        function markInvalid(id) {
            alert(`技能 ${id} 已作废`);
        }
        
        // 显示操作记录
        function showOperationLog(id) {
            alert(`显示技能 ${id} 的操作记录`);
        }
        
        // 撤回审核
        function withdrawReview(id) {
            alert(`技能 ${id} 撤回审核`);
        }
        
        // 审核通过
        function approveSkill(id) {
            alert(`技能 ${id} 审核通过`);
        }
        
        // 退回重调
        function rejectSkill(id) {
            alert(`技能 ${id} 退回重调`);
        }
        
        // 删除技能
        function deleteSkill(id) {
            alert(`技能 ${id} 删除`);
        }
        
        // 查看技能用于编辑
        function viewSkillForEdit(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                document.getElementById('modal-title').textContent = '编辑技能';
                document.getElementById('edit-id').value = skill.id;
                document.getElementById('skill-name').value = skill.name;
                document.getElementById('skill-category').value = skill.category;
                document.getElementById('skill-description').value = skill.description;
                document.getElementById('skill-tags').value = skill.tags;
                
                currentImageData = skill.icon || null;
                updateImageUploadPreview(skill.icon);
                
                document.querySelectorAll('.error-text').forEach(el => el.classList.remove('show'));
                
                document.getElementById('skill-modal').classList.add('show');
                
                setTimeout(() => {
                    initEasyMDE();
                    if (window.easyMDE) {
                        window.easyMDE.value(skill.content || '');
                    }
                }, 200);
            }
        }
        
        // 初始化EasyMDE编辑器
        function initEasyMDE() {
            const textarea = document.getElementById('skill-content');
            if (!textarea) {
                console.log('textarea not found');
                return;
            }
            
            // 如果已经初始化过，先销毁
            if (window.easyMDE) {
                try {
                    window.easyMDE.toTextArea();
                } catch(e) {
                    console.log('Error destroying EasyMDE:', e);
                }
                window.easyMDE = null;
            }
            
            try {
                window.easyMDE = new EasyMDE({
                    element: textarea,
                    spellChecker: false,
                    status: false,
                    placeholder: '请输入执行规则',
                    autosave: {
                        enabled: false
                    },
                    minHeight: '300px',
                    toolbar: [
                        'bold', 'italic', 'heading', '|',
                        'quote', 'unordered-list', 'ordered-list', '|',
                        'link', 'image', '|',
                        'preview', 'side-by-side', 'fullscreen', '|',
                        'guide'
                    ]
                });
                console.log('EasyMDE initialized successfully');
            } catch(e) {
                console.error('Error initializing EasyMDE:', e);
            }
        }
        
        // 处理图片上传
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageData = e.target.result;
                updateImageUploadPreview(e.target.result);
            };
            reader.readAsDataURL(file);
        }
        
        // 更新图片上传预览
        function updateImageUploadPreview(imageData) {
            const uploadBox = document.getElementById('image-upload-box');
            const uploadBtn = document.getElementById('image-btn');
            
            if (imageData) {
                uploadBox.innerHTML = `<img src="${imageData}" class="image-preview">`;
                uploadBox.classList.add('has-image');
                uploadBtn.style.display = 'block';
            } else {
                resetImageUpload();
            }
        }
        
        // 重置图片上传
        function resetImageUpload() {
            const uploadBox = document.getElementById('image-upload-box');
            const uploadBtn = document.getElementById('image-btn');
            const input = document.getElementById('image-upload-input');
            
            uploadBox.innerHTML = '<i class="fa fa-plus"></i><span>上传图标</span>';
            uploadBox.classList.remove('has-image');
            uploadBtn.style.display = 'none';
            input.value = '';
        }
        
        // 删除图片
        function deleteImage() {
            currentImageData = null;
            resetImageUpload();
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('skill-modal').classList.remove('show');
        }

        // 点击遮罩层关闭弹窗
        function handleOverlayClick(event) {
            if (event.target === document.getElementById('skill-modal')) {
                closeModal();
            }
        }

        // 保存技能
        function saveSkill() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('skill-name').value.trim();
            const category = document.getElementById('skill-category').value;
            const tags = document.getElementById('skill-tags').value.trim();
            const description = document.getElementById('skill-description').value;
            const content = window.easyMDE ? window.easyMDE.value() : '';

            // 验证
            let isValid = true;
            
            // 验证技能图标
            if (!currentImageData) {
                document.getElementById('icon-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('icon-error').classList.remove('show');
            }
            
            // 验证技能分类
            if (!category) {
                document.getElementById('category-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('category-error').classList.remove('show');
            }
            
            // 验证技能名称：2-6个字
            if (!name || name.length < 2 || name.length > 6) {
                document.getElementById('name-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('name-error').classList.remove('show');
            }
            
            // 验证技能标签：限制30个字
            if (tags.length > 30) {
                document.getElementById('tags-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('tags-error').classList.remove('show');
            }
            
            // 验证执行规则：必填
            if (!content || content.trim() === '') {
                document.getElementById('content-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('content-error').classList.remove('show');
            }

            if (!isValid) return;

            const skillData = {
                id: id || 'SKL' + String(skills.length + 1).padStart(3, '0'),
                name: name,
                description: description,
                category: category,
                tags: tags,
                icon: currentImageData,
                iconColor: 'blue',
                status: 'draft',
                content: content,
                model: '',
                usageCount: id ? skills.find(s => s.id === id)?.usageCount || 0 : 0,
                updateTime: new Date().toISOString().split('T')[0]
            };

            if (id) {
                const index = skills.findIndex(s => s.id === id);
                if (index !== -1) {
                    skills[index] = skillData;
                }
            } else {
                skills.push(skillData);
            }

            applyFilters();
            closeModal();
        }

        // 添加到Agent
        function addToAgent(id) {
            const skill = skills.find(s => s.id === id);
            if (skill) {
                alert(`已将技能「${skill.name}」添加到Agent`);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderSkills();
        });
    </script>
</body>
</html>
