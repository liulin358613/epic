<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>模型管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background: #f5f7fa;
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid #e5e7eb;
        }
        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-outline {
            background: white;
            color: #64748b;
            border: 1px solid #e5e7eb;
        }
        .btn-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .form-control {
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }
        .page-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .page-subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .main-content {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow-x: auto;
            overflow-y: auto;
        }
        .search-bar {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
            background: #fafafa;
        }
        .table-container {
            flex: 1;
            overflow: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #f8fafc;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
            background: #f9fafb;
        }
        td {
            padding: 10px 14px;
            font-size: 14px;
            color: #475569;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        .badge {
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            display: inline-block;
        }
        .badge-active {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge-inactive {
            background: #fee2e2;
            color: #dc2626;
        }
        .badge-testing {
            background: #fef3c7;
            color: #d97706;
        }
        .action-link {
            color: #3b82f6;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
        }
        .action-link:hover {
            text-decoration: underline;
        }
        .action-link.danger {
            color: #ef4444;
        }
        .action-link.danger:hover {
            color: #dc2626;
        }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }
        .pagination-info {
            font-size: 14px;
            color: #64748b;
        }
        .pagination-buttons {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pagination-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pagination-btn:hover:not(.active) {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .pagination-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: block;
        }
        .modal {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: #f1f5f9;
            color: #1e293b;
        }
        .modal-body {
            padding: 16px;
        }

        /* 抽屉式弹窗样式 */
        .drawer {
            position: fixed;
            top: 0;
            right: -640px;
            width: 640px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 1001;
            transition: right 0.3s ease;
        }
        .modal-overlay.active .drawer {
            right: 0;
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .drawer-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        .drawer-close {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.2s ease;
        }
        .drawer-close:hover {
            background: #f1f5f9;
            color: #1e293b;
        }
        .drawer-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        .drawer-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            gap: 12px;
            background: white;
            position: sticky;
            bottom: 0;
        }
        .form-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-row .form-label {
            flex: 0 0 80px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0;
            padding-top: 6px;
            text-align: right;
        }
        .form-row .form-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            transition: all 0.2s ease;
        }
        .form-row .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-row .form-select {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .form-row .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-row .form-input-explain {
            width: 120px;
            flex-shrink: 0;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: #f8fafc;
            transition: all 0.2s ease;
        }
        .form-row .form-input-explain:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .error-message {
            display: none;
            font-size: 12px;
            color: #ef4444;
            padding-left: 80px;
            margin-top: -8px;
            margin-bottom: 8px;
        }
        .form-input.error,
        .form-select.error {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .error-message.show {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.active {
            background: #10b981;
        }
        .status-dot.inactive {
            background: #ef4444;
        }
        .status-dot.testing {
            background: #f59e0b;
        }
        .model-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-right: 8px;
        }
        .model-icon.text {
            background: #dbeafe;
            color: #2563eb;
        }
        .model-icon.image {
            background: #fce7f3;
            color: #db2777;
        }
        .model-icon.voice {
            background: #d1fae5;
            color: #059669;
        }
        .model-icon.multimodal {
            background: #ede9fe;
            color: #7c3aed;
        }
        .model-name-cell {
            display: flex;
            align-items: center;
        }
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .dialog-overlay.hidden {
            display: none;
        }
        .dialog-content {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid #e5e7eb;
        }
        .dialog-body {
            padding: 24px;
            text-align: center;
        }
        .dialog-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fef2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .dialog-icon .fa {
            font-size: 24px;
            color: #ef4444;
        }
        .dialog-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .dialog-message {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }
        .dialog-footer {
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 页面头部 -->
        <div class="page-header">
            <div>
                <div class="page-title">模型管理</div>
                <div class="page-subtitle">管理和配置AI模型</div>
            </div>
        </div>

        <!-- 搜索和筛选栏 -->
        <div class="search-bar">
            <input type="text" class="form-control" id="search-input" placeholder="搜索模型名称..." style="min-width: 200px;" oninput="filterModels()">
            <select class="form-control" id="type-filter" onchange="filterModels()">
                <option value="">全部类型</option>
                <option value="text">文本生成</option>
                <option value="image">图像生成</option>
                <option value="voice">语音合成</option>
                <option value="multimodal">多模态</option>
            </select>
            <select class="form-control" id="status-filter" onchange="filterModels()">
                <option value="">全部状态</option>
                <option value="active">运行中</option>
                <option value="inactive">停用</option>
                <option value="testing">测试中</option>
            </select>
            <select class="form-control" id="provider-filter" onchange="filterModels()">
                <option value="">全部提供商</option>
                <option value="OpenAI">OpenAI</option>
                <option value="Google">Google</option>
                <option value="百度">百度</option>
                <option value="阿里">阿里</option>
                <option value="腾讯">腾讯</option>
                <option value="其他">其他</option>
            </select>
            <button class="btn btn-outline" onclick="resetSearch()">
                <i class="fa fa-refresh"></i>
                重置
            </button>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fa fa-plus"></i>
                添加模型
            </button>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>模型ID</th>
                            <th>模型名称</th>
                            <th>模型类型</th>
                            <th>提供商</th>
                            <th>版本</th>
                            <th>状态</th>
                            <th>部署方式</th>
                            <th>添加时间</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="model-table-body">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 分页 -->
        <div class="pagination">
            <div class="pagination-info" id="pagination-info">共 0 条记录</div>
            <div class="pagination-buttons">
                <button class="pagination-btn" onclick="changePage('first')" title="首页">
                    <i class="fa fa-angle-double-left"></i>
                </button>
                <button class="pagination-btn" onclick="changePage('prev')" title="上一页">
                    <i class="fa fa-angle-left"></i>
                </button>
                <button class="pagination-btn active" id="page-1">1</button>
                <button class="pagination-btn" onclick="changePage('next')" title="下一页">
                    <i class="fa fa-angle-right"></i>
                </button>
                <button class="pagination-btn" onclick="changePage('last')" title="末页">
                    <i class="fa fa-angle-double-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 添加/编辑模型抽屉 -->
    <div class="modal-overlay" id="model-modal">
        <div class="drawer" id="model-drawer">
            <div class="drawer-header">
                <div class="drawer-title" id="modal-title">添加模型</div>
                <button class="drawer-close" onclick="closeModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="drawer-body">
                <input type="hidden" id="edit-id" value="">
                
                <div class="form-row">
                    <label class="form-label">模型名称 <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-input" id="model-name" placeholder="请输入模型名称">
                    <input type="text" class="form-input form-input-explain" id="model-name-explain" placeholder="解释">
                </div>
                <div class="error-message" id="error-model-name"></div>
                
                <div class="form-row">
                    <label class="form-label">模型说明</label>
                    <input type="text" class="form-input" id="model-note" placeholder="请输入模型说明">
                    <input type="text" class="form-input form-input-explain" id="model-note-explain" placeholder="解释">
                </div>
                
                <div class="form-row">
                    <label class="form-label">模型类型 <span style="color: #ef4444;">*</span></label>
                    <select class="form-select" id="model-type">
                        <option value="">请选择模型类型</option>
                        <option value="text">文本生成</option>
                        <option value="image">图像生成</option>
                        <option value="voice">语音合成</option>
                        <option value="multimodal">多模态</option>
                    </select>
                    <input type="text" class="form-input form-input-explain" id="model-type-explain" placeholder="解释">
                </div>
                <div class="error-message" id="error-model-type"></div>
                
                <div class="form-row">
                    <label class="form-label">提供商 <span style="color: #ef4444;">*</span></label>
                    <select class="form-select" id="model-provider">
                        <option value="">请选择提供商</option>
                        <option value="OpenAI">OpenAI</option>
                        <option value="Google">Google</option>
                        <option value="百度">百度</option>
                        <option value="阿里">阿里</option>
                        <option value="腾讯">腾讯</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="text" class="form-input form-input-explain" id="model-provider-explain" placeholder="解释">
                </div>
                <div class="error-message" id="error-model-provider"></div>
                
                <div class="form-row">
                    <label class="form-label">版本号 <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-input" id="model-version" placeholder="例如：v1.0、GPT-4等">
                    <input type="text" class="form-input form-input-explain" id="model-version-explain" placeholder="解释">
                </div>
                <div class="error-message" id="error-model-version"></div>
                
                <div class="form-row">
                    <label class="form-label">原始模型</label>
                    <input type="text" class="form-input" id="model-original" placeholder="请输入原始模型名称">
                    <input type="text" class="form-input form-input-explain" id="model-original-explain" placeholder="解释">
                </div>
                
                <div class="form-row">
                    <label class="form-label">模型架构</label>
                    <select class="form-select" id="model-architecture">
                        <option value="">请选择模型架构</option>
                        <option value="Transformer">Transformer</option>
                        <option value="CNN">CNN</option>
                        <option value="RNN">RNN</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="text" class="form-input form-input-explain" id="model-architecture-explain" placeholder="解释">
                </div>
                
                <div class="form-row">
                    <label class="form-label">参数规模</label>
                    <input type="text" class="form-input" id="model-params" placeholder="例如：~1.8T">
                    <input type="text" class="form-input form-input-explain" id="model-params-explain" placeholder="解释">
                </div>
                
                <div class="form-row">
                    <label class="form-label">模型大小</label>
                    <input type="text" class="form-input" id="model-size" placeholder="例如：89GB">
                    <input type="text" class="form-input form-input-explain" id="model-size-explain" placeholder="解释">
                </div>
                
                <div class="form-row">
                    <label class="form-label">运行状态 <span style="color: #ef4444;">*</span></label>
                    <select class="form-select" id="model-status">
                        <option value="active">运行中</option>
                        <option value="inactive">停用</option>
                        <option value="testing">测试中</option>
                    </select>
                    <input type="text" class="form-input form-input-explain" id="model-status-explain" placeholder="解释">
                </div>
                <div class="error-message" id="error-model-status"></div>
                
                <div class="form-row">
                    <label class="form-label">模型描述</label>
                    <textarea class="form-input" id="model-description" rows="2" placeholder="请输入模型描述信息"></textarea>
                    <input type="text" class="form-input form-input-explain" id="model-description-explain" placeholder="解释">
                </div>
            </div>
            <div class="drawer-footer">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveModel()">保存</button>
            </div>
        </div>
    </div>

    <div id="deleteModelModal" class="dialog-overlay hidden">
        <div class="dialog-content" onclick="event.stopPropagation()">
            <div class="dialog-body">
                <div class="dialog-icon">
                    <i class="fa fa-exclamation-triangle"></i>
                </div>
                <div class="dialog-title">确认删除</div>
                <div class="dialog-message" id="delete-message">确定要删除该模型吗？删除后不可恢复</div>
            </div>
            <div class="dialog-footer">
                <button class="btn btn-outline" onclick="closeDeleteDialog()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        let models = [
            { id: 'MDL20260101001', name: 'GPT-4', type: 'text', provider: 'OpenAI', version: 'GPT-4', apiUrl: 'https://api.openai.com/v1', status: 'active', deploy: 'API接入', description: 'OpenAI最新文本生成模型', createdTime: '2026-01-15 10:30:00', updatedTime: '2026-05-28 14:20:00' },
            { id: 'MDL20260102002', name: 'DALL-E 3', type: 'image', provider: 'OpenAI', version: '3.0', apiUrl: 'https://api.openai.com/v1', status: 'active', deploy: 'API接入', description: 'OpenAI图像生成模型', createdTime: '2026-01-15 10:30:00', updatedTime: '2026-05-27 09:15:00' },
            { id: 'MDL20260103003', name: '文心一言', type: 'text', provider: '百度', version: '4.0', apiUrl: 'https://aip.baidu.com', status: 'active', deploy: '私有部署', description: '百度AI文本生成模型', createdTime: '2026-01-20 08:45:00', updatedTime: '2026-05-26 16:30:00' },
            { id: 'MDL20260104004', name: '通义千问', type: 'multimodal', provider: '阿里', version: '2.5', apiUrl: 'https://dashscope.aliyun.com', status: 'active', deploy: '混合部署', description: '阿里多模态AI模型', createdTime: '2026-01-22 11:20:00', updatedTime: '2026-05-25 10:10:00' },
            { id: 'MDL20260105005', name: '混元大模型', type: 'text', provider: '腾讯', version: 'Turbo', apiUrl: 'https://hunyuan.tencentcloudapi.com', status: 'testing', deploy: '私有部署', description: '腾讯自研大语言模型', createdTime: '2026-01-25 14:00:00', updatedTime: '2026-05-24 11:45:00' },
            { id: 'MDL20260106006', name: 'Claude 3', type: 'text', provider: '其他', version: 'Opus', apiUrl: 'https://api.anthropic.com', status: 'active', deploy: 'API接入', description: 'Anthropic文本生成模型', createdTime: '2026-02-01 09:30:00', updatedTime: '2026-05-23 15:20:00' },
            { id: 'MDL20260107007', name: 'Gemini', type: 'multimodal', provider: 'Google', version: '1.5 Pro', apiUrl: 'https://generativelanguage.googleapis.com', status: 'active', deploy: 'API接入', description: 'Google多模态AI模型', createdTime: '2026-02-05 10:15:00', updatedTime: '2026-05-22 13:40:00' },
            { id: 'MDL20260108008', name: 'Stable Diffusion', type: 'image', provider: '其他', version: 'XL 1.0', apiUrl: '-', status: 'inactive', deploy: '本地部署', description: '开源图像生成模型', createdTime: '2026-02-10 16:50:00', updatedTime: '2026-05-20 08:30:00' },
            { id: 'MDL20260109009', name: '讯飞星火', type: 'text', provider: '其他', version: '3.5', apiUrl: 'https://spark-api.xf-yun.com', status: 'active', deploy: '混合部署', description: '科大讯飞大语言模型', createdTime: '2026-02-15 08:20:00', updatedTime: '2026-05-18 17:10:00' },
            { id: 'MDL20260110010', name: 'Azure TTS', type: 'voice', provider: '其他', version: 'v1', apiUrl: 'https://api.cognitive.microsoft.com', status: 'active', deploy: 'API接入', description: '微软语音合成服务', createdTime: '2026-02-18 13:40:00', updatedTime: '2026-05-15 09:55:00' }
        ];

        let currentPage = 1;
        let pageSize = 10;
        let filteredModels = [...models];

        // 初始化
        function init() {
            filterModels();
        }

        // 根据类型获取图标
        function getModelIcon(type) {
            const icons = {
                'text': { class: 'text', icon: 'fa-file-text-o' },
                'image': { class: 'image', icon: 'fa-picture-o' },
                'voice': { class: 'voice', icon: 'fa-microphone' },
                'multimodal': { class: 'multimodal', icon: 'fa-th-large' }
            };
            return icons[type] || icons['text'];
        }

        // 根据类型获取中文名
        function getTypeName(type) {
            const names = {
                'text': '文本生成',
                'image': '图像生成',
                'voice': '语音合成',
                'multimodal': '多模态'
            };
            return names[type] || type;
        }

        // 根据状态获取badge
        function getStatusBadge(status) {
            const badges = {
                'active': '<span class="badge badge-active"><span class="status-dot active"></span>运行中</span>',
                'inactive': '<span class="badge badge-inactive"><span class="status-dot inactive"></span>停用</span>',
                'testing': '<span class="badge badge-testing"><span class="status-dot testing"></span>测试中</span>'
            };
            return badges[status] || status;
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('model-table-body');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredModels.slice(start, end);

            tbody.innerHTML = pageData.map(model => {
                const icon = getModelIcon(model.type);
                return `
                    <tr>
                        <td style="color: #64748b; font-family: monospace;">${model.id}</td>
                        <td>
                            <div class="model-name-cell">
                                <div class="model-icon ${icon.class}">
                                    <i class="fa ${icon.icon}"></i>
                                </div>
                                <div>
                                    <div style="font-weight: 500; color: #1e293b;">${model.name}</div>
                                    <div style="font-size: 12px; color: #94a3b8;">${model.description || '-'}</div>
                                </div>
                            </div>
                        </td>
                        <td>${getTypeName(model.type)}</td>
                        <td>${model.provider}</td>
                        <td>${model.version}</td>
                        <td>${getStatusBadge(model.status)}</td>
                        <td>${model.deploy || '-'}</td>
                        <td>${model.createdTime || '-'}</td>
                        <td>${model.updatedTime || '-'}</td>
                        <td>
                            <span class="action-link" onclick="viewDetail('${model.id}')">详情</span>
                            <span class="action-link danger" onclick="deleteModel('${model.id}')">删除</span>
                        </td>
                    </tr>
                `;
            }).join('');

            updatePagination();
        }

        // 筛选模型
        function filterModels() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const typeFilter = document.getElementById('type-filter').value;
            const statusFilter = document.getElementById('status-filter').value;
            const providerFilter = document.getElementById('provider-filter').value;

            filteredModels = models.filter(model => {
                const matchesSearch = model.name.toLowerCase().includes(searchText) || 
                                      (model.description && model.description.toLowerCase().includes(searchText));
                const matchesType = !typeFilter || model.type === typeFilter;
                const matchesStatus = !statusFilter || model.status === statusFilter;
                const matchesProvider = !providerFilter || model.provider === providerFilter;
                return matchesSearch && matchesType && matchesStatus && matchesProvider;
            });

            currentPage = 1;
            renderTable();
        }

        // 重置搜索
        function resetSearch() {
            document.getElementById('search-input').value = '';
            document.getElementById('type-filter').value = '';
            document.getElementById('status-filter').value = '';
            document.getElementById('provider-filter').value = '';
            filterModels();
        }

        // 更新分页
        function updatePagination() {
            const total = filteredModels.length;
            const totalPages = Math.ceil(total / pageSize);
            
            document.getElementById('pagination-info').textContent = `共 ${total} 条记录`;
            
            const paginationButtons = document.querySelector('.pagination-buttons');
            let buttonsHtml = `
                <button class="pagination-btn" onclick="changePage('first')" title="首页" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fa fa-angle-double-left"></i>
                </button>
                <button class="pagination-btn" onclick="changePage('prev')" title="上一页" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fa fa-angle-left"></i>
                </button>
            `;

            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                buttonsHtml += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            buttonsHtml += `
                <button class="pagination-btn" onclick="changePage('next')" title="下一页" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fa fa-angle-right"></i>
                </button>
                <button class="pagination-btn" onclick="changePage('last')" title="末页" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fa fa-angle-double-right"></i>
                </button>
            `;

            paginationButtons.innerHTML = buttonsHtml;
        }

        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(filteredModels.length / pageSize);
            
            if (page === 'first') {
                currentPage = 1;
            } else if (page === 'prev') {
                currentPage = Math.max(1, currentPage - 1);
            } else if (page === 'next') {
                currentPage = Math.min(totalPages, currentPage + 1);
            } else if (page === 'last') {
                currentPage = totalPages;
            } else {
                currentPage = page;
            }

            renderTable();
        }

        // 打开添加弹窗
        function openAddModal() {
            document.getElementById('modal-title').textContent = '添加模型';
            document.getElementById('edit-id').value = '';
            document.getElementById('model-name').value = '';
            document.getElementById('model-note').value = '';
            document.getElementById('model-type').value = '';
            document.getElementById('model-provider').value = '';
            document.getElementById('model-version').value = '';
            document.getElementById('model-original').value = '';
            document.getElementById('model-architecture').value = '';
            document.getElementById('model-params').value = '';
            document.getElementById('model-size').value = '';
            document.getElementById('model-status').value = 'active';
            document.getElementById('model-description').value = '';
            document.getElementById('model-modal').classList.add('active');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('model-modal').classList.remove('active');
        }

        // 显示错误提示
        function showError(id, message) {
            const errorEl = document.getElementById(id);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
        }

        // 隐藏错误提示
        function hideError(id) {
            const errorEl = document.getElementById(id);
            if (errorEl) {
                errorEl.textContent = '';
                errorEl.classList.remove('show');
            }
        }

        // 移除字段错误样式
        function removeFieldError(fieldId) {
            const field = document.getElementById(fieldId);
            if (field) {
                field.classList.remove('error');
            }
        }

        // 添加字段错误样式
        function addFieldError(fieldId) {
            const field = document.getElementById(fieldId);
            if (field) {
                field.classList.add('error');
            }
        }

        // 保存模型
        function saveModel() {
            const name = document.getElementById('model-name').value.trim();
            const type = document.getElementById('model-type').value;
            const provider = document.getElementById('model-provider').value;
            const version = document.getElementById('model-version').value.trim();
            const status = document.getElementById('model-status').value;
            const description = document.getElementById('model-description').value.trim();

            // 隐藏所有错误提示
            hideError('error-model-name');
            hideError('error-model-type');
            hideError('error-model-provider');
            hideError('error-model-version');
            hideError('error-model-status');
            
            // 移除所有字段错误样式
            removeFieldError('model-name');
            removeFieldError('model-type');
            removeFieldError('model-provider');
            removeFieldError('model-version');
            removeFieldError('model-status');

            let isValid = true;

            if (!name) {
                showError('error-model-name', '请输入模型名称');
                addFieldError('model-name');
                isValid = false;
            }
            if (!type) {
                showError('error-model-type', '请选择模型类型');
                addFieldError('model-type');
                isValid = false;
            }
            if (!provider) {
                showError('error-model-provider', '请选择提供商');
                addFieldError('model-provider');
                isValid = false;
            }
            if (!version) {
                showError('error-model-version', '请输入版本号');
                addFieldError('model-version');
                isValid = false;
            }
            if (!status) {
                showError('error-model-status', '请选择运行状态');
                addFieldError('model-status');
                isValid = false;
            }

            if (!isValid) {
                return;
            }

            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            const timeStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            const newId = 'MDL' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + pad(String(models.length + 1), 3);

            models.unshift({
                id: newId,
                name,
                type,
                provider,
                version,
                apiUrl: '',
                status,
                deploy: 'API接入',
                description,
                createdTime: timeStr,
                updatedTime: timeStr
            });

            closeModal();
            filterModels();
        }

        // 查看详情
        function viewDetail(id) {
            if (window.parent) {
                try {
                    window.parent.postMessage({
                        type: 'openModelDetail',
                        modelId: id
                    }, '*');
                } catch (e) {
                    console.error('Failed to send message:', e);
                    window.location.href = 'model-detail.html?id=' + id;
                }
            } else {
                window.location.href = 'model-detail.html?id=' + id;
            }
        }

        let deletingModelId = null;

        // 删除模型
        function deleteModel(id) {
            const model = models.find(m => m.id === id);
            if (!model) return;

            deletingModelId = id;
            document.getElementById('delete-message').textContent = `确定要删除模型"${model.name}"吗？此操作不可恢复。`;
            document.getElementById('deleteModelModal').classList.remove('hidden');
        }

        function closeDeleteDialog() {
            document.getElementById('deleteModelModal').classList.add('hidden');
            deletingModelId = null;
        }

        function confirmDelete() {
            if (deletingModelId) {
                models = models.filter(m => m.id !== deletingModelId);
                filterModels();
            }
            closeDeleteDialog();
        }

        // 点击弹窗外区域关闭弹窗
        document.getElementById('model-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.getElementById('deleteModelModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeleteDialog();
            }
        });

        // 初始化页面
        init();
    </script>
</body>
</html>
